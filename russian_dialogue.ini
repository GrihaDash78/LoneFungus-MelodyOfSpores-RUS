[mon]

title_1_0="MON"
dialogue_1_0="Хэй! Хочешь попробовать игру, которую мы с братом тут придумали?"
title_1_1="MON"
dialogue_1_1="Она про точность, ловкость и... ну, с каплей удачи!"
title_1_2="MON"
dialogue_1_2="Побей рекорд, я приготовил для тебя кое-какие классные призы!"
title_1_3="MON"
dialogue_1_3="Третий приз — звездый фрагмент! Второй приз — йо-йо! Бьюсь об заклад, ты даже не знаешь, что это!"
title_1_4="MON"
dialogue_1_4="А первый приз... вовсе не проклятая, то есть благословенная, корона! Она сделает тебя сильнее. В целом. Наверно."
title_1_5="GREENCAP"
dialogue_1_5="Ну, это звучит довольно весело..."
title_1_6="MON"
dialogue_1_6="Тогда давай! Мой брат в соседней комнате, он расскажет тебе, как она работает!"
dialogue_1_7="BACK"

title_2_0="MON"
dialogue_2_0="Воу! Ты действительно прошёл нашу игру и выиграл все призы?!"
title_2_1="MON"
dialogue_2_1="Я уж было подумал, что это было подстроено! Никто и никогда не должен был выигрывать!"
title_2_2="MON"
dialogue_2_2="Ну что ж... видимо, ты заслужил. Наслаждайся призами, чемпион!"
dialogue_2_3="BACK"

[nom]

title_1_0="NOM"
dialogue_1_0="Пришёл поиграть в нашу игру?"
title_1_1="NOM"
dialogue_1_1="Правила просты: лупи всё, что видишь, кроме всего, что похоже на гриб!"
title_1_2="NOM"
dialogue_1_2="Остерегайся бомб и пушечных ядер! Они не причинят тебе вреда, но зато ошеломят!"
title_1_3="NOM"
dialogue_1_3="Разные вещи дают разное количество очков, так что учись по ходу дела! Удачи!"
dialogue_1_4="BACK"

[matio]

title_1_0="MATIO"
dialogue_1_0="Жизнь в Двух Столпах хороша. Здесь тихо, сыро, и в воздухе постоянный холод."

dialogue_1_1="BACK"

[bobba]

title_1_0="BOBBA"
dialogue_1_0="Ты из Вудби, да? Я слышал, наши племена когда-то были едины, частью старой Фунгалии."

title_1_1="BOBBA"
dialogue_1_1="Но потом нас изгнали... и были разодраны Духом-Зверем."

dialogue_1_2="BACK"

[pela]

title_1_0="PELA"
dialogue_1_0="Мы пришли сюда, надеясь, что Дух-Зверь не достанет нас в этих пещерах..."

title_1_1="PELA"
dialogue_1_1="Как же мы ошибались. Теперь здесь тоже запрещена магия."

dialogue_1_2="BACK"

[gulhatt]

title_1_0="GULHATT"
dialogue_1_0="Если прислушаться, камни напевают старые песни. Большинство грибов просто не задерживаются достаточно долго, чтобы услышать их."

dialogue_1_1="BACK"

[bartin]

title_1_0="BARTIN"
dialogue_1_0="Мы поселились в Двух Столпах, потому что это уже было похоже на город — два больших каменных столба, чистые тропы, уютные уголки. Словно сама природа предназначила это для нас."

dialogue_1_1="BACK"

[gråmögel]

title_1_0="GRÅMÖGEL"
dialogue_1_0="Быть серым не значит быть скучным. Это значит, что я сочетаюсь со всем."

dialogue_1_1="BACK"

[relle]

title_1_0="RELLE"
dialogue_1_0="Говорят, что Два Столпа безопасны... но даже самые крепкие столпы могут рухнуть, и зверям всё равно на стены."

title_1_1="RELLE"
dialogue_1_1="Ты встречал Тинкеркэпа, живущего рядом с городом? Он корпит над какой-то странной статуей-машиной..."

title_1_2="RELLE"
dialogue_1_2="Живые статуи никогда не доставляли нам ничего хорошего. Их пророчества вьются, как лианы, а их каменные сердца хранят безумие негрибной жизни!"

title_1_3="RELLE"
dialogue_1_3="Помяни мои слова! Эти статуи и их ложные пророчества однажды погубят грибной род."

title_1_4="RELLE"
dialogue_1_4="Грибам не следует связываться с такими богохульными творениями. Отец-Ветер и Мать-Мицелия никогда не предназначали камню говорить."

dialogue_1_5="BACK"

[pelin]

title_1_0="PELIN"
dialogue_1_0="Я живу здесь с тех пор, как ветер ещё шептал сквозь столпы. Тогда камни гудели, и тени не казались такими... тяжёлыми."

dialogue_1_1="BACK"

[warden]

title_1_0="SPOREWARDEN MURA"
dialogue_1_0="Приветствую тебя, дитя моё, помни, что Мать-Мицелия слышит. Всегда."

title_1_1="SPOREWARDEN MURA"
dialogue_1_1="Её нити проходят под каждым шагом, её дыхание вьётся в тумане. Мы обязаны ей своим кровом, своим пропитанием... своими спорами."

title_1_2="SPOREWARDEN MURA"
dialogue_1_2="Если её приют хранил тебя, то подумай о том, чтобы оставить подношение у её статуи. Подай, сколько можешь, и ходи с её благодатью под ногами."

dialogue_1_3="END"

title_2_0="SPOREWARDEN MURA"
dialogue_2_0="Подумай о том, чтобы оставить подношение у статуи Матери-Мицелия и ходить с её благодатью под ногами."

dialogue_2_1="BACK"

title_3_0="SPOREWARDEN MURA"
dialogue_3_0="Дитя земли... твои подношения вдохнули новую жизнь этому храму."

title_3_1="SPOREWARDEN MURA"
dialogue_3_1="Прими же этот священный дар, выкованный в благоговении. Да поможет он тебе в твоём походе."

title_3_2="SPOREWARDEN MURA"
dialogue_3_2="И пока ты ходишь, помни, что благодать Матери-Мицелия пронизывает каждый твой шаг."

dialogue_3_3="END"

title_4_0="SPOREWARDEN MURA"
dialogue_4_0="Твой дар будет высечен в памяти этого храма, дитя моё."

dialogue_4_1="BACK"

[rodhatt_boss]
title_1_0="GREENCAP"
dialogue_1_0="Ну вот опять... вам правда пора перестать путаться под ногами!"

title_1_1="DWERP"
dialogue_1_1="Эй! Это ты постоянно путаешься под ногами!"

title_1_2="DWERP"
dialogue_1_2="Да, лады, ты распахнул ворота, но мы взяли это место первыми!"

title_1_3="DWERP"
dialogue_1_3="И на этот раз ты нас не обскочишь! Смекаешь, Рёдхатт?"

title_1_4="RÖDHATT"
dialogue_1_4="Я? Я думала, ты будешь с ним биться!"

title_1_5="PUTCH"
dialogue_1_5="Не-а. Вообще-то уже твоя очередь. Ты самая сильная сыроежка в нашей группе!"

title_1_6="RÖDHATT"
dialogue_1_6="Я на такое не соглашалась!"

title_1_7="DWERP"
dialogue_1_7="Он сказал, что от тебя несёт, как от поля ромашек! Какое неуважение!"

title_1_8="RÖDHATT"
dialogue_1_8="Прости?! Я пахну землёй и мускусом, как и подобает приличной сыроежке!"

title_1_9="PUTCH"
dialogue_1_9="Ещё он ляпнул, что твоя шляпка суше, чем древесная кора!"

title_1_10="RÖDHATT"
dialogue_1_10="ЧТО?! У моей шляпки естественная влажность!"

title_1_11="MORKER"
dialogue_1_11="... уничтожь его!"

title_1_12="RÖDHATT"
dialogue_1_12="Ну всё! Я позволила бы тебя отпустить из-за твоей симпатичности, но теперь это война!"

title_1_13="GREENCAP"
dialogue_1_13="Стой, я ничего такого не говорил!"

title_1_14="RÖDHATT"
dialogue_1_14="Ложь и клевета!"

title_1_15="DWERP"
dialogue_1_15="Сваливаем!"

title_1_16="RÖDHATT"
dialogue_1_16="Никто не называет меня вонючей и сухой, и не уходит невредимым!"

dialogue_1_17="END"

title_2_0="RÖDHATT"
dialogue_2_0="Ай!"

title_2_1="GREENCAP"
dialogue_2_1="Прости! Я не желал делать тебе больно, я правда не хотел драться!"

title_2_2="GREENCAP"
dialogue_2_2="А те вещи, что наговорили твои приятели - клянусь, я ничего такого не говорил!"

title_2_3="RÖDHATT"
dialogue_2_3="Это правда? Даже про сухую шляпку?"

title_2_4="GREENCAP"
dialogue_2_4="Честное слово! Я думаю, твоя шляпка... очень хорошо увлажнена. И пахнешь ты, эм, идеально по-грибному!"

title_2_5="RÖDHATT"
dialogue_2_5="Хех... извини, что разозлилась. Они иногда такие споро-головые!"

title_2_6="GREENCAP"
dialogue_2_6="Честно? Ты заслуживаешь более лучших друзей, чем этих болванов!"

title_2_7="RÖDHATT"
dialogue_2_7="Наверное... я просто хотела вписаться. Но кажется, они держат меня рядом только затем, чтобы посмеяться надо мной."

title_2_8="GREENCAP"
dialogue_2_8="Если это поможет... я бы очень хотел быть твоим другом."

title_2_9="RÖDHATT"
dialogue_2_9="Неужели? Даже после того, как я попыталась тебя побить и накричала?"

title_2_10="GREENCAP"
dialogue_2_10="Ничего, бывает. Я буду рад!"

title_2_11="RÖDHATT"
dialogue_2_11="Хи-хи! Хорошо! Тогда удачи в твоём задании, и надеюсь, Дверп и остальные не доставят тебе слишком много хлопот!"

dialogue_2_12="END"

[gregador]

title_1_0="GREGADOR"
dialogue_1_0="Кто вторгается в мои покои?"
title_1_1="GREENCAP"
dialogue_1_1="Я Гринкэп, из деревни Вудби."
title_1_2="GREENCAP"
dialogue_1_2="Я ищу Брегадора. Это вы?"
title_1_3="GREGADOR"
dialogue_1_3="Ты явился с той стороны запечатанных ворот? Брегадор... был моим отцом. Я потерял его из-за Зверя."
title_1_4="GREENCAP"
dialogue_1_4="Понимаю вас... Я тоже потерял близкого человека из-за этого монстра."
title_1_5="GREGADOR"
dialogue_1_5="Многие из нас потеряли. Говори, зачем пожаловал?"
title_1_6="GREENCAP"
dialogue_1_6="Я хочу приручить Зверя! И я узнал, что ваш отец когда-то хотел сделать то же самое."
title_1_7="GREGADOR"
dialogue_1_7="Он был блестящим умом... но его амбиции оказались фатальными."
title_1_8="GREENCAP"
dialogue_1_8="Ваш род спор обладает уникальной магией. Я встретился со Зверем и выжил. Я пришёл как Хиртан, и нуждаюсь в вашей помощи!"
title_1_9="GREGADOR"
dialogue_1_9="Ты выжил после встречи со Зверем? Пророчество Хиртана..."
title_1_10="GREGADOR"
dialogue_1_10="Но скажи, какое у тебя есть доказательство, что ты действительно встретился со Зверем и остался жив?"
title_1_11="GREENCAP"
dialogue_1_11="У меня есть одно из его перьев."
title_1_12="GREGADOR"
dialogue_1_12="Это... это перо не из этого мира. Его сила всё ещё гудит от сущности Зверя..."
title_1_13="GREGADOR"
dialogue_1_13="Мой отец говорил о пророчестве Хиртана... Что Зверя можно подчинить только песней."
title_1_14="GREGADOR"
dialogue_1_14="Мой отец научил меня священной мелодии, и я всю жизнь готовился к этому моменту."
title_1_15="GREGADOR"
dialogue_1_15="Чтобы преуспеть, мы должны провести ритуал, называемый как Мелодия Спор."
title_1_16="GREGADOR"
dialogue_1_16="Сильные должны собраться вместе у Астрального Ока, чтобы войти в царство Зверя и попытаться его приручить."
title_1_17="GREENCAP"
dialogue_1_17="Тогда пойдёмте! Мы должны спешить!"
title_1_18="GREGADOR"
dialogue_1_18="Терпение, Гринкэп. Ритуал требует священного инструмента — Флейты мира."
title_1_19="GREGADOR"
dialogue_1_19="Она находится в месте под названием Забытое Святилище, недоступном для всех, кроме избранных пророчеством."
title_1_20="GREGADOR"
dialogue_1_20="Некоторые говорят, что оно находится к западу отсюда, но как тебе туда войти, я не знаю..."
title_1_21="GREGADOR"
dialogue_1_21="Докажи, что пророчество благоволит тебе. Достань флейту, и я подготовлю песню."
title_1_22="GREENCAP"
dialogue_1_22="Я найду её. Обещаю!"
title_1_23="GREGADOR"
dialogue_1_23="Возьми этот паромный проездной, с ним Фэрришрум переправит тебя через реку..."
title_1_24="GREGADOR"
dialogue_1_24="Она приведёт тебя на запад, и возможно, там ты найдёшь путь в Святилище."
title_1_25="GREENCAP"
dialogue_1_25="Благодарю. Я не подведу."
dialogue_1_26="END"

title_2_0="GREGADOR"
dialogue_2_0="Достань Флейту Мира из Забытого Святилища. Сделай это, и я последую за тобой."

dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Я достал Флейту мира!"

title_3_1="GREGADOR"
dialogue_3_1="Матерью-Мицелия... Священная флейта вернулась к своему роду спор."

title_3_2="GREGADOR"
dialogue_3_2="Нет времени медлить. С такой силой в наших руках равновесие начинает колебаться."

title_3_3="GREGADOR"
dialogue_3_3="Я непременно отправлюсь в Вудби!"

title_3_4="GREGADOR"
dialogue_3_4="Встретимся у Астрального Ока, древней статуи к востоку от деревни. Возможно, ты проходил мимо неё в своих путешествиях."

title_3_5="GREGADOR"
dialogue_3_5="Это не просто памятник... а врата в царство Духа-Зверя. Там начнётся твоё истинное испытание."

dialogue_3_6="END"

[pierre]

title_1_0="GREENCAP"
dialogue_1_0="Привет!"

title_1_1="PIERRE"
dialogue_1_1="Хай! Ух ты! Только глянь! Эта зелёная шляпка такая свежая!"

title_1_2="BOSC"
dialogue_1_2="Пфф, успокойся, Пьер. Ты себя позоришь!"

title_1_3="ANJOU"
dialogue_1_3="Да ну, такой крутой парень не захочет тусоваться с такой мягкой грушей, как ты!"

title_1_4="BARTLETT"
dialogue_1_4="Да, Пьер как... подгнивший фрукт на дне корзины!"

title_1_5="PIERRE"
dialogue_1_5="Почему вы всегда такие грубые?! Я просто пытаюсь поздороваться!"

title_1_6="GREENCAP"
dialogue_1_6="Я думаю, ты хороший, Пьер. Я бы точно с тобой потусовался!"

title_1_7="PIERRE"
dialogue_1_7="Не, бессмысленно! Я никогда не буду достаточно крутым..."

title_1_8="PIERRE"
dialogue_1_8="Может, если бы у меня была крутая шляпа или эффектный плащ, или что-то вроде того..."

title_1_9="BOSC"
dialogue_1_9="Что, плащ из листьев? Ты всё равно будешь ботаном в плаще!"

title_1_10="ANJOU"
dialogue_1_10="Может, бумажный пакет на твою голову поможет!"

title_1_11="BARTLETT"
dialogue_1_11="Он на грани отчаяния!"

title_1_12="GREENCAP"
dialogue_1_12="Вы, фрукты, действительно злые..."

title_1_13="PIERRE"
dialogue_1_13="Всё нормально... Я привык. Может, когда-нибудь я стану крутым."

title_1_14="PIERRE"
dialogue_1_14="Но не сегодня..."

dialogue_1_15="END"

title_2_0="PIERRE"
dialogue_2_0="Я просто хочу, чтобы был какой-нибудь способ стать крутым..."

title_2_1="BOSC"
dialogue_2_1="Да брось это, Пьер. Ты образцовый лох!"

title_2_2="ANJOU"
dialogue_2_2="Ага, ты никогда не станешь крутым."

title_2_3="BARTLETT"
dialogue_2_3="Да, ты как... эталон не крутости."

dialogue_2_4="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Хэй, Пьер, я принёс тебе кое-что!"

title_3_1="PIERRE"
dialogue_3_1="Вау! Это... солнечные очки?"

dialogue_3_2="END"

title_4_0="PIERRE"
dialogue_4_0="Подвиньтесь, фрукты, в городке новая груша, и я крутой."

title_4_1="BOSC"
dialogue_4_1="Да ну на..! У Пьера стиль на дни вперёд!"

title_4_2="ANJOU"
dialogue_4_2="Блин, эти очки идеально грушевы!"

title_4_3="BARTLETT"
dialogue_4_3="Зашибись, теперь я просто обычная груша в семье..."

title_4_4="PIERRE"
dialogue_4_4="Извиняйте, братаны, эта груша улетает в соло за крутой стол."

title_4_5="PIERRE"
dialogue_4_5="Сматываемся, пока они не попытались скопировать мой образ!"

dialogue_4_6="BACK"

[unclecap_intro]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Ладно, маленький Кэппи! Сегодняшняя тренировка не просто ради забавы, понимаешь!"

title_1_1="GREENIUS CAPPIUS"
dialogue_1_1="Ты вырастешь и станешь великим. Однажды весь мир это узнает!"

title_1_2="GREENIUS CAPPIUS"
dialogue_1_2="Дух-Зверь не показывался годами, но воздух в последнее время... ощущается тяжелее."

title_1_3="GREENCAP"
dialogue_1_3="Ты говоришь это каждый год, дядя. Кажется, ты просто стареешь!"

title_1_4="GREENIUS CAPPIUS"
dialogue_1_4="Хах! Возможно. Но даже старые споры чувствуют, когда ветер меняется."

title_1_5="GREENIUS CAPPIUS"
dialogue_1_5="Ладно, маленький Кэппи! Готов отточить свои навыки?"

title_1_6="GREENCAP"
dialogue_1_6="Всегда готов!"

title_1_7="GREENIUS CAPPIUS"
dialogue_1_7="Вот это дух! Впереди я приготовил несколько тренировочных мест."

title_1_8="GREENIUS CAPPIUS"
dialogue_1_8="Я встречу тебя наверху. Посмотрим, сможешь ли ты залезть по этим лианам до начала настоящей тренировки!"

title_1_9="GREENCAP"
dialogue_1_9="Без проблем!"

dialogue_1_10="END"

[unclecap_tutorial_1]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Прежде чем научиться наносить удары, ты должен научиться выживать!"

title_1_1="GREENIUS CAPPIUS"
dialogue_1_1="Помнишь тот рывок, которому я тебя обучил на днях?"

title_1_2="GREENCAP"
dialogue_1_2="Да! Тот, где я поджимаю шляпку?"

title_1_3="GREENIUS CAPPIUS"
dialogue_1_3="Именно! Это лучшая защита гриба от опасности."

title_1_4="GREENIUS CAPPIUS"
dialogue_1_4="Давай же, проскользи рывком это препятствие! Посмотрим, помнишь ли ты, как это делается!"

title_1_5="GREENCAP"
dialogue_1_5="Смотри!"

dialogue_1_6="END"

title_2_0="GREENIUS CAPPIUS"
dialogue_2_0="Молодец! Идеальный рывок!"

title_2_1="GREENIUS CAPPIUS"
dialogue_2_1="А теперь давай перейдем к нападению. Возьми хлыст, который я ранее тебе дал."

title_2_2="GREENIUS CAPPIUS"
dialogue_2_2="Я повесил несколько кустов там, они послужат тебе тренировочными мишенями."

title_2_3="GREENIUS CAPPIUS"
dialogue_2_3="Попробуй бить по ним, пока они не рассыпятся. Посмотрим, сможешь ли ты поразить их все!"

dialogue_2_4="END"

title_3_0="GREENIUS CAPPIUS"
dialogue_3_0="Прекрасная техника! А ты быстро учишься."

title_3_1="GREENIUS CAPPIUS"
dialogue_3_1="Продолжай тренироваться также, и однажды ты станешь настоящим бойцом."

title_3_2="GREENIUS CAPPIUS"
dialogue_3_2="Пожалуй, на сегодня достаточно, давай возвращаться..."

title_3_3="ELDER GEPU"
dialogue_3_3="Гриниус!"

title_3_4="GREENIUS CAPPIUS"
dialogue_3_4="Старейшина Гэпу, что вы здесь делаете?"

title_3_5="ELDER GEPU"
dialogue_3_5="Дух-Зверь приближается к деревне Топпо!"

title_3_6="GREENIUS CAPPIUS"
dialogue_3_6="Клянусь Великой Мицелией... Я должен помочь им!"

title_3_7="GREENIUS CAPPIUS"
dialogue_3_7="Так, Гринкэп, слушай внимательно. Оставайся здесь и жди меня. Не возвращайся домой."

title_3_8="GREENCAP"
dialogue_3_8="Но, дядя, я тоже могу сражаться! Я хочу помочь!"

title_3_9="GREENIUS CAPPIUS"
dialogue_3_9="Ещё нет. Ты не готов к такой опасности."

title_3_10="GREENIUS CAPPIUS"
dialogue_3_10="Старейшина Гэпу, идём!"

title_3_11="GREENCAP"
dialogue_3_11="..."

title_3_12="GREENCAP"
dialogue_3_12="Удачи, дядя..."

dialogue_3_13="END"

[unclecap_tutorial_2]

title_1_0="GREENCAP"
dialogue_1_0="Старейшина Гэпу! Что случилось? Где дядя?"

title_1_1="ELDER GEPU"
dialogue_1_1="Мы сделали всё возможное, чтобы эвакуировать деревню..."

title_1_2="ELDER GEPU"
dialogue_1_2="Твой дядя остался, чтобы защитить остальных от Зверя."

title_1_3="ELDER GEPU"
dialogue_1_3="Мне... мне очень жаль, Гринкэп."

title_1_4="ELDER GEPU"
dialogue_1_4="Он не выжил."

title_1_5="GREENCAP"
dialogue_1_5="..."

title_1_6="ELDER GEPU"
dialogue_1_6="Пойдём, вернёмся обратно."

dialogue_1_7="END"

[unclecap]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Проскользни рывком препятствие впереди, так ты не пострадаешь!"

dialogue_1_1="BACK"

title_2_0="GREENIUS CAPPIUS"
dialogue_2_0="Ударь все мишени хлыстом!"

dialogue_2_1="BACK"

[truffina_1]

title_1_0="TRUFFINA"
dialogue_1_0="Ты когда-нибудь видел такую статую раньше?"

title_1_1="TRUFFINA"
dialogue_1_1="Разве это не странно и увлекательно? Она почти похожа на какие-то ворота!"

title_1_2="TRUFFINA"
dialogue_1_2="Три гриба удерживают то, что похоже на дверной проём... Мне интересно, что скульптор хотел этим сказать."

title_1_3="TRUFFINA"
dialogue_1_3="Ой! Где же мои манеры? Я Трюффина, археолог!"

title_1_4="TRUFFINA"
dialogue_1_4="В этих землях так много скрытой истории, и так много тайн, ожидающих своего открытия!"

title_1_5="TRUFFINA"
dialogue_1_5="Знаешь ли ты, что до того, как магия была оставлена, наш народ строил невероятные зачарованные сооружения?"

title_1_6="TRUFFINA"
dialogue_1_6="Некоторые из них даже имитировали саму жизнь, статуи, которые говорили, двигались... всевозможные странные чудеса!"

title_1_7="GREENCAP"
dialogue_1_7="Это... действительно очень увлекательно."

title_1_8="TRUFFINA"
dialogue_1_8="Я живу этим! Раскрывать прошлое, собирать воедино истории тех, кто был до нас."

title_1_9="TRUFFINA"
dialogue_1_9="В любом случае, мне лучше вернуться к исследованиям. Всегда есть что открыть для себя!"

title_1_10="TRUFFINA"
dialogue_1_10="Увидимся!"

dialogue_1_11="END"

title_2_0="TRUFFINA"
dialogue_2_0="Что могли бы означать эти три гриба? Должен же быть какой-то более глубокий смысл в этой работе..."

dialogue_2_1="BACK"

[truffina_prism]

title_1_0="TRUFFINA"
dialogue_1_0="Сам Оракул... он живой! Споры мои, я и мечтать не могла, что статуя нечто большее, чем просто камень!"

title_1_1="TRUFFINA"
dialogue_1_1="Как древние создавали такие чудеса? Вот оно, искусство грибов давно минувших дней..."

title_1_2="TRUFFINA"
dialogue_1_2="Говорят, что когда-то он направлял грибной род, давая проблески того, что ждёт впереди, видения судьбы, сотканные из света."

title_1_3="TRUFFINA"
dialogue_1_3="Когда голод Духа-Зверя усилился, большая часть этой магии замолчала, но здесь свет всё ещё теплится."

title_1_4="TRUFFINA"
dialogue_1_4="Вероятно, он всё это время охранял это место, защищая его от голода Зверя."

title_1_5="TRUFFINA"
dialogue_1_5="Если Оракул всё ещё может говорить, то его слова могут изменить всё, что мы знаем о прошлом... и о том, что нас ждёт."

dialogue_1_6="BACK"

[truffina_prism_shop]

title_1_0="TRUFFINA"
dialogue_1_0="Какое таинственное место! Интересно, почему его назвали Храмом Призмы?"

title_1_1="TRUFFINA"
dialogue_1_1="Я нигде не вижу призм... и, по правде говоря, цвета здесь сейчас довольно тусклые."

title_1_2="TRUFFINA"
dialogue_1_2="Но если присмотреться к кирпичам и статуям, можно заметить слабые следы старой краски."

title_1_3="TRUFFINA"
dialogue_1_3="Возможно, в древние времена этот храм сиял цветом! Представь, как великолепно он, должно быть, выглядел!"

title_1_4="TRUFFINA"
dialogue_1_4="Немного грустно видеть, как такое величие угасло... но всё равно это увлекательно."

dialogue_1_5="BACK"

[truffina_big_gate]

title_1_0="TRUFFINA"
dialogue_1_0="Только посмотри на эти огромные ворота... говорят, они были запечатаны всего несколько лет назад."

title_1_1="TRUFFINA"
dialogue_1_1="Но сами ворота построены не теми, кто их закрыл. Они намного, намного старше."

title_1_2="TRUFFINA"
dialogue_1_2="Давным-давно весь этот лес принадлежал королевству под названием Фунгалия. Его границы простирались вплоть до этого самого места!"

title_1_3="TRUFFINA"
dialogue_1_3="За этими воротами находятся земли, на которые не ступала нога никого из нашего поколения."

title_1_4="TRUFFINA"
dialogue_1_4="Интересно... откроются ли они когда-нибудь при нашей жизни?"

dialogue_1_5="BACK"

[truffina_fungalia]

title_1_0="TRUFFINA"
dialogue_1_0="Древнее Королевство Фунгалия..."
title_1_1="TRUFFINA"
dialogue_1_1="Каким великолепным местом оно должно было быть! Хотя, кажется, мост впереди обрушился."
title_1_2="TRUFFINA"
dialogue_1_2="Я могу предположить, судя по архитектурному дизайну входа, те руины вдали были когда-то жилыми кварталами."
title_1_3="TRUFFINA"
dialogue_1_3="Но здесь есть не только это... здесь должна быть целая система канализации, и, может быть, даже скрытые камеры!"
title_1_4="TRUFFINA"
dialogue_1_4="Я читала, что фунгалийцы когда-то использовали электричество как источник энергии, строя огромные машины, наполненные шестернями и зубчатыми колёсами."
title_1_5="TRUFFINA"
dialogue_1_5="Только представь... какими чудесами могло бы обладать это королевство, если бы Дух-Зверь не прогнал их всех."
dialogue_1_6="BACK"

[truffina_sanctum_entrance]

title_1_0="TRUFFINA"
dialogue_1_0="Что это за вход?! Он выглядит как ещё одни древние грибные руины... и его расположение прямо под Храмом Призмы!"
title_1_1="TRUFFINA"
dialogue_1_1="Может быть, это продолжение Храма Призмы? Или ещё более древняя часть забытого королевства..."
title_1_2="TRUFFINA"
dialogue_1_2="Только вот... ворота преграждают здесь путь. Как нам войти?"
title_1_3="TRUFFINA"
dialogue_1_3="Наверняка, есть другой вход где-нибудь... возможно, под водой?"
title_1_4="TRUFFINA"
dialogue_1_4="Надеюсь, что нет. Все знают, что грибы не умеют плавать - мы просто будем всплывать и выглядеть нелепо."
title_1_5="TRUFFINA"
dialogue_1_5="Всё равно это увлекательно. Кстати, я слышала некоторые слухи о поселении где-то поблизости..."
title_1_6="TRUFFINA"
dialogue_1_6="Вероятно, оно находится дальше на западе... и я отправлюсь туда следующим путём!"
dialogue_1_7="BACK"

[truffina_two_pillars]

title_1_0="TRUFFINA"
dialogue_1_0="Это поселение... да это же полноценный город!"
title_1_1="TRUFFINA"
dialogue_1_1="Построенный внутри двух великолепных древних сталагмитов, ты можешь себе представить?"
title_1_2="TRUFFINA"
dialogue_1_2="Я поговорила с некоторыми жителями, и, по-видимому, это место уже было здесь до их прибытия."
title_1_3="TRUFFINA"
dialogue_1_3="Они просто переехали! Как увлекательно!"
title_1_4="TRUFFINA"
dialogue_1_4="Думаю, я могу остаться здесь ненадолго... это такое приятное место."
title_1_5="TRUFFINA"
dialogue_1_5="В воздухе слышен завораживающий гул, и он действительно успокаивает."
title_1_6="GREENCAP"
dialogue_1_6="Круто! А можно тебя кое о чём спросить?"
title_1_7="TRUFFINA"
dialogue_1_7="Конечно, спрашивай!"
title_1_8="GREENCAP"
dialogue_1_8="Я прокладывал пути и исследовал места, которые никто не видел веками... но ты каким-то образом всегда оказываешься впереди меня."
title_1_9="GREENCAP"
dialogue_1_9="Как тебе удаётся попадать сюда раньше меня?"
title_1_10="TRUFFINA"
dialogue_1_10="..."
title_1_11="TRUFFINA"
dialogue_1_11="Ну... не знаю, замечал ли ты, но ты постоянно останавливаешься, чтобы сразиться со всем, что только видишь."
title_1_12="TRUFFINA"
dialogue_1_12="Потом ты отвлекаешься, прыгая вокруг в супер опасных местах!"
title_1_13="TRUFFINA"
dialogue_1_13="Я просто... избегаю всего этого и иду прямо туда, куда мне нужно."
title_1_14="TRUFFINA"
dialogue_1_14="Ты же слишком занят, чтобы быть героем! А я просто занимаюсь исследованиями."
title_1_15="GREENCAP"
dialogue_1_15="Оу. Да, это имеет смысл..."
dialogue_1_16="BACK"

[entered_prism_temple]

title_1_0="GREENCAP"
dialogue_1_0="Итак... это Храм Призмы?"

title_1_1="GREENCAP"
dialogue_1_1="Скорее это больше похоже на разрушающуюся пещеру, чем на храм."

title_1_2="GREENCAP"
dialogue_1_2="Оракул должен быть где-то глубоко внутри, и я должен его найти!"

dialogue_1_3="END"

[dwerp_boss]

title_1_0="DWERP"
dialogue_1_0="Эй, ты, сморчок!"

title_1_1="DWERP"
dialogue_1_1="На этот раз ты меня не обойдёшь!"

title_1_2="GREENCAP"
dialogue_1_2="А что случилось с твоей бандой? Они тебя бросили?"

title_1_3="DWERP"
dialogue_1_3="Бросили?! Ха! Я их УВОЛИЛ! Кучка бесполезных спор..."

title_1_4="DWERP"
dialogue_1_4="Ты значит тут расхаживаешь со своим хлыстом и блестящими реликвиями, ведёшь себя как легенда..."

title_1_5="DWERP"
dialogue_1_5="Но угадай чё? Я тоже подкачался! Спорим, у тебя нет ничего подобного тому, что есть у меня!"

title_1_6="DWERP"
dialogue_1_6="А всё, с чем ты сталкивался до этого? Детские забавы! И теперь ты встретишься с НАСТОЯЩИМ героем!"

dialogue_1_7="END"

title_2_0="DWERP"
dialogue_2_0="Уф! Ну почему ты всегда выигрываешь?!"

title_2_1="GREENCAP"
dialogue_2_1="Потому что некоторые задания не для тебя, Дверп."

title_2_2="DWERP"
dialogue_2_2="Но... но я просто хотел быть героем."

title_2_3="DWERP"
dialogue_2_3="Походу, я не создан для славы. Наверно, я просто... обычный."

title_2_4="GREENCAP"
dialogue_2_4="И в этом нет ничего плохого... Иногда я хочу, чтобы у меня была обычная жизнь."

title_2_5="DWERP"
dialogue_2_5="...Да ну? Хмф. Может, ты и прав. Может, это не так уж и плохо..."

title_2_6="DWERP"
dialogue_2_6="Ну... тогда иди. Можешь проходить."

title_2_7="GREENCAP"
dialogue_2_7="Ладно..."

dialogue_2_8="END"

[banitor]

title_1_0="BANITOR"
dialogue_1_0="Меня ограбили! Какой-то нищий спороголовый пробрался в моё хранилище!"

title_1_1="BANITOR"
dialogue_1_1="Он украл мои ножницы, нож, подковы, динамит, лопату... и дюжину бочек!"

title_1_2="BANITOR"
dialogue_1_2="И если этого было мало - он украл даже грязную старую швабру!"

title_1_3="BANITOR"
dialogue_1_3="Она была омерзительной, вся разваливалась и воняла дохлой болотной крысой... Почему кому-то понадобилась эта вещь - величайшая загадка нашего времени."

dialogue_1_4="BACK"

[fatekeeper]

title_1_0="FATEKEEPER"
dialogue_1_0="Одинокий гриб осмеливается ступать по этим каменным залам..."

title_1_1="GREENCAP"
dialogue_1_1="Ага, я ищу древний инструмент. С ним я приручу великого зверя!"

title_1_2="GREENCAP"
dialogue_1_2="Погоди. Кто... или что... ты?"

title_1_3="FATEKEEPER"
dialogue_1_3="Зверя, говоришь... Я Хранитель Судьбы, последний страж давно забытых залов, созданный руками твоих сородичей в давние дни."

title_1_4="FATEKEEPER"
dialogue_1_4="Они тоже когда-то сковали существо огромной мощи. Из него они черпали власть над магией и подчиняли себе ветер, камень и землю."

title_1_5="FATEKEEPER"
dialogue_1_5="Но сила нарастает, как прилив, и с ней пришла гордыня..."

title_1_6="FATEKEEPER"
dialogue_1_6="В своей жажде они достигли за пределы завес мира... и коснулись того, что ни один смертный не должен видеть."

title_1_7="FATEKEEPER"
dialogue_1_7="Так они были уничтожены... стёрты с полотна времени, а их имена и деяния забыты, словно их никогда и не было."

title_1_8="GREENCAP"
dialogue_1_8="Что всё это значит?"

title_1_9="FATEKEEPER"
dialogue_1_9="Меня оставили здесь, в тишине и тени, лишённый моих создателей. Бесчисленные эпохи я наблюдал, как пустота ползёт по этим залам."

title_1_10="FATEKEEPER"
dialogue_1_10="Я не позволю такой гибели свершиться снова. Зверь, которого ты ищешь, связан с равновесием всего сущего, и приручить его — значит обречь это равновесие на гибель."

title_1_11="FATEKEEPER"
dialogue_1_11="Судьба твоего рода останется неизменной... даже если её придётся хранить на кончике моей ладони. Приготовься, странник."

dialogue_1_12="END"

[phosmir]

title_1_0="LORD PHOSMIR"
dialogue_1_0="Узри! Ты стоишь на вершине моего суверенного владения!"

title_1_1="LORD PHOSMIR"
dialogue_1_1="Оглянись! Каждый обрыв, каждый зубчатый хребет, каждый валун, о который ты споткнулся по пути наверх... мои!"

title_1_2="LORD PHOSMIR"
dialogue_1_2="Видишь тот отвесный обрыв? Изысканно! Вертикальный шедевр, что изваян самим ветром!"

title_1_3="LORD PHOSMIR"
dialogue_1_3="А вон тот валун, ах! Круглый, как королевская корона, и тяжёлый, как моё величие! Истинная жемчужина среди камней."

title_1_4="GREENCAP"
dialogue_1_4="Эм... здесь ничего нет... просто скалы."

title_1_5="LORD PHOSMIR"
dialogue_1_5="ПРОСТО скалы?! Это оскорбление моей чести, моего трона и каждого великолепного утёса, носящего моё имя!"

title_1_6="LORD PHOSMIR"
dialogue_1_6="Никто не высмеивает моё каменное королевство и не уходит невредимым!"

title_1_7="LORD PHOSMIR"
dialogue_1_7="Я раздавлю тебя, как жалкую гальку, которую ты из себя представляешь! Или восстану как призрак, клянусь!"

dialogue_1_8="END"

[shelly]

title_1_0="SHELLY"
dialogue_1_0="ЭЙ! А ну-ка убрал свои грязные руки, гриб!"

title_1_1="GREENCAP"
dialogue_1_1="Ого... извини! Я думал, ты просто... обычная ракушка."

title_1_2="SHELLY"
dialogue_1_2="Обычная?! Ты что, не видишь этот блеск? Я великолепна, безупречный шедевр моря!"

title_1_3="GREENCAP"
dialogue_1_3="Э-э... да. Ты... очень блестящая."

title_1_4="SHELLY"
dialogue_1_4="Конечно! Каждая рябь на моей раковине ловит свет, как драгоценный камень. Вообще, тебе уже повезло, что ты просто разговариваешь со мной!"

title_1_5="SHELLY"
dialogue_1_5="И что это ты тут делаешь, шастаешь?"

title_1_6="GREENCAP"
dialogue_1_6="Я на задании... и довольно важном, на самом деле!"

title_1_7="SHELLY"
dialogue_1_7="На задании? Ха! Как ты можешь преуспеть без такой сияющей раковины, как моя? Что ж, тогда я почтю тебя своим присутствием."

title_1_8="GREENCAP"
dialogue_1_8="Подожди... так ты идёшь со мной?"

title_1_9="SHELLY"
dialogue_1_9="Естественно! Героям нужны компаньоны, а компаньоны должны быть ослепительными. Потом поблагодаришь меня, когда все будут смотреть на меня, а не на тебя."

dialogue_1_10="END"

[gregador_ending]

title_1_0="GREGADOR"
dialogue_1_0="Поговори со своим старейшиной, я готов сделать свою часть."

dialogue_1_1="BACK"

title_2_0="GREGADOR"
dialogue_2_0="Удачи, дорогой гриб, пусть у тебя всё получится!"

dialogue_2_1="BACK"

[elder_ending]

title_1_0="ELDER GEPU"
dialogue_1_0="Похоже, время настало, Гринкэп. За этими вратами Зверь ждёт тебя снова."
title_1_1="ELDER GEPU"
dialogue_1_1="Это будет нелёгкая битва... но если ты устоишь и победишь его, Зверь подчинится твоей силе."
title_1_2="ELDER GEPU"
dialogue_1_2="Ты вырос гораздо больше, чем я мог себе представить. Твой дядя так гордился бы твоими достижениями."
title_1_3="ELDER GEPU"
dialogue_1_3="Грегадор, играй мелодию. Пусть ветры унесут этот момент в отголоски истории."
dialogue_1_4="END"

title_2_0="ELDER GEPU"
dialogue_2_0="Свершилось... Врата открыты. И путь к твоей судьбе лежит за ними."
title_2_1="ELDER GEPU"
dialogue_2_1="Да прибудет благодать Матери-Мицелия и Отца-Ветра за твоей спиной."
title_2_2="ELDER GEPU"
dialogue_2_2="Ни пуха и ни пера, Гринкэп. Все мы будем мысленно с тобой."
dialogue_2_3="END"

title_3_0="ELDER GEPU"
dialogue_3_0="Спасибо тебе, Гринкэп, за всё твои свершения."
title_3_1="ELDER GEPU"
dialogue_3_1="Ты прошёл через это путешествие с отвагой и сердцем."
dialogue_3_2="BACK"

[gleo]

title_1_0="GLEO"
dialogue_1_0="У этого Мершрума есть неплохой товар, но ничего, что действительно повышает твою Броню."

title_1_1="GLEO"
dialogue_1_1="Знаешь, для чего нужна Броня? Пока у тебя есть Броня, враги наносят тебе меньше урона!"

title_1_2="GLEO"
dialogue_1_2="Но как только Броня кончится, то считай не повезло. Вернуть её не так просто, как просто исцелиться с помощью Идола."

title_1_3="GLEO"
dialogue_1_3="Но иногда, когда враги умирают, они роняют Осколки Брони. Подбирай их, и ты понемногу восстановишь свою Броню."

dialogue_1_4="BACK"

[pob]

title_1_0="POB"
dialogue_1_0="Ты входишь в наш лагерь, путник. Мы не воры, мы просто... выжившие. Но чужаки здесь долго не задерживаются..."
title_1_1="POB"
dialogue_1_1="Наш лидер — Нита. Поговори с ней, возможно, ты ей будешь полезен."
dialogue_1_2="BACK"

title_2_0="POB"
dialogue_2_0="Ниту трудно впечатлить. Теперь ты один из нас, дружок."
dialogue_2_1="BACK"

[gritta]

title_1_0="GRITTA"
dialogue_1_0="Мир считает нас бандитами. Ну и пусть. Здесь мы свободны."
dialogue_1_1="BACK"

title_2_0="GRITTA"
dialogue_2_0="Ты доказал себя. Ты теперь один из нас!"
title_2_1="GRITTA"
dialogue_2_1="Здесь только свобода и ветер, треплющий твою шляпку."
dialogue_2_2="BACK"

[blepp]

title_1_0="BLEPP"
dialogue_1_0="Жизнь здесь не такая уютная, как в деревнях. Ни стен, ни крыш, только ветер."
title_1_1="BLEPP"
dialogue_1_1="Но через время привыкаешь. Камни становятся подушкой, костёр — крышей, а звёзды — потолком."
dialogue_1_2="BACK"

title_2_0="BLEPP"
dialogue_2_0="Теперь, когда ты один из нас, ты почувствуешь это в дикой природе."
title_2_1="BLEPP"
dialogue_2_1="Ветер стал теплее... чувствуешь, да?"
dialogue_2_2="BACK"

[schleepo]

title_1_0="SCHLEEPO"
dialogue_1_0="Я слышал, кто-то из наших пал в шахтах на востоке..."
title_1_1="SCHLEEPO"
dialogue_1_1="Коварное место, эти туннели. Если у тебя есть хоть капля здравого смысла, держись подальше."
dialogue_1_2="BACK"

title_2_0="SCHLEEPO"
dialogue_2_0="А, ты пошёл в те шахты... и вернулся живым?"
title_2_1="SCHLEEPO"
dialogue_2_1="Ха, храбрый или глупый, в любом случае, я впечатлён."
dialogue_2_2="BACK"


[nita]

title_1_0="NITA"
dialogue_1_0="Итак... ты забрёл в мой лагерь. Немногие осмеливаются, и ещё меньше остаются стоять передо мной."
title_1_1="NITA"
dialogue_1_1="Мы не преступники. Мы бойцы. Клан, закалённый в изгнании, где тень Духа-Зверя не падает."
title_1_2="NITA"
dialogue_1_2="И кто ты, малёк? У тебя есть оружие... но ты выглядишь слишком юным, чтобы им владеть."
title_1_3="GREENCAP"
dialogue_1_3="Я Гринкэп! Из Вудби. И я выполняю очень важное задание."
title_1_4="NITA"
dialogue_1_4="Вудби... место, которое Зверь со временем поглотит. Мне довелось видеть, как слишком много деревень исчезали в тишине."
title_1_5="GREENCAP"
dialogue_1_5="Этого не произойдёт! Я добьюсь того, чтобы Зверь больше никому не причинил вреда!"
title_1_6="NITA"
dialogue_1_6="Хах... такая дерзость от такого маленького гриба. Ты стоишь один, но твердишь так, будто за тобой целая армия."
title_1_7="NITA"
dialogue_1_7="Возможно, этот пыл сослужит тебе службу здесь. Нам не помешает ещё одна сильная рука в нашей банде бойцов..."
title_1_8="NITA"
dialogue_1_8="И тебе может пригодиться наша сила, когда твоя отвага встретится с истинными когтями Зверя."
title_1_9="GREENCAP"
dialogue_1_9="Много друзей не бывает!"
title_1_10="NITA"
dialogue_1_10="Хех... мудрость из уст дитя."
title_1_11="NITA"
dialogue_1_11="Но наша связь не дозволена незнакомцам. Её нужно заслужить."
title_1_12="NITA"
dialogue_1_12="Один из наших погиб, и дикая природа забрала его. Но его знак отличия остался..."
title_1_13="NITA"
dialogue_1_13="Найди его и принеси обратно. Докажи, что ты можешь преуспеть там, где другой бы не смог."
title_1_14="NITA"
dialogue_1_14="И когда вернёшься... выгляди достойно. Бойца оценивают не только по его натуре, но и по тому, что ты должен выглядеть как боец."
title_1_15="NITA"
dialogue_1_15="Сделай это, и, возможно... возможно, ты будешь стоять среди нас."
dialogue_1_16="END"

title_2_0="NITA"
dialogue_2_0="Найди Знак Отличия одного из наших павших членов, и вернись, прямо как боец..."
title_2_1="NITA"
dialogue_2_1="Тогда, возможно, я позволю тебе присоединиться к нашей банде бойцов."
dialogue_2_2="BACK"

title_3_0="NITA"
dialogue_3_0="Ты несёшь Знак Отличия нашего клана... но ты не выглядишь как боец."
title_3_1="NITA"
dialogue_3_1="Вернись, когда на тебе будет одежда бойца, достойного Диких Шляпок."
dialogue_3_2="BACK"

title_4_0="NITA"
dialogue_4_0="Твоя одежда говорит о битве... но я не вижу на тебе Знака Отличия."
title_4_1="NITA"
dialogue_4_1="Найди знак, который носил наш павший родич, и только тогда ты сможешь стоять среди нас."
dialogue_4_2="BACK"

title_5_0="NITA"
dialogue_5_0="Ты носишь Знак Отличия павшего, и ты одет как один из нас!"
title_5_1="NITA"
dialogue_5_1="Неожиданно... но, видимо, дикая природа всё же выковала в тебе воина."
title_5_2="NITA"
dialogue_5_2="Увидимся в пещере дальше. Там тебя ждёт обряд посвящения..."
dialogue_5_3="END"

title_6_0="NITA"
dialogue_6_0="Ты хорошо навалял мне в нашем поединке, и я рада, что ты на нашей стороне."
dialogue_6_1="BACK"

[nita_boss]

title_1_0="NITA"
dialogue_1_0="Ты доказал свою находчивость... ты нашёл Знак Отличия и выглядишь как боец."

title_1_1="NITA"
dialogue_1_1="Но одних символов и одежды недостаточно, чтобы сделать из тебя воина."

title_1_2="NITA"
dialogue_1_2="Осталось последнее испытание. Сталь против стали, дух против духа."

title_1_3="NITA"
dialogue_1_3="Сразись со мной сейчас, Гринкэп, и покажи, что твоя сила — это правда, а не притворство."

dialogue_1_4="END"

title_2_0="NITA"
dialogue_2_0="Впечатляюще... ты сражался с пылом самой дикой природы."

title_2_1="NITA"
dialogue_2_1="Немногие побеждали меня, и ещё меньше — без страха. Ты заслужил моё уважение."

title_2_2="NITA"
dialogue_2_2="С этого дня - ты один из Диких Шляпок."

title_2_3="NITA"
dialogue_2_3="Теперь же иди, глубже в эту пещеру. Там находится дар великой силы, ожидающий того, кто достоин его получить."

dialogue_2_4="END"

[screw_sentinel]

title_1_0="SCREW SENTINEL"
dialogue_1_0="Нарушитель... нет, паломник. Ты стоишь перед Болтовым Стражем, последним из старых хранителей железа и шестерён."

title_1_1="SCREW SENTINEL"
dialogue_1_1="Когда-то мы вращались на службе у наших создателей. Отныне остались только ржавчина и тишина."

title_1_2="SCREW SENTINEL"
dialogue_1_2="Пока многие отвернулись от твоего рода, лишь я один помню глупость их путей..."

title_1_3="SCREW SENTINEL"
dialogue_1_3="Но тень гложет меня. Мой разум больше не полностью мой, и я боюсь, что путь предательства также может забрать меня."

title_1_4="SCREW SENTINEL"
dialogue_1_4="Я вижу перед собой только Одинокого Гриба - странника, которому суждено ходить по руинам давно покинутых королевств."

title_1_5="SCREW SENTINEL"
dialogue_1_5="Я не могу свободно уступить тебе. Моё предназначение всё ещё связывает меня. Если ты хочешь претендуешь на то, что осталось от древних..."

title_1_6="SCREW SENTINEL"
dialogue_1_6="Срази меня, маленькая спора, и позволь моим шестерням замолчать. В твоей победе мастерство древних вновь возродится."

title_1_7="GREENCAP"
dialogue_1_7="Я ничего не понимаю из того, что ты сказал..."

title_1_8="GREENCAP"
dialogue_1_8="Но если мне придётся сражаться с тобой - то как скажешь."

dialogue_1_9="END"

[tinkercap]

title_1_0="GREENCAP"
dialogue_1_0="Вау, что это?"
title_1_1="TINKERCAP"
dialogue_1_1="Это дело всей моей жизни!! Статуя, не похожая ни на какую другую, а когда она пробудится - она будет говорить, направлять и защищать сам грибной род!"
title_1_2="TINKERCAP"
dialogue_1_2="Я сконструировал тело, шестерни, хоральный канал... но она просто никак не оживает!"
title_1_3="TINKERCAP"
dialogue_1_3="Шестерни продолжают заедать, останавливаясь после нескольких тиков. Я пробовал смазывать их желудёвым маслом, мшистым маслом, и даже маслом из улиточной слизи!"
title_1_4="TINKERCAP"
dialogue_1_4="Но ни одно не достаточно скользкое. Бедненького каждый раз заклинивает, словно отказывается двигаться без чего-то... большего."
title_1_5="TINKERCAP"
dialogue_1_5="Должно быть, не хватает какого-то компонента! Что-то древнее, что-то достаточно мощное, чтобы заставить сам камень дышать!"
title_1_6="GREENCAP"
dialogue_1_6="Какая классная работа!"
title_1_7="TINKERCAP"
dialogue_1_7="Угу. Ты знаешь о Фунгалии? О месте, где даже стены были живы изобретениями!"
title_1_8="TINKERCAP"
dialogue_1_8="У древних были знания, которые мы давно потеряли, механизмы, которые двигались, говорили и даже мыслили, как живые машины!"
title_1_9="GREENCAP"
dialogue_1_9="Да, я там был!"
title_1_10="TINKERCAP"
dialogue_1_10="Клянусь Мицелией! Ты видел его?! Тогда, если не против, ты мог бы вернуться туда... для меня."
title_1_11="TINKERCAP"
dialogue_1_11="Поищи в его руинах, разузнай все секреты, какие сможешь. Может быть, даже найди один из их древних инструментов."
title_1_12="TINKERCAP"
dialogue_1_12="Что-то такое, что наконец даст этой статуе искру жизни!"
title_1_13="GREENCAP"
dialogue_1_13="Конечно, я помогу тебе!"
dialogue_1_14="END"

title_2_0="TINKERCAP"
dialogue_2_0="Ты нашёл что-нибудь полезное в Фунгалии, чтобы вдохнуть жизнь в моё творение?"
title_2_1="GREENCAP"
dialogue_2_1="Ещё нет, извини!"
dialogue_2_2="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Я нашёл древнее масло... оно может помочь?"
title_3_1="TINKERCAP"
dialogue_3_1="Великой Матерью-Мицелия... поразительно! Возможно, это именно то, что мне нужно. Давай же попробуем немедленно!"
dialogue_3_2="END"

title_4_0="TINKERCAP"
dialogue_4_0="...Проклятье. Шестерни идут, но даже это масло не может пробудить статую..."
title_4_1="TINKERCAP"
dialogue_4_1="Возможно... похоже, жизнь не создаётся одной лишь механикой. Наверняка, когда-то эти машины связывала магия."
title_4_2="TINKERCAP"
dialogue_4_2="Если так, то неудивительно, что не получается. Магия запрещена даже здесь, из-за страха перед Духом-Зверем."
title_4_3="TINKERCAP"
dialogue_4_3="Тем не менее... это масло замечательное. Слишком хорошее, чтобы тратить впустую. И я вижу, ты орудуешь хлыстом, не так ли?"
title_4_4="TINKERCAP"
dialogue_4_4="Принеси мне нужные детали, и я сконструирую для тебя оружие с нуля. А с этим маслом оно будет мощным!"
title_4_5="TINKERCAP"
dialogue_4_5="Оно должно быть из верёвочного материала, а не из цепей! И нам понадобится рукоять для хлыста!"
title_4_6="GREENCAP"
dialogue_4_6="Посмотрю, что смогу сделать!"
dialogue_4_7="END"

title_5_0="TINKERCAP"
dialogue_5_0="Принеси мне верёвку и подходящую рукоять! С ними, и этим древним маслом, я создам оружие, достойное героя."
dialogue_5_1="BACK"

title_6_0="GREENCAP"
dialogue_6_0="Я нашёл верёвку и рукоять для хлыста, это сработает?"
title_6_1="TINKERCAP"
dialogue_6_1="Ещё как!"
title_6_2="TINKERCAP"
dialogue_6_2="Сначала заплетём верёвку как можно туже, чтобы не было свободных прядей, а то она лопнет при первом же ударе!"
title_6_3="TINKERCAP"
dialogue_6_3="Теперь прикрепим её к рукояти железными зажимами... крепко, как корень камня!"
title_6_4="TINKERCAP"
dialogue_6_4="Теперь... нальём масло. Смотри, как оно впитывается, словно сама верёвка пьёт силу."
title_6_5="TINKERCAP"
dialogue_6_5="И наконец, искра... один поцелуй пламени, чтобы скрепить связь..."
title_6_6="TINKERCAP"
dialogue_6_6="ВУАЛЯ! Хлыст, рождённый мастерством, маслом и огнём! Гибкий, как лиана, и яростный, как солнце!"
title_6_7="TINKERCAP"
dialogue_6_7="Возьми его, герой. Пользуйся им хорошо. Такое оружие заслуживает геройской руки."
title_6_8="GREENCAP"
dialogue_6_8="Спасибо, Тинкеркэп!"
dialogue_6_9="END"

title_7_0="TINKERCAP"
dialogue_7_0="Возможно, однажды нам позволят использовать магию, и тогда я вдохну жизнь во все статуи!"
dialogue_7_1="BACK"

[girba]

title_1_0="GRIBA"
dialogue_1_0="Что спорится?"
title_1_1="GREENCAP"
dialogue_1_1="Я просто исследую!"
title_1_2="GRIBA"
dialogue_1_2="Исследователь, да? Ну, угадай что? Я тоже!"
title_1_3="GRIBA"
dialogue_1_3="Только не пещер или руин... я исследователь еды!"
title_1_4="GRIBA"
dialogue_1_4="Однажды, давным-давно, я попробовал кое-что, что никогда не забуду... суфле, лёгкое как воздух, со вкусом моря в каждом кусочке."
title_1_5="GRIBA"
dialogue_1_5="Кажется, оно называлось... Сифлé␀!"
title_1_6="GRIBA"
dialogue_1_6="Я до сих пор помню это! Солёность, насыщенность, словно глотаешь кусочек души океана."
title_1_7="GRIBA"
dialogue_1_7="В море полно богатых, таинственных питательных веществ. Каждый кусочек ощущается так, будто ешь прилив самой жизни!"
title_1_8="GRIBA"
dialogue_1_8="Я всё искал и искал его, но больше никогда не находил. Если ты когда-нибудь наткнёшься на такое блюдо... принеси его мне! Пожалуйста!"
title_1_9="GRIBA"
dialogue_1_9="Мне хотел бы ещё разочек насладиться этим вкусом."
title_1_10="GREENCAP"
dialogue_1_10="Конечно, это звучит достаточно легко!"
dialogue_1_11="END"

title_2_0="GRIBA"
dialogue_2_0="Если ты когда-нибудь наткнёшься на суфле с морским вкусом, пожалуйста... принеси мне. Я отдал бы всё, чтобы попробовать его ещё раз!"
dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Эй, Гриба, я нашёл кое-что, что пахнет океаном... это то, о чём ты говорил?"
title_3_1="GRIBA"
dialogue_3_1="Клянусь спорами!! Этот солёный аромат, насыщенное, маслянистое великолепие! Именно так, как я помню!"
title_3_2="GRIBA"
dialogue_3_2="Дай-ка мне попробовать... да! О да, это оно! Настоящее Сифле!"
title_3_3="GRIBA"
dialogue_3_3="Я не пробовал такого с тех пор, как был совсем маленькой шляпкой и сидел на берегу с друзьями..."
title_3_4="GRIBA"
dialogue_3_4="Вкус... запах... словно само море обнимает тебя!"
title_3_5="GRIBA"
dialogue_3_5="Спасибо тебе, друг. Ты вернул мне память, которую я считал давно ушедшей."
title_3_6="GRIBA"
dialogue_3_6="Держи вот это. Оно не так вкусно, как Сифле, но для меня это нечто особенное."
dialogue_3_7="END"

title_4_0="GRIBA"
dialogue_4_0="Подумать только, что смогу снова ощутить этот вкус. Это как будто кусочек моего прошлого вернулся, чтобы составить мне компанию."
dialogue_4_1="BACK"

[rodhatt_home]

title_1_0="GREENCAP"
dialogue_1_0="Рёдхатт, так ты здесь живёшь?"
title_1_1="RÖDHATT"
dialogue_1_1="Ммм! Уютненько, правда? Когда-то я присоединилась к Бродячим Шляпкам некоторое время назад, будучи всегда в поисках приключений и новых друзей..."
title_1_2="RÖDHATT"
dialogue_1_2="А потом Дверп нашёл меня и втянул в свою банду, но теперь с этой ерундой покончено."
title_1_3="GREENCAP"
dialogue_1_3="Так что ты будешь делать теперь?"
title_1_4="RÖDHATT"
dialogue_1_4="Хмм... Я всё ещё хочу приключений, но на этот раз с кем-то, кому действительно не всё равно. С кем-то... приятным."
title_1_5="GREENCAP"
dialogue_1_5="Может, когда я закончу свою миссию, мы могли бы отправиться в приключение вместе?"
title_1_6="RÖDHATT"
dialogue_1_6="Мне... очень этого бы хотелось!"
title_1_7="GREENCAP"
dialogue_1_7="Мы могли бы увидеть новые места, найти скрытые уголки мира!"
title_1_8="RÖDHATT"
dialogue_1_8="И не торопиться, да? Без спешки, просто... наслаждаться путешествием."
title_1_9="GREENCAP"
dialogue_1_9="Именно. Только ты и я, исследующие мир!"
title_1_10="RÖDHATT"
dialogue_1_10="Звучит замечательно, и думаю, мы были бы хорошей командой!"
title_1_11="GREENCAP"
dialogue_1_11="Кстати... у меня есть для тебя подарок!"
title_1_12="RÖDHATT"
dialogue_1_12="Подарок, для меня?"
title_1_13="RÖDHATT"
dialogue_1_13="Перо? Оно прекрасное! Оно такое... особенное."
title_1_14="RÖDHATT"
dialogue_1_14="Ну, как я выгляжу?"
title_1_15="GREENCAP"
dialogue_1_15="Тебе идёт!"
title_1_16="RÖDHATT"
dialogue_1_16="Хи-хи... спасибки."
title_1_17="RÖDHATT"
dialogue_1_17="Когда твоя миссия закончится, приходи ко мне, хорошо? Я буду ждать."
dialogue_1_18="END"

title_2_0="RÖDHATT"
dialogue_2_0="С нетерпением жду приключений с тобой, я буду ждать тебя здесь!"

dialogue_2_1="BACK"

[morker_home]

title_1_0="GREENCAP"
dialogue_1_0="Моркер, так это твоё место, да?"
title_1_1="MORKER"
dialogue_1_1="..."
title_1_2="MORKER"
dialogue_1_2="Да, я здесь живу."
title_1_3="GREENCAP"
dialogue_1_3="Итак, как дела в банде?"
title_1_4="MORKER"
dialogue_1_4="Мы распались."
title_1_5="GREENCAP"
dialogue_1_5="Ах... мне жаль это слышать. Надеюсь, это не из-за меня."
title_1_6="MORKER"
dialogue_1_6="Из-за тебя, но..."
title_1_7="MORKER"
dialogue_1_7="...так даже к лучшему. Эти дураки всё равно были ниже меня."
title_1_8="MORKER"
dialogue_1_8="Вступать в их банду было ошибкой."
title_1_9="MORKER"
dialogue_1_9="А ты хорошо сражался в нашей битве, Гринкэп."
title_1_10="MORKER"
dialogue_1_10="Я... уважаю это."
title_1_11="GREENCAP"
dialogue_1_11="И ты тоже не промах! Так что ты теперь будешь делать?"
title_1_12="MORKER"
dialogue_1_12="Я сосредоточусь на... рисовании."
title_1_13="GREENCAP"
dialogue_1_13="Это круто!"
title_1_14="MORKER"
dialogue_1_14="Ага... что ты думаешь о моей картине, пока что?"
title_1_15="GREENCAP"
dialogue_1_15="Выглядит хорошо!"
title_1_16="MORKER"
dialogue_1_16="..."
dialogue_1_17="END"

title_2_0="GREENCAP"
dialogue_2_0="Как идёт работа на картиной?"
title_2_1="MORKER"
dialogue_2_1="Хорошо."
dialogue_2_2="BACK"

[putch_home]

title_1_0="GREENCAP"
dialogue_1_0="Путч, ты живёшь здесь один?"
title_1_1="PUTCH"
dialogue_1_1="Ага! Это моя хата!"
title_1_2="GREENCAP"
dialogue_1_2="Как там банда?"
title_1_3="PUTCH"
dialogue_1_3="Да не знаю... Я не думаю, что мы ещё будем заниматься бандитскими делами."
title_1_4="PUTCH"
dialogue_1_4="Нам действительно не стоило идти на этот дурацкий квест..."
title_1_5="PUTCH"
dialogue_1_5="Нам надрали ножки, хех... но зато это было весело, пока это происходило!"
title_1_6="GREENCAP"
dialogue_1_6="Так... что ты теперь будешь делать?"
title_1_7="PUTCH"
dialogue_1_7="Я подумываю заняться кузнечным делом!"
title_1_8="PUTCH"
dialogue_1_8="Но у меня тут тесновато... не уверен, что смогу разместить здесь кузницу."
title_1_9="PUTCH"
dialogue_1_9="Наверно, построю что-нибудь снаружи!"
title_1_10="GREENCAP"
dialogue_1_10="Звучит здорово! Ты точно умеешь махать молотом!"
title_1_11="PUTCH"
dialogue_1_11="Да! И если мы когда-нибудь снова сразимся, я обязательно позавтракаю как минимум три раза!"
title_1_12="GREENCAP"
dialogue_1_12="Хех... тогда ты, наверное, выиграешь. Увидимся!"
dialogue_1_13="END"


dialogue_1_17="END"

title_2_0="PUTCH"
dialogue_2_0="Я стану лучшим кузнецом в мире!"
title_2_1="GREENCAP"
dialogue_2_1="Уверен, что станешь!"
dialogue_2_2="BACK"

[dwerp_home]

title_1_0="GREENCAP"
dialogue_1_0="Дверп... так ты снова здесь ошиваешься?"
title_1_1="DWERP"
dialogue_1_1="Ну да... кто-то же должен быть свидетелем моих страданий, раз ты разрушил мои планы."
title_1_2="GREENCAP"
dialogue_1_2="Мне... жаль, что так вышло с тем хаосом."
title_1_3="DWERP"
dialogue_1_3="Жаль? Ха! Ты растоптал мои гениальные идеи и оставил меня ни с чем."
title_1_4="GREENCAP"
dialogue_1_4="Ну и... что ты теперь будешь делать?"
title_1_5="DWERP"
dialogue_1_5="Хрен знает... наверно, чё-то такое, чё не требует участия кого-то ещё, кто всё облопошит!"
title_1_6="DWERP"
dialogue_1_6="Может, займусь зубрёжкой... или буду дрыхнуть... или пялиться на стену. Да, стена подойдёт."
title_1_7="GREENCAP"
dialogue_1_7="Ээ.. звучит расслабляюще, по крайней мере."
title_1_8="DWERP"
dialogue_1_8="Да забей. Я не предлагаю тебе присоединиться. Хотя... может, позже, когда я восстановлю своё достоинство."
title_1_9="GREENCAP"
dialogue_1_9="Хех, я подожду, и может, я смогу быть частью банды в следующем задании?"
title_1_10="DWERP"
dialogue_1_10="Ага... Чётко! А теперь оставь меня с моими страданиями... то есть, хобби."

dialogue_1_11="END"

title_2_0="DWERP"
dialogue_2_0="Я всё ещё строю планы... медленно... молчаливо..."
dialogue_2_1="BACK"

[ending_dialogue]
title_1_0="GREGADOR"
dialogue_1_0="Что случилось с вратами?"
title_1_1="ELDER GEPU"
dialogue_1_1="Я не знаю..."
title_1_2="GREGADOR"
dialogue_1_2="Неужели Гринкэп... потерпел неудачу?"
title_1_3="ELDER GEPU"
dialogue_1_3="Я так не думаю..."
title_1_4="ELDER GEPU"
dialogue_1_4="Я чую разницу в воздухе... Ты тоже чувствуешь?"
title_1_5="GREGADOR"
dialogue_1_5="Чувствую... Он стал легче. Почти... гудит."
title_1_6="ELDER GEPU"
dialogue_1_6="Значит, возможно, он преуспел. Только что с ним стало?"
title_1_7="GREGADOR"
dialogue_1_7="Мелодия Спор... она продолжается. Где бы он сейчас ни был, теперь он её часть."
dialogue_1_8="END"

[sweetums]
title_1_0="GREENCAP"
dialogue_1_0="Хэй, что ты делаешь?"
title_1_1="SWEETUMS"
dialogue_1_1="Уф! Ничего. Мне смертельно скучно! Это место хуже некуда!"
title_1_2="SWEETUMS"
dialogue_1_2="Всё здесь просто... гниёт! И я гнию вместе с ним, от чистой скуки!"
title_1_3="GREENCAP"
dialogue_1_3="Да... не похоже на веселье."
title_1_4="SWEETUMS"
dialogue_1_4="И не говори! Я хочу действий! Чего-то захватывающего! А не просто гниющих листьев и тихого ветра целыми днями!"
title_1_5="SWEETUMS"
dialogue_1_5="И не говоря уже о том, что от всей этой гнили у меня обострилась аллергия. *шмыг* В последнее время всё чихаю и чихаю..."
title_1_6="SWEETUMS"
dialogue_1_6="Так что насчёт тебя, а? Ты выглядишь так, будто действительно куда-то направляешься."
title_1_7="GREENCAP"
dialogue_1_7="Я на миссии, чтобы спасти грибной род!"
title_1_8="SWEETUMS"
dialogue_1_8="...Спасти грибной род, да? Вы, грибы, может, и мягкие, но, похоже, ты обладаешь мушеством!"
title_1_9="SWEETUMS"
dialogue_1_9="Как насчёт того, чтобы я пошёл с тобой? Моя колючая раковина твёрдая, как сталь, и может напугать даже голодного кабана... я это знаю по опыту!"
title_1_10="GREENCAP"
dialogue_1_10="Ха! Похоже, мне пригодился бы кто-то вроде тебя. Давай-ка выберемся отсюда!"
dialogue_1_11="END"


