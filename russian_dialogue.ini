[chiitake_1]
title_1_0="MASTER SHIITOKO"
dialogue_1_0="Кто там идёт?"

title_1_1="GREENCAP"
dialogue_1_1="Мастер Шиитоко! Простите, если потревожил ваш покой."

title_1_2="MASTER SHIITOKO"
dialogue_1_2="Покой нынче редкость, мой мальчик. Я почувствовал сегодняшние толчки..."

title_1_3="GREENCAP"
dialogue_1_3="Старейшина послал меня... я направляюсь в Храм Призмы, чтобы услышать пророчество оракула."

title_1_4="MASTER SHIITOKO"
dialogue_1_4="Хмм. Я ждал, когда настанет этот день. Храм впереди, но путь к нему не охраняется абы как."

title_1_5="MASTER SHIITOKO"
dialogue_1_5="Зверь с крепкой шкурой бродит у входа. Твой хлыст сам по себе не пробьёт его защиту."

title_1_6="MASTER SHIITOKO"
dialogue_1_6="Но... я могу научить тебя приёму как ослабить его."

title_1_7="GREENCAP"
dialogue_1_7="Прошу вас, Мастер! Научите меня!"

title_1_8="MASTER SHIITOKO"
dialogue_1_8="Прекрасно. Я обучу тебя Фунг-Фу."

title_1_9="GREENCAP"
dialogue_1_9="Что такое Фунг-Фу?"

title_1_10="MASTER SHIITOKO"
dialogue_1_10="Это древнее грибное искусство, при котором, насыщая врага своими спорами, ты ослабляешь его защиту."

title_1_11="MASTER SHIITOKO"
dialogue_1_11="И только те, кто силён волей и решимостью, могут овладеть им..."

title_1_12="MASTER SHIITOKO"
dialogue_1_12="Заберись на бамбуковое дерево в моём дворе, и помедитируй на вершине."

title_1_13="MASTER SHIITOKO"
dialogue_1_13="Я буду вести тебя сквозь поры твоего разума. Когда очнёшься, ты будешь знать Фунг-Фу."

title_1_14="GREENCAP"
dialogue_1_14="Спасибо, Мастер. Я сделаю всё возможное!"

dialogue_1_15="END"

