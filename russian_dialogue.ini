dialogue_2_1="SHOP"

[trametheus]

title_1_0="TRAMETHEUS"
dialogue_1_0="Кто осмеливается ступать под моей корой?"

title_1_1="GREENCAP"
dialogue_1_1="Я Гринкэп. Я стремлюсь приручить Духа-Зверя и принести мир грибному роду."

title_1_2="TRAMETHEUS"
dialogue_1_2="Благородная цель... когда-то и мой род мечтал о таких деяниях."

title_1_3="GREENCAP"
dialogue_1_3="Я ищу место под названием Забытое Святилище. Ты знаешь, где оно?"

title_1_4="TRAMETHEUS"
dialogue_1_4="Забытое... да, хотя раньше оно носило другое имя, когда время было ещё юным."

title_1_5="TRAMETHEUS"
dialogue_1_5="В те дни мы тоже плели королевства, не из камня, а из коры и спор! Мы правили терпеливо, а не силой."

title_1_6="TRAMETHEUS"
dialogue_1_6="Но та эпоха увяла. Я остался здесь один, корни глубоко вросли, а тишина грызла мой дух."

title_1_7="TRAMETHEUS"
dialogue_1_7="Возможно, я последний из моей рощи... но всё же мои отростки тянутся сквозь тайные места."

title_1_8="TRAMETHEUS"
dialogue_1_8="Да... я помогу тебе. Позволь моим кончикам протянуться мостами там, где их нет."

title_1_9="TRAMETHEUS"
dialogue_1_9="Ударь по моим пальцам, и они вытянутся. Старые пути расцветут вновь под твоими шагами."

title_1_10="TRAMETHEUS"
dialogue_1_10="Да направит это тебя к Святилищу, что ты ищешь."

title_1_11="GREENCAP"
dialogue_1_11="Благодарю тебе, древний. Я не забуду твоей помощи!"

dialogue_1_12="END"

title_2_0="TRAMETHEUS"
dialogue_2_0="Ударь по моим пальцам, и я протяну их для тебя. Пути, давно закрытые, могут вновь расцвести под твоими шагами."

dialogue_2_1="BACK"

[gippa_1]

title_1_0="GIPPA"
dialogue_1_0="Извините, но вы меня беспокоите. Я занят очень важным исследованием."

title_1_1="GIPPA"
dialogue_1_1="Пожалуйста, уходите."

dialogue_1_2="BACK"

title_2_0="GIPPA"
dialogue_2_0="Вы мне мешаете..."
title_2_1="GREENCAP"
dialogue_2_1="Я нашёл кое-что похожее на то, что у вас нарисовано."
title_2_2="GIPPA"
dialogue_2_2="Клянусь своей ножкой! Это... это же действительно похоже на то, что я набросал!"
title_2_3="GIPPA"
dialogue_2_3="Где вы это раздобыли?"
title_2_4="GREENCAP"
dialogue_2_4="Я нашёл это в руинах Храма Призмы."
title_2_5="GIPPA"
dialogue_2_5="Ну конечно... это всё объясняет. Видите ли, я историк. Я посвятил свои исследования реликвиям и забытому оружию."
title_2_6="GIPPA"
dialogue_2_6="То, что у вас в руках, может быть не простой безделушкой. Это наконечник оружия, известного как, Зверохлёст!"
title_2_7="GIPPA"
dialogue_2_7="Легендарный хлыст, которым когда-то владел древний герой, известный только как Гронсвамп. Его имя стерлось, но его оружие продолжает жить слухах."
title_2_8="GIPPA"
dialogue_2_8="Для начала, вам понадобится бронзовая цепь, чтобы прикрепить эту безделушку, так же, как это делал сам герой."
title_2_9="GIPPA"
dialogue_2_9="Я не знаю, кто её продаёт, у Мершрума в городе её точно нет. Возможно, в своих странствиях вы найдёте того, кто несёт то, что нам нужно."
title_2_10="GIPPA"
dialogue_2_10="Возвращайтесь, когда найдёте бронзовую цепь, и мы сможем начать реконструкцию оружия."
dialogue_2_11="END"

title_3_0="GIPPA"
dialogue_3_0="Если вы действительно хотите восстановить Зверохлёст, то принесите бронзовую цепь, чтобы прикрепить эту безделушку."
dialogue_3_1="BACK"

title_4_0="GREENCAP"
dialogue_4_0="Я достал бронзовую цепь!"
title_4_1="GIPPA"
dialogue_4_1="Идеально. Немного грубовата, но сойдёт."
title_4_2="GIPPA"
dialogue_4_2="Мы можем прикрепить безделушку к этой цепи. Само по себе это будет неплохим оружием..."
title_4_3="GIPPA"
dialogue_4_3="Но истинная сила безделушки дремлет. Чтобы по-настоящему пробудить её, нужен ещё один компонент."
title_4_4="GIPPA"
dialogue_4_4="Его нужно покрыть алхимическим веществом, известным как Лазурная Пыль."
title_4_5="GIPPA"
dialogue_4_5="Один торговец, которого я знаю, продаёт её, хотя он... сомнительный. Он не Мершрум, а мутный тип с подозрительным товаром."
title_4_6="GIPPA"
dialogue_4_6="Его лавка находится в месте под названием Лагерь Бродячих Шляпок. К югу отсюда, может быть вы уже проходили мимо."
title_4_7="GIPPA"
dialogue_4_7="Принесите мне Лазурную Пыль, и тогда мы сможем перейти к следующему шагу."
dialogue_4_8="END"

title_5_0="GIPPA"
dialogue_5_0="Принесите мне Лазурную Пыль. Вы найдёте её у торговца в Лагере Бродячих Шляпок."
title_5_1="GIPPA"
dialogue_5_1="Сделайте это, и я скажу вам, как оружие может быть по-настоящему возрождено."
dialogue_5_2="BACK"

title_6_0="GREENCAP"
dialogue_6_0="Я достал Лазурную Пыль!"
title_6_1="GIPPA"
dialogue_6_1="Даже не хочу знать, что вам пришлось сделать, чтобы её достать."
title_6_2="GIPPA"
dialogue_6_2="Так, безделушку нужно будет прикрепить к цепи и покрыть Лазурной Пылью."
title_6_3="GIPPA"
dialogue_6_3="Но есть кое-что ещё. Оружие не может пробудиться без ритуала."
title_6_4="GIPPA"
dialogue_6_4="Выслушайте внимательно, ибо легенда гласит следующее..."
title_6_5="GIPPA"
dialogue_6_5="Давным-давно грибной род был на грани вымирания. Причина... утрачена во времени."
title_6_6="GIPPA"
dialogue_6_6="Но один выступил против конца, Гронсвамп. Он сражался с бесчисленными зверями, проходил руину за руиной, собирая немногочисленные выжившие споры."
title_6_7="GIPPA"
dialogue_6_7="Он нёс эти споры, последнюю надежду своего рода, до самой вершины мира."
title_6_8="GIPPA"
dialogue_6_8="Там, с последними силами, он прыгнул в воздух и разорвался на части, развеяв свои и их споры по ветру."
title_6_9="GIPPA"
dialogue_6_9="Так Отец-Ветер разнёс их, и благодаря этой жертве грибной род возродился."
title_6_10="GIPPA"
dialogue_6_10="Но поскольку никто до него не выжил, его деяния канули в безвестность, а его имя запомнилось только в слухах."
title_6_11="GIPPA"
dialogue_6_11="Итак, теперь ты должен пройти его путём. Заберись как можно выше, на самую вершину мира."
title_6_12="GIPPA"
dialogue_6_12="Там соедини безделушку, цепь и пыль. Только тогда Зверохлёст пробудится снова."
dialogue_6_13="END"

title_7_0="GIPPA"
dialogue_7_0="Заберись как можно выше, на самую вершину мира..."
title_7_1="GIPPA"
dialogue_7_1="Там соедини безделушку, цепь и пыль. Только тогда Зверохлёст пробудится снова."
dialogue_7_2="BACK"

title_8_0="GIPPA"
dialogue_8_0="Вот оно... оружие, возрождённое из легенды. Помочь в его возрождении — высшая честь для моей работы."
dialogue_8_1="BACK"

[wandercamp_shop]

