[village_elder]

title_1_0="GREENCAP"
dialogue_1_0="Старейшина Гэпу! Все ли в порядке? Я почувствовал, как мой дом сотрясали ужасные толчки!"

title_1_1="ELDER GEPU"
dialogue_1_1="Ах, Гринкэп... деревня в безопасности. Твоя забота о нашем роде согревает моё старое сердце."

title_1_2="ELDER GEPU"
dialogue_1_2="Но есть кое-что, что ты можешь сделать, и это связано с этими толчками."

title_1_3="ELDER GEPU"
dialogue_1_3="Похоже, это зов... Я полагаю, что Оракул Храма Призмы пробудился."

title_1_4="GREENCAP"
dialogue_1_4="Кто это?!"

title_1_5="ELDER GEPU"
dialogue_1_5="Древняя статуя, что старше любого из нас. Построенная древними грибами с помощью магии, которая раскрывает пути к судьбе."

title_1_6="ELDER GEPU"
dialogue_1_6="Если мы когда-нибудь победим Духа-Зверя, это древнее существо будет знать как именно."

title_1_7="GREENCAP"
dialogue_1_7="Но, старейшина... Дух-Зверь неуязвим! Никому ещё не удавалось его победить."

title_1_8="ELDER GEPU"
dialogue_1_8="Возможно... но я не могу допустить того, что случилось с деревней Топпо много лет назад, повторилось с Вудби."

title_1_9="ELDER GEPU"
dialogue_1_9="Оракул — наша единственная надежда."

title_1_10="ELDER GEPU"
dialogue_1_10="Зверь охотился на нас достаточно долго. Если есть хоть малейший шанс... мы должны им восспользовать!"

title_1_11="DWERP"
dialogue_1_11="Мы всё слышали! Не парься, Банда Фунг всё уладит!"

title_1_12="ELDER GEPU"
dialogue_1_12="Ни в коем случае! Так вы ещё и подслушивали?"

title_1_13="DWERP"
dialogue_1_13="Эй, то, что ты старейшина этой деревни, ещё не значит, что ты можешь нами командовать!"

title_1_14="DWERP"
dialogue_1_14="Банда Фунг разобьёт это пророчество! Я прав, ребята?"

title_1_15="PUTCH"
dialogue_1_15="Я разнесу всё, что встанет на нашем пути!"

title_1_16="MORKER"
dialogue_1_16="..."

title_1_17="RÖDHATT"
dialogue_1_17="Эм... да, полагаю!"

title_1_18="DWERP"
dialogue_1_18="Погнали, банда! Нас ждут богаства и слава!"

title_1_19="ELDER GEPU"
dialogue_1_19="Есть у них воля, только вот их сердца не на месте..."

title_1_20="ELDER GEPU"
dialogue_1_20="Если они доберутся до Оракула, они неверно истолкуют пророчество."

title_1_21="GREENCAP"
dialogue_1_21="Тогда я пойду! Я доберусь до Храма Призмы раньше них!"

title_1_22="ELDER GEPU"
dialogue_1_22="Я знал, что ты не останешься в стороне, малютка... Храм находится далеко на западе."

title_1_23="ELDER GEPU"
dialogue_1_23="Это древний город, погребённый глубоко под землёй, полный опасностей и тайн."

title_1_24="ELDER GEPU"
dialogue_1_24="И путь туда тоже опасен. Возьми-ка немного монет - возможно, ты сможешь найти полезные вещи в лавке."

title_1_25="GREENCAP"
dialogue_1_25="Я не подведу вас. Спасибо вам, старейшина!"

title_1_26="ELDER GEPU"
dialogue_1_26="Ах да, Гринкэп... ты вчера забыл здесь свой хлыст, так что держи его крепче. Да присмотрит за тобой Мицелия."

dialogue_1_27="END"


title_2_0="ELDER GEPU"
dialogue_2_0="Я буду ждать твоего возвращения..."

dialogue_2_1="BACK"


title_3_0="GREENCAP"
dialogue_3_0="Старейшина Гэпу! Я вернулся и узнал правду, стоящую за пророчеством!"

title_3_1="ELDER GEPU"
dialogue_3_1="Я слушаю, Гринкэп. Что же тебе открылось?"

title_3_2="GREENCAP"
dialogue_3_2="Дух-Зверь... мы не должны сражаться с ним. Пророчество гласит, что его нужно приручить!"

title_3_3="GREENCAP"
dialogue_3_3="*Гринкэп подробно пересказывает старейшине Гэпу пророчество*"

title_3_4="ELDER GEPU"
dialogue_3_4="Клянусь Великой Мицелией... Всё это время мы сражались с тенью самих себя."

title_3_5="ELDER GEPU"
dialogue_3_5="Хмм... Итак, всё начинается. Я уже давно чувствую, как споры перемен цепляются за тебя, Гринкэп."

title_3_6="ELDER GEPU"
dialogue_3_6="В пророчестве говорится о Хиртане. О герое, о возродителе. Кто-то из нас должен быть тем, кого оно предвещает."

title_3_7="GREENCAP"
dialogue_3_7="Что такое Хиртан? И почему вы думаете, что это я?"

title_3_8="ELDER GEPU"
dialogue_3_8="Хиртан — избранный, тот, кто чист сердцем. И ежели это ты, Гринкэп, тебе нужно доказать это, пройдя первое испытание."

title_3_9="ELDER GEPU"
dialogue_3_9="Ты должен отправиться на юг, в руины некогда процветающего Королевства Фунгалия."

title_3_10="ELDER GEPU"
dialogue_3_10="Но будь осторожен, Фунгалия — место обитания Духа-Зверя. Там ты встретишься с ним и должен будешь выжить."

title_3_11="ELDER GEPU"
dialogue_3_11="Коли ты действительно Хиртан, Дух-Зверь не сможет тебя одолеть."

title_3_12="GREENCAP"
dialogue_3_12="Я понимаю. Я пройду это испытание."

title_3_13="ELDER GEPU"
dialogue_3_13="Заодно поищи древний ключ, спрятанный глубоко в Фунгалии. Он открывает ворота в земли за нашими пределами..."

title_3_14="ELDER GEPU"
dialogue_3_14="Может быть, ты уже натыкался на такие большие ворота?"

title_3_15="ELDER GEPU"
dialogue_3_15="Когда вернёшься с ключом, я помогу тебе открыть их и укажу дальнейший путь."

title_3_16="ELDER GEPU"
dialogue_3_16="Пережеви Духа-Зверя. Найди ключ. И пусть пророчество раскроется через твою храбрость."

title_3_17="GREENCAP"
dialogue_3_17="Я сделаю это. Я вас не подведу."

title_3_18="ELDER GEPU"
dialogue_3_18="Возьми-ка это, и прикрепи к своему хлысту. Так ты сможешь притягивать к себе некоторые блоки."

title_3_19="ELDER GEPU"
dialogue_3_19="Попробуй это на блоке внутри моего дома. Используй с умом, ведь этот инструмент будет жизненно важен, если хочешь добраться до Фунгалии."

dialogue_3_20="END"


title_4_0="ELDER GEPU"
dialogue_4_0="Отправляйся на юг, в Фунгалию, там ты отыщешь ключ..."

title_4_1="ELDER GEPU"
dialogue_4_1="Встреться с Духом-Зверем и донеси пророчество до племени. И лишь тогда Хиртан сможет исполнить свою судьбу."

title_4_2="GREENCAP"
dialogue_4_2="Я сделаю это. Я вас не подведу."

dialogue_4_3="BACK"


title_5_0="GREENCAP"
dialogue_5_0="Я встретился со Зверем..."

title_5_1="ELDER GEPU"
dialogue_5_1="Тогда ты воистину достоин звания Хиртана! Нашёл ли ты ключ, который, как поговаривают, покоится в глубинах Фунгалии?"

title_5_2="GREENCAP"
dialogue_5_2="Ещё нет... но я вернусь в Фунгалию и заберу его!"

dialogue_5_3="BACK"


title_6_0="GREENCAP"
dialogue_6_0="Я встретился со Зверем и нашёл ключ!"

title_6_1="ELDER GEPU"
dialogue_6_1="Тогда звание Хиртана воистину твоё! Встретимся же у древних ворот на западе, и мы откроем их вместе."

title_6_2="ELDER GEPU"
dialogue_6_2="Там я уже направлю тебя в твоих следующих шагах."

title_6_2="GREENCAP"
dialogue_6_2="Я не подведу вас, старейшина Гэпу!"

dialogue_6_3="BACK"

[door_elder]

title_1_0="ELDER GEPU"
dialogue_1_0="Я был здесь в тогдашний день, когда эти ворота запечатали... и никогда не думал, что воочию увижу их открытыми снова."

title_1_1="ELDER GEPU"
dialogue_1_1="За ними лежит сеть забытых пещер. Ещё давным-давно я сослал туда одного из наших."

title_1_2="ELDER GEPU"
dialogue_1_2="Его звали Брегадор. Могучий гриб, и когда-то близкий друг."

title_1_3="ELDER GEPU"
dialogue_1_3="Он верил, что Зверя можно приручить... даже призвать."

title_1_4="ELDER GEPU"
dialogue_1_4="Помнишь ли тот страшный день, когда на деревню Топпо напали?"

title_1_5="GREENCAP"
dialogue_1_5="Я никогда не забуду тот день..."

title_1_6="ELDER GEPU"
dialogue_1_6="Увы, эта трагедия была ценой запретных экспериментов Брегадора..."

title_1_7="ELDER GEPU"
dialogue_1_7="Хоть нас и связывала дружба, но у меня не осталось выбора, кроме как изгнать его... я так скучаю по нему до сих пор."

title_1_8="ELDER GEPU"
dialogue_1_8="Многие последовали за ним в изгнание. Наверняка, он всё ещё возглавляет их, где-то в глубине."

title_1_9="ELDER GEPU"
dialogue_1_9="Его род спор богат древней магией. Ежели кто и знает, как приручить Зверя, так это Брегадор."

title_1_10="ELDER GEPU"
dialogue_1_10="Теперь же я осознаю, что, похоже, слишком сурово осудил его... приняв видение за опасность."

title_1_11="ELDER GEPU"
dialogue_1_11="Отыщи его, Гринкэп. Поговори с ним. Если в нём ещё теплится надежда, то возможно он вернётся на поверхность... и да простит меня."

title_1_12="GREENCAP"
dialogue_1_12="Вы поступили так, как считали верным, старейшина. Вудби выжил благодаря именно вам."

title_1_13="ELDER GEPU"
dialogue_1_13="Понимаю... Ходят слухи о скрытом поселении в низинах. Скорее всего, именно там начнётся твой путь."

title_1_14="ELDER GEPU"
dialogue_1_14="Иди же. Да сопроводит тебя Мать-Мицелия."

dialogue_1_15="END"

title_2_0="ELDER GEPU"
dialogue_2_0="Отыщи Брегадора и убеди его помочь нам в нашем стремлении приручить Зверя."

dialogue_2_1="BACK"

[guard_1]

title_1_0="GUARD"
dialogue_1_0="Я защищаю мост!"

dialogue_1_1="BACK"

[guard_2]

title_1_0="GUARD"
dialogue_1_0="Я охраняю старейшину!"

dialogue_1_1="BACK"

[villager_1]

title_1_0="SVEG"
dialogue_1_0="Раньше я жил в деревне Топпо, но нас изгнал Дух-Зверь."

title_1_1="SVEG"
dialogue_1_1="Порой я скучаю по жизни на кронах деревьев, но в Вудби тоже есть свой покой."

dialogue_1_2="BACK"

[bopp_1]

title_1_0="BOPP"
dialogue_1_0="Однажды я стану старейшиной деревни!"

dialogue_1_1="BACK"

[pipa_1]

title_1_0="PIPA"
dialogue_1_0="Ты почувствовал сегодняшние толчки?"
title_1_1="PIPA"
dialogue_1_1="Что происходит? Пожалуй, тебе стоит спросить об этом старейшину."
dialogue_1_2="BACK"

title_2_0="PIPA"
dialogue_2_0="Вудби — мирное место... если бы не этот Дух-Зверь, жизнь здесь была бы чистым блаженством."
dialogue_2_1="BACK"

[poppo_1]

title_1_0="POPPO"
dialogue_1_0="Нет никакого способа защититься от Духа-Зверя..."

title_1_1="POPPO"
dialogue_1_1="Я слышал, он насыщается магией, но физически его невозможно повредить."

title_1_2="POPPO"
dialogue_1_2="Как можно сражаться с таким противником?"

dialogue_1_3="BACK"

[gro_1]

title_1_0="GRO"
dialogue_1_0="Все боятся, что Дух-Зверь нападёт на нас..."

title_1_1="GRO"
dialogue_1_1="Я помню, как напали на деревню Топпо, потому что они занимались запретной магией!"

title_1_2="GRO"
dialogue_1_2="Мы же здесь таким не занимаемся, так что мы в безопасности."

dialogue_1_3="BACK"

[daba_1]

title_1_0="DABA"
dialogue_1_0="Эй, Гринкэп, чем занимаешься?"

title_1_1="GREENCAP"
dialogue_1_1="Старейшина отправил меня на задание: идти к Оракулу Храма Призмы!"

title_1_2="DABA"
dialogue_1_2="Звучит очень важно! У меня есть инструмент, который может тебе пригодиться, поэтому можешь взять его на время!"

title_1_3="GREENCAP"
dialogue_1_3="Что это?"

title_1_4="DABA"
dialogue_1_4="Это Камера Памяти. Она позволит тебе вспоминать места, которые ты посетил, с кристальной ясностью!"

title_1_5="DABA"
dialogue_1_5="Вот, допустим, этот сломанный мост - вполне вероятно, ты захочешь вернуться сюда позже..."

title_1_6="DABA"
dialogue_1_6="Камера позволит тебе записывать места, представляющие интерес, а потом просматривать их на карте!"

title_1_7="DABA"
dialogue_1_7="Ну же, попробуй!"

title_1_8="GREENCAP"
dialogue_1_8="Обязательно, спасибо вам!"

dialogue_1_9="END"

title_2_0="DABA"
dialogue_2_0="Надеюсь, ты пользуешься Камерой Памяти, чтобы записывать интересные места!"

dialogue_2_1="BACK"

[baba_myca]

title_1_0="BABA MYCA"
dialogue_1_0="Приветствую тебя из теней и не только..."
title_1_1="BABA MYCA"
dialogue_1_1="А ты знал, что скрытые реальности существуют между тканью времени и пространства?"
title_1_2="BABA MYCA"
dialogue_1_2="Отпей нектара, и если пройдёшь испытание, увидишь незримое."
title_1_3="GREENCAP"
dialogue_1_3="Звучит как-то страшно!"
title_1_4="BABA MYCA"
dialogue_1_4="Тебе и должно быть страшно. Так или иначе..."
title_1_5="BABA MYCA"
dialogue_1_5="Я могу обменять тебе некоторые из моих магических артефактов на твои монеты!"
dialogue_1_6="SHOP_END"

title_2_0="BABA MYCA"
dialogue_2_0="Взгляни на мои магические артефакты, я обменяю их на монеты!"
dialogue_2_1="SHOP"

title_3_0="GREENCAP"
dialogue_3_0="Хэй! Я закрыл все те врата, которые мне показал твой нектар."
title_3_1="BABA MYCA"
dialogue_3_1="Что, извини...? Неужели нектар заставил тебя увидеть то, чего не было на самом деле?"
title_3_2="BABA MYCA"
dialogue_3_2="Хм... или может, те скрытые реальности действительно существуют..."
title_3_3="BABA MYCA"
dialogue_3_3="О, мои споры! Бедная маленькая шляпка... На, выпей вот это, уж это точно не повредит твоему сознанию!"
dialogue_3_4="END"

[barry_growing]

title_1_0="GREENCAP"
dialogue_1_0="Мне почти кажется, что у этой ягоды есть глаза и рот..."

title_1_1="GREENCAP"
dialogue_1_1="Она ещё недостаточно созрела, чтобы её сорвать."

dialogue_1_2="BACK"

title_2_0="GREENCAP"
dialogue_2_0="Попробую-ка воспользоваться удобрением, которое я получил, на этом ягодном дереве."

dialogue_2_1="END"

title_3_0="GREENCAP"
dialogue_3_0="Ого!"

title_3_1="BARRY"
dialogue_3_1="Приветик, я Барри! Ты моя мама?"

title_3_2="GREENCAP"
dialogue_3_2="Ээ, не совсем..."

title_3_3="BARRY"
dialogue_3_3="Тогда поможешь мне найти мою маму?"

title_3_4="GREENCAP"
dialogue_3_4="Да, думаю, смогу!"

title_3_5="BARRY"
dialogue_3_5="Здорово, тогда я пойду с тобой!"

dialogue_3_6="BACK"

[bip_1]

title_1_0="BIP"
dialogue_1_0="Видишь этот алтарь?"

title_1_1="BIP"
dialogue_1_1="Такие алтари — это сооружения, связанные со священной сетью мицелия, как святая живая паутина, связывающяя всё сущее!"

title_1_2="BIP"
dialogue_1_2="Активируй один через подношение, и *шрум!* ты сможешь телепортироваться к нему откуда угодно!"

title_1_3="BIP"
dialogue_1_3="Тебе повезло, этот алтарь в городе можно активировать бесплатно. Давай, попробуй!"

dialogue_1_4="BACK"

title_2_0="BIP"
dialogue_2_0="Отлично! Ты активировал алтарь. Запомни, ты можешь телепортироваться сюда в любой момент."

title_2_1="BIP"
dialogue_2_1="И самое лучшее: тебе даже не нужно находиться у другого святилища, чтобы вернуться к уже активированному!"

dialogue_2_2="BACK"

[farmer_1]

title_1_0="FARMER GRED"
dialogue_1_0="Мой брат вечно возится со своей ямкой, хочет посадить что-нибудь захватывающее..."

title_1_1="FARMER GRED"
dialogue_1_1="А я ему говорю, надо придерживаться старой доброй пшеницы. Она кормила нашу семью поколениями, и без всякой чепухи."

dialogue_1_2="BACK"

title_2_0="FARMER GRED"
dialogue_2_0="Видишь, что я имел в виду? Он погнался за новыми идеями, и теперь огромная лоза уничтожает наши поля!"

dialogue_2_1="BACK"

[farmer_2]

title_1_0="FARMER FREG"
dialogue_1_0="Видишь эту прекрасную ямку, которую я вырыл? Идеальная глубина, идеальная форма..."

title_1_1="FARMER FREG"
dialogue_1_1="Загвоздка в том... что я понятия не имею, что в неё посадить."

title_1_2="FARMER FREG"
dialogue_1_2="У тебя есть какие-нибудь идеи, росточек?"

title_1_3="GREENCAP"
dialogue_1_3="Не особо... но я дам тебе знать, если что-нибудь найду."

title_1_4="FARMER FREG"
dialogue_1_4="Хех, справедливо. Пожалуй, буду просто смотреть на ямку, пока не нагрянет вдохновение."

dialogue_1_5="END"

title_2_0="FARMER FREG"
dialogue_2_0="Всё ещё смотрю на эту пустую ямку... Такое чувство, что она надо мной издевается."

dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Хэй, я нашёл странное на вид семя. Может, попробуешь посадить его?"

title_3_1="FARMER FREG"
dialogue_3_1="Ну надо же... это не типичное семя!"

title_3_2="FARMER FREG"
dialogue_3_2="Давай-ка, положь его в яму. Глянем, что из него вырастет!"

dialogue_3_3="END"

title_4_0="FARMER FREG"
dialogue_4_0="СВЯТЫЕ СПОРОВИКИ! Что во имя Матери-Мицелия ЭТО такое?!"

title_4_1="FARMER FREG"
dialogue_4_1="Ты взял и обрёк весь мой участок! Посмотри на этот хаос!"

title_4_2="GREENCAP"
dialogue_4_2="Эм, прости?"

title_4_3="FARMER FREG"
dialogue_4_3="Брысь, негодяй! Не тащи мне больше проклятых семян!"

dialogue_4_4="END"

title_5_0="FARMER FREG"
dialogue_5_0="Не могу поверить, что эта гигантская лоза растёт прямо у моего дома..."

title_5_1="FARMER FREG"
dialogue_5_1="...Хотя она даёт неплохую тень. Хмф."

dialogue_5_2="BACK"

[gobb]

title_1_0="GOBB"
dialogue_1_0="Добро пожаловать в Гильдию паркурщиков!"
title_1_1="GOBB"
dialogue_1_1="Мы — любители скорости, взбиратели на скалы, прыгуны с уступов... и коллекционеры неуловимых божьих коровок!"
title_1_2="GREENCAP"
dialogue_1_2="Божьих коровок?"
title_1_3="GOBB"
dialogue_1_3="Ах, те ещё загадки! Крошечные, мерцающие драгоценности, которые, как говорят, являются фрагментами самой древней удачи!"
title_1_4="GOBB"
dialogue_1_4="Никто не знает, почему они засиживаются в забытых местах, но их поимка проверяет и ловкость, и смекалку!"
title_1_5="GOBB"
dialogue_1_5="Мы верим, что когда наберётся достаточно, откроется скрытое благословение... хотя никому ещё это не удавалось."
title_1_6="GOBB"
dialogue_1_6="Так скажи мне, маленький гриб... присоединишься ли ты к нам в наших смелых попрыгушках и охоте на божьих коровок?"
title_1_7="GREENCAP"
dialogue_1_7="Естественно! Звучит весело!"
title_1_8="GOBB"
dialogue_1_8="Ха! Вот это нрав! Тогда скачи, мчись и карабкайся так, будто само небо — твоя игровая площадка."
title_1_9="GOBB"
dialogue_1_9="Возвращайся сюда, когда найдёшь пять из них!"
dialogue_1_10="END"


title_2_0="GOBB"
dialogue_2_0="Как продвигается сбор божьих коровок?"
title_2_1="GREENCAP"
dialogue_2_1="Я работаю над этим!"
title_2_2="GOBB"
dialogue_2_2="Возвращайся сюда, когда найдёшь пять из них!"
dialogue_2_3="BACK"


title_3_0="GREENCAP"
dialogue_3_0="Я принёс тебе пять божьих коровок!"
title_3_1="GOBB"
dialogue_3_1="О! Неси их сюда, хочу посмотреть!"
title_3_2="GREENCAP"
dialogue_3_2="Держи..."
title_3_3="GOBB"
dialogue_3_3="Ооо, посмотри-ка на эту! Блестит, как полированный янтарь!"
title_3_4="GOBB"
dialogue_3_4="И вот эта! Её красный панцирь мог бы посрамить даже рубин..."
title_3_5="GOBB"
dialogue_3_5="Подожди... а эта... шевелится?!"
title_3_6="LALA"
dialogue_3_6="Эй! Верни меня тому, кто меня нашёл!"
title_3_7="GOBB"
dialogue_3_7="ОООЙ! Она разговаривает! Говорящий жук!"
title_3_8="GREENCAP"
dialogue_3_8="Я не знал, что ты живая!"
title_3_9="LALA"
dialogue_3_9="Это потому что я дремала, глупая шляпка!"
title_3_10="LALA"
dialogue_3_10="Меня зовут Лала. Я леди, и я жук!"
title_3_11="GOBB"
dialogue_3_11="Подожди... так другие тоже живые??"
title_3_12="LALA"
dialogue_3_12="Неа! Только я. Остальные — просто блестящие безделушки. Красивые, но скучные!"
title_3_13="GOBB"
dialogue_3_13="Тогда... что же такое эти божьи коровки?"
title_3_14="LALA"
dialogue_3_14="Не знаю! Но я знаю одно: я остаюсь с тем, кто меня нашёл. Таково правило!"
title_3_15="GOBB"
dialogue_3_15="Хмф... любопытно. Что ж, да будет так."
title_3_16="GOBB"
dialogue_3_16="Похоже, Лала — твоя награда за пять найденных жуков!"
title_3_17="LALA"
dialogue_3_17="Я не какая-то там безделушка, как другие - нет, мистер! Я и награда, и подруга!"
title_3_18="GOBB"
dialogue_3_18="Вернись, когда найдёшь ещё пять. Тогда я дам тебе кое-что стоящее..."
title_3_19="GOBB"
dialogue_3_19="А пока... похоже, ты обрёл нового компаньона."
title_3_20="LALA"
dialogue_3_20="Лучшего компаньона, который у него когда-либо был!"
dialogue_3_21="END"

title_4_0="GOBB"
dialogue_4_0="Принеси мне ещё пять божьих коровок, и я дам тебе достойную награду!"
dialogue_4_1="BACK"

title_5_0="GREENCAP"
dialogue_5_0="Я принёс тебе ещё пять божьих коровок!"
title_5_1="GREENCAP"
dialogue_5_1="Честно говоря, я предполагаю, это все, что я когда-либо найду."
title_5_2="GOBB"
dialogue_5_2="Клянусь дыханием Отца-Ветра! Я даже не знал, что там есть ещё пять!"
title_5_3="GOBB"
dialogue_5_3="То есть... отличная работа!"
title_5_4="GOBB"
dialogue_5_4="Ладно, какая же для тебя будет награда... хмм. Так, ты действительно нашёл их все."
title_5_5="GOBB"
dialogue_5_5="И тем временем никто больше в гильдии не нашёл ни единой..."
title_5_6="GREENCAP"
dialogue_5_6="А может, мне теперь стать главой гильдии, смекаешь?"
title_5_7="GOBB"
dialogue_5_7="..."
title_5_8="GOBB"
dialogue_5_8="... Не-а."
title_5_9="GOBB"
dialogue_5_9="Но на, возьми этот корень, который я выкопал на заднем дворе здания гильдии."
title_5_10="GOBB"
dialogue_5_10="Он выглядит очень... внушительным. Прекрасная работа!"
dialogue_5_11="END"

title_6_0="GREENCAP"
dialogue_6_0="Так что же ты сделаешь со всеми божьими коровками?"
title_6_1="GOBB"
dialogue_6_1="Даже не знаю... может, построю какой-нибудь алтарь."
title_6_2="GOBB"
dialogue_6_2="Или что-то вроде трофея, что можно повесить на стену, чтобы показать работу гильдии."
dialogue_6_3="BACK"

[dweppa]

title_1_0="DWEPPA"
dialogue_1_0="Мой брательник и его дурацкая Банда Фунг часто здесь тусуются..."
title_1_1="DWEPPA"
dialogue_1_1="По-моему, они просто сброд придурков!"
dialogue_1_2="BACK"

title_2_0="DWEPPA"
dialogue_2_0="Эй, это же ты побил моего брата и его банду придурков!"
title_2_1="DWEPPA"
dialogue_2_1="Мне следовало бы тебе дать леща прямо сейчас! Никто не смеет бить моего брата... кроме меня!"
title_2_2="DWEPPA"
dialogue_2_2="Хотя, всё же, ему был нужен хороший урок. Тот квест был для него слишком опасен..."
title_2_3="DWEPPA"
dialogue_2_3="Я рада, что это ты заставил его вернуться домой... даже если сделал это грубым способом."
dialogue_2_4="BACK"

[dabib]

title_1_0="DABIB"
dialogue_1_0="Привет! Моя хата сверху, но вот моя лестница поломалась... И теперь я застрял здесь внизу."

title_1_1="DABIB"
dialogue_1_1="Если бы ты смог её починить, то внутри тебя ждёт вознаграждение..."

title_1_2="DABIB"
dialogue_1_2="Я слышал, что Мершрум в Вудби продаёт какой-то ремонтный набор, который должен сработать."

dialogue_1_3="BACK"

title_2_0="DABIB"
dialogue_2_0="Благодарю тебя за починку моей лестницы, я ценю это!"

dialogue_2_1="BACK"

[spirit_fae]

title_1_0="SPIRIT FAE"
dialogue_1_0="Стоять! Вам, грибам, здесь не место!"

title_1_1="GREENCAP"
dialogue_1_1="Да ну? Кто сказал?"

title_1_2="SPIRIT FAE"
dialogue_1_2="Приказом моего господина! Я слуга духа, и это место уже занято!"

title_1_3="SPIRIT FAE"
dialogue_1_3="Но раз ты один, то не буду беспокоить моего господина..."

title_1_4="SPIRIT FAE"
dialogue_1_4="Я разберусь с тобой сама!"

dialogue_1_5="END"

[pebb_bepp]

title_1_0="GREENCAP"
dialogue_1_0="Привет! Меня зовут Гринкэп. А вы кто?"

title_1_1="PEBB"
dialogue_1_1="Приветик! Я Пэбб, а это мой родственник Бэпп!"

title_1_2="BEPP"
dialogue_1_2="Чё как!"

title_1_3="GREENCAP"
dialogue_1_3="Что привело вас двоих сюда в такую даль?"

title_1_4="PEBB"
dialogue_1_4="Мы путешественники!"

title_1_5="PEBB"
dialogue_1_5="Ну, точнее я путешественник. Бэпп — скорее невольный участник."

title_1_6="BEPP"
dialogue_1_6="Задолбало это! У Пэбб контроль над ногами, так что я просто тащусь следом. И это ужасно!"

title_1_7="GREENCAP"
dialogue_1_7="Что-то... звучит немного запутанно."

title_1_8="BEPP"
dialogue_1_8="Запутанно — это мягко сказано. В основном я просто отключаюсь и представляю, что я дома. Но что теперь? Я достиг своего предела!"

title_1_9="BEPP"
dialogue_1_9="Я наконец уговорил Пэбб осесть здесь на время, слава спорам!"

title_1_10="PEBB"
dialogue_1_10="Не слишком-то расслабляйся! Это ненадолго, ведь странствия зовут!"

title_1_11="BEPP"
dialogue_1_11="Ни за что! Мы остаёмся здесь, и точка!"

title_1_12="PEBB"
dialogue_1_12="Ладно, ладно! Не надо разбрасываться спорами!"

title_1_13="BEPP"
dialogue_1_13="Ну что ж, пока мы здесь, хочешь обменяться? Мы насобирали кое-каких интересных вещей в наших приключениях. Взгляни!"

title_1_14="GREENCAP"
dialogue_1_14="Конечно, давай посмотрю, что у вас имеется!"

dialogue_1_15="SHOP_END"

title_2_0="GREENCAP"
dialogue_2_0="Привет! Не против, если я взгляну на ваш товар?"

title_2_1="PEBB"
dialogue_2_1="Конечно! Только быстрее, мы скоро отправляемся в путь!"

title_2_2="BEPP"
dialogue_2_2="Нет, не отправляемся! Я остаюсь здесь, и всё!"

dialogue_2_3="SHOP"

[cogg_pickup]

title_1_0="COGG"
dialogue_1_0="Помогите!"

title_1_1="GREENCAP"
dialogue_1_1="Ээ, привет... В чём дело?"

title_1_2="COGG"
dialogue_1_2="Я кручусь в этой дурацкой машине уже столетия!"

title_1_3="COGG"
dialogue_1_3="У меня всё кружится, я сыт этим по горло и, кажется, у меня развилась жуткая дизориентация! Останови это вращение!"

title_1_4="GREENCAP"
dialogue_1_4="Ладно, ладно, дай-ка посмотрю... А что будет, если нажать эту... гм, кнопку?"

title_1_5="COGG"
dialogue_1_5="Вау! Наконец-то! Сладкая неподвижность! О, как я скучал по этому. Спасибо тебе, мой спаситель!"

title_1_6="COGG"
dialogue_1_6="Ты даже не представляешь, каково это — крутиться на протяжении веков, и этот размытый ужас наконец-то закончился!"

title_1_7="COGG"
dialogue_1_7="Знаешь, теперь, когда я свободен, я хотел бы повидать мир. Скажи-ка, найдётся для меня место в твоих приключениях?"

title_1_8="GREENCAP"
dialogue_1_8="Приятель-шестерёнка со свободным ходом? Безусловно! Ну что, покатили?"

title_1_9="COGG"
dialogue_1_9="Главное, чтобы качение было по моей воле, а не по указке какой-то машины!"

title_1_10="GREENCAP"
dialogue_1_10="Конечно!"

dialogue_1_11="END"

[biggy]

title_1_0="BIGGY"
dialogue_1_0="Йо! Я Бигги, и Гильдия паркурщиков уже становится легендой. Там наверху есть божья коровка, но эм..."

title_1_1="BIGGY"
dialogue_1_1="Я бы точно туда запрыгнул, но я слишком большой, сильный и, ну... массивный!"

title_1_2="BIGGY"
dialogue_1_2="А ты вроде маленький и, наверное, весишь меньше меня. Может, попробуешь?"

title_1_3="GREENCAP"
dialogue_1_3="...Хорошо."

dialogue_1_4="BACK"

title_2_0="BIGGY"
dialogue_2_0="Ты достал жука! Если бы я не был таким колоссальным, возвышающимся и, ну, невероятно массивным, я бы точно её схватил!"

title_2_1="BIGGY"
dialogue_2_1="Как же тебе повезло быть таким маленьким и проворным!"

dialogue_2_2="BACK"

[biggy_home]

title_1_0="BIGGY"
dialogue_1_0="Йо! Отлично справился, что поймал ту божью коровку в Фунгалии."

title_1_1="BIGGY"
dialogue_1_1="Если бы я не был таким огромным грибом-амбалом, я бы просто ловко прыгнул и схватил её сам."

dialogue_1_2="BACK"

[librarian_statue]

title_1_0="PRISM ORACLE"
dialogue_1_0="Когда-то эти залы пульсировали цветом и гармонией... Теперь остались лишь отголоски."

title_1_1="PRISM ORACLE"
dialogue_1_1="И всё же сквозь тишину возвращается истина. Цикл повторяется снова, а вместе с ним — и ты."

title_1_1="PRISM ORACLE"
dialogue_1_1="Давным-давно грибы были едины, связаны доверием и переплетением магии."

title_1_1="PRISM ORACLE"
dialogue_1_1="Но единство было утрачено. Каждый стремился использовать магию в своих целях, и в своей гордости они потеряли контроль."

title_1_1="PRISM ORACLE"
dialogue_1_1="Из этого хаоса родился Дух-Зверь - буря бесформенной магии, рождённая из страха, воли и забытых уз."

title_1_2="PRISM ORACLE"
dialogue_1_2="Теперь же наступило время возобновления. Пророчество Хиртана должно исполниться, и оно гласит следующее..."

title_1_3="PRISM ORACLE"
dialogue_1_3="Тот, кого не тронут искры и клыки, наладит путь разбитых времен."

title_1_4="PRISM ORACLE"
dialogue_1_4="Когда сердца будут едины и воспоют голоса, Зверь склонится перед более мягкими созданиями."

title_1_5="PRISM ORACLE"
dialogue_1_5="Песней дух его будет укрощен, и имя Хиртана будет восстановлено."

title_1_6="PRISM ORACLE"
dialogue_1_6="И вновь из разрушенных корней и разрозненной родни восстанет сильное королевство."

title_1_7="GREENCAP"
dialogue_1_7="Я не уверен, что всё понимаю..."

title_1_8="PRISM ORACLE"
dialogue_1_8="Дух-Зверь — не проклятие, а зеркало. Он отражает то, что мы потеряли, и то, что должны вернуть."

title_1_9="PRISM ORACLE"
dialogue_1_9="Дух-Зверь — не враг, а вы, бесформные. Боль твоего народа, сила и потенциал, воплощённые в реальность."

title_1_10="PRISM ORACLE"
dialogue_1_10="Только через гармонию, а не силу, магия нашего рода может снова стать целостной."

title_1_11="PRISM ORACLE"
dialogue_1_11="Путь вперёд лежит не в завоевании, а в единстве..."

title_1_12="PRISM ORACLE"
dialogue_1_12="Приручи Зверя, и магия снова потечёт своим чередом."

title_1_13="GREENCAP"
dialogue_1_13="Мне нужно вернуться к старейшине Гэпу... он должен узнать правду."

dialogue_1_14="END"

title_2_0="PRISM ORACLE"
dialogue_2_0="Пророчество Хиртана гласит следующее..."

title_2_1="PRISM ORACLE"
dialogue_2_1="Тот, кого не тронут искры и клыки, наладит путь разбитых времен."

title_2_2="PRISM ORACLE"
dialogue_2_2="Когда сердца будут едины и воспоют голоса, Зверь склонится перед более мягкими созданиями."

title_2_3="PRISM ORACLE"
dialogue_2_3="Песней дух его будет укрощен, и имя Хиртана будет восстановлено."

title_2_4="PRISM ORACLE"
dialogue_2_4="И вновь из разрушенных корней и разрозненной родни восстанет сильное королевство."

dialogue_2_5="BACK"

[librarian_dwerp]

title_1_0="DWERP"
dialogue_1_0="Ха! Ты опоздал! Статуя выболтала всё о сокровище, и прикинь? Больше она никому ни слова не скажет!"

title_1_1="DWERP"
dialogue_1_1="Щас она только и делает, что тараторит о каком-то пророчестве. Полный бесполезняк!"

dialogue_1_2="BACK"

[librarian_morker]

title_1_0="MORKER"
dialogue_1_0="..."

title_1_1="GREENCAP"
dialogue_1_1="А ты не очень-то разговорчив, ага?"

title_1_2="MORKER"
dialogue_1_2="..."

dialogue_1_3="BACK"

[librarian_rodhatt]

title_1_0="RÖDHATT"
dialogue_1_0="Вау... ты реально победил Путча в бою?"

title_1_1="GREENCAP"
dialogue_1_1="Эм, ага. Это было не так трудно."

title_1_2="RÖDHATT"
dialogue_1_2="Это... очень впечатляет."

dialogue_1_3="BACK"

[spirit_beast_encounter]

title_1_0="THE SPIRIT BEAST"
dialogue_1_0="Воздух содрогается... спора осмеливается нарушить тишину."

title_1_1="THE SPIRIT BEAST"
dialogue_1_1="Для чего ты вторгаешься туда, где даже отголоски боятся задерживаться? Ты пришёл как претендент... или как жертва?"

title_1_2="GREENCAP"
dialogue_1_2="Твоя охота на грибов прекратится!"

title_1_3="THE SPIRIT BEAST"
dialogue_1_3="Мы с тобой не чужие, ты и я. Когда цикл замкнётся, один не останется."

title_1_4="THE SPIRIT BEAST"
dialogue_1_4="Свяжешь ли ты меня... или я поглощу тебя... песня прозвучит одинаково."

title_1_5="GREENCAP"
dialogue_1_5="Я пока ещё не знаю, как приручить тебя, но я свершу это!"

title_1_6="THE SPIRIT BEAST"
dialogue_1_6="Когда последний тон угаснет, кто вспомнит, какой голос был твоим?"

dialogue_1_7="END"

