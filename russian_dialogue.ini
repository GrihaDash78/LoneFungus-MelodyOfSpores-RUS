dialogue_1_0="Эй, что это у тебя?"

title_1_1="MANEY"
dialogue_1_1="Этот малыш? Я нашёл его, когда путешествовал на севере. Он выглядел довольно потрёпанным и явно обезвоженным."

title_1_2="MANEY"
dialogue_1_2="Он был каким-то вялым, как старая губка. Я подумал, что ему будет лучше где-нибудь у воды, и, оказывается, ему здесь очень нравится!"

title_1_3="MANEY"
dialogue_1_3="Я назвал его Тодд. Он издаёт этот странный маленький звук, похожий на... 'тооодд'. Так и свыклось."

dialogue_1_4="BACK"

[marmud]

title_1_0="MARMUD"
dialogue_1_0="Звёзды шепчут, но ты ещё не выбрал путь, который они освещают..."

title_1_1="MARMUD"
dialogue_1_1="Вернись, когда твой ход совпадёт со звёздами наверху, и я сплету твою судьбу заново."

dialogue_1_2="BACK"

title_2_0="MARMUD"
