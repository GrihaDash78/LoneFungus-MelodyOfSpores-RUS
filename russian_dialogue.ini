title_2_0="DABIB"
dialogue_2_0="Спасибо, что починил мою лестницу, ценю это!"

dialogue_2_1="BACK"

[spirit_fae]

title_1_0="SPIRIT FAE"
dialogue_1_0="Эй! Вам, грибам, здесь не место!"

title_1_1="GREENCAP"
dialogue_1_1="Да ну? Кто сказал?"

title_1_2="SPIRIT FAE"
dialogue_1_2="Приказом моего господина! Я слуга духа, и это место объявлено моим!"

title_1_3="SPIRIT FAE"
dialogue_1_3="Но раз ты один, не нужно беспокоить моего господина..."

title_1_4="SPIRIT FAE"
dialogue_1_4="Я разберусь с тобой сама!"

dialogue_1_5="END"

[pebb_bepp]

title_1_0="GREENCAP"
dialogue_1_0="Привет! Меня зовут Гринкэп. А вы кто?"

title_1_1="PEBB"
dialogue_1_1="Приветик! Я Пэбб, а это мой брат/сестра Бэпп!"

title_1_2="BEPP"
dialogue_1_2="Чё как!"

title_1_3="GREENCAP"
dialogue_1_3="Что привело вас двоих так далеко?"

title_1_4="PEBB"
dialogue_1_4="Мы путешественники!"

title_1_5="PEBB"
dialogue_1_5="Ну, я путешественник. Бэпп — скорее невольный участник."

title_1_6="BEPP"
dialogue_1_6="Ненавижу это! У Пэбб контроль над ногами, так что я просто тащусь следом. Это ужасно!"

title_1_7="GREENCAP"
dialogue_1_7="Это... звучит немного сложно."

title_1_8="BEPP"
dialogue_1_8="Сложно — это мягко сказано. В основном я просто отключаюсь и представляю, что я дома. Но сейчас? Мой предел!"

title_1_9="BEPP"
dialogue_1_9="Я наконец уговорил Пэбб осесть здесь ненадолго, слава спорам!"

title_1_10="PEBB"
dialogue_1_10="Не слишком обустраивайся! Это ненадолго. Странствия зовут!"

title_1_11="BEPP"
dialogue_1_11="Ни за что! Мы остаёмся здесь, и точка!"

title_1_12="PEBB"
dialogue_1_12="Ладно, ладно! Не надо спорами сыпать!"

title_1_13="BEPP"
dialogue_1_13="В любом случае, пока мы здесь, хочешь обменяться? Мы набрали кое-каких интересных вещей в наших приключениях. Взгляни!"

title_1_14="GREENCAP"
dialogue_1_14="Конечно, посмотрю, что у вас есть!"

dialogue_1_15="SHOP_END"

title_2_0="GREENCAP"
dialogue_2_0="Привет! Не против, если я взгляну на ваш товар?"

title_2_1="PEBB"
dialogue_2_1="Конечно! Только быстро, мы скоро отправляемся в путь!"

title_2_2="BEPP"
dialogue_2_2="Нет, не отправляемся! Я остаюсь здесь, и всё!"

dialogue_2_3="SHOP"

[cogg_pickup]

title_1_0="COGG"
dialogue_1_0="Помогите!"

title_1_1="GREENCAP"
dialogue_1_1="Эм, привет... В чём дело?"

title_1_2="COGG"
dialogue_1_2="Я кручусь в этой дурацкой машине уже столетия!"

title_1_3="COGG"
dialogue_1_3="У меня голова кружится, я сыт по горло и, кажется, у меня развилась вертиго! Останови это вращение!"

title_1_4="GREENCAP"
dialogue_1_4="Ладно, ладно, дай-ка посмотрю... Что будет, если нажать эту... эм, кнопку?"

title_1_5="COGG"
dialogue_1_5="Вау! Да! Сладкая неподвижность! О, как я скучал по тебе. Спасибо тебе, мой герой!"

title_1_6="COGG"
dialogue_1_6="Ты понятия не имеешь, каково это — крутиться тысячелетие, этот размытый ужас наконец-то прекратился!"

title_1_7="COGG"
dialogue_1_7="Знаешь, теперь, когда я свободен, я хотел бы повидать мир. Думаешь, найдётся для меня место в твоих приключениях?"

title_1_8="GREENCAP"
dialogue_1_8="Свободный друг-шестерёнка? Абсолютно! Поехали!"

title_1_9="COGG"
dialogue_1_9="Главное, чтобы качение было по моей воле, а не по указке какой-то машины!"

title_1_10="GREENCAP"
dialogue_1_10="Конечно!"

dialogue_1_11="END"

[biggy]

title_1_0="BIGGY"
dialogue_1_0="Йо! Я Бигги, легенда Гильдии паркурщиков в процессе становления. Там наверху есть божья коровка, но э..."

title_1_1="BIGGY"
dialogue_1_1="Я бы, конечно, туда запрыгнул, но я слишком большой, сильный и, ну... массивный!"

title_1_2="BIGGY"
dialogue_1_2="Ты маленький и, наверное, весишь меньше меня, может, попробуешь?"

title_1_3="GREENCAP"
dialogue_1_3="...Хорошо."

dialogue_1_4="BACK"

title_2_0="BIGGY"
dialogue_2_0="Ты достал жука! Если бы я не был таким колоссальным, возвышающимся и, ну, невероятно массивным, я бы точно его схватил!"

title_2_1="BIGGY"
