[old_cap]

title_1_0="OL CAP"
dialogue_1_0="Ну-ну, что такой молодой в этих краях делает?"

title_1_1="OL CAP"
dialogue_1_1="Я живу здесь дольше, чем кто-либо может помнить. Люди здесь нечасто проходят."

title_1_2="OL CAP"
dialogue_1_2="Видишь те старые ворота? Они стоят столько же, сколько и я. Старше самой земли, если спросишь меня."

title_1_3="OL CAP"
dialogue_1_3="Некоторые грибы, посмелее, давным-давно ушли за те ворота. Говорят, они осели где-то там..."

title_1_4="OL CAP"
dialogue_1_4="Но открыть эти ворота? Хех... эту загадку я ещё не разгадал."

dialogue_1_5="BACK"

title_2_0="OL CAP"
dialogue_2_0="Ну, дерни меня за ножку! Эти огромные ворота и правда открылись!"

title_2_1="OL CAP"
dialogue_2_1="Хмф, теперь, наверное, любые туристы будут топать сюда в любой день."

title_2_2="OL CAP"
dialogue_2_2="Раньше было спокойно, только я и ветер..."

title_2_3="OL CAP"
dialogue_2_3="Видно, тишина в этих землях долго не держится."

dialogue_2_4="BACK"

[screw_prince]

title_1_0="PRINCE VOLTABOLT"
dialogue_1_0="Ах! Наконец-то гриб осмелился подойти!"

title_1_1="PRINCE VOLTABOLT"
dialogue_1_1="Знаешь, как долго я ждал? Кем мне править? Где мои верные подданные?!"

title_1_2="PRINCE VOLTABOLT"
dialogue_1_2="Целую вечность... заперт здесь, без цели. Где мой трон?! Где моё королевство?!"

title_1_3="GREENCAP"
dialogue_1_3="Я... я не знаю... я просто забрёл сюда..."

title_1_4="PRINCE VOLTABOLT"
dialogue_1_4="Мне обещали корону... наследие... Ты сказал, что я стану королём!"

title_1_5="PRINCE VOLTABOLT"
dialogue_1_5="Нечего закреплять... нечего фиксировать... Нечего ЗАВИНЧИВАТЬ! Какой смысл в принце без королевства?!"

title_1_6="PRINCE VOLTABOLT"
dialogue_1_6="Если я не могу править... то я СОКРУШУ! Начну с ТЕБЯ!"

title_1_7="GREENCAP"
dialogue_1_7="Ой-ой..."

dialogue_1_8="END"

[ferrymush]

title_1_0="FERRYMUSH"
dialogue_1_0="Я могу перевезти тебя через реку... но только если у тебя есть лодочный пропуск."

dialogue_1_1="BACK"

title_2_0="FERRYMUSH"
dialogue_2_0="Я могу перевезти тебя через реку... но только если у тебя есть лодочный пропуск."

title_2_1="GREENCAP"
dialogue_2_1="У меня есть!"

title_2_2="FERRYMUSH"
dialogue_2_2="Добро пожаловать на борт! Я проведу тебя через реку!"

dialogue_2_3="END"

title_3_0="FERRYMUSH"
dialogue_3_0="Будь осторожен, путник. За рекой тебя ждут странные опасности..."

dialogue_3_1="BACK"

[todd]

title_1_0="TODD"
dialogue_1_0="Тодд, Тодд Тодд!"

dialogue_1_1="BACK"

[maney]

title_1_0="GREENCAP"
dialogue_1_0="Эй, что это у тебя?"

title_1_1="MANEY"
dialogue_1_1="Этот малыш? Я нашёл его, когда путешествовал на севере. Он выглядел довольно потрёпанным и явно обезвоженным."

title_1_2="MANEY"
dialogue_1_2="Он был какой-то вялый, как старая губка. Я подумал, что ему будет лучше где-нибудь у воды, и, оказывается, ему здесь очень нравится!"

title_1_3="MANEY"
dialogue_1_3="Я назвал его Тодд. Он издаёт этот странный маленький звук, похожий на... 'тооодд'. Так и прилипло."

dialogue_1_4="BACK"

[marmud]

title_1_0="MARMUD"
dialogue_1_0="Звёзды шепчут, но ты ещё не выбрал путь, который они освещают..."

title_1_1="MARMUD"
dialogue_1_1="Вернись, когда твой курс выровняется со звёздами вверху, и я сплету твою судьбу заново."

dialogue_1_2="BACK"

title_2_0="MARMUD"
dialogue_2_0="Звёзды отмечают твой знак... но они могут говорить о снах, не твоих. Должен ли я подчинить их твоей воле?"

dialogue_2_1="SHOP"

[trametheus]

title_1_0="TRAMETHEUS"
dialogue_1_0="Кто осмеливается ступать под моей корой?"

title_1_1="GREENCAP"
dialogue_1_1="Я Гринкэп. Я стремлюсь приручить Духа-Зверя и принести мир грибному роду."

title_1_2="TRAMETHEUS"
dialogue_1_2="Благородная цель... когда-то мой род мечтал о таких деяниях."

title_1_3="GREENCAP"
dialogue_1_3="Я ищу место под названием Забытый Санктум. Ты знаешь, где оно?"

title_1_4="TRAMETHEUS"
dialogue_1_4="Забытый... да, хотя когда-то он носил другое имя, когда время было ещё юным."

title_1_5="TRAMETHEUS"
dialogue_1_5="В те дни мы тоже плели королевства, не из камня, а из коры и спор! Мы правили терпением, а не силой."

title_1_6="TRAMETHEUS"
dialogue_1_6="Но та эпоха увяла. Я остался здесь один, корни глубоко вросли, а тишина грызла мой дух."

title_1_7="TRAMETHEUS"
dialogue_1_7="Возможно, я последний из моей рощи... но всё же мои отростки тянутся сквозь тайные места."

title_1_8="TRAMETHEUS"
dialogue_1_8="Да... я помогу тебе. Позволь моим конечностям протянуться мостами там, где их нет."

title_1_9="TRAMETHEUS"
dialogue_1_9="Ударь по моим пальцам, и они вытянутся. Старые пути расцветут вновь под твоими шагами."

title_1_10="TRAMETHEUS"
dialogue_1_10="Да направит это тебя к Санктуму, который ты ищешь."

title_1_11="GREENCAP"
dialogue_1_11="Спасибо тебе, древний. Я не забуду твоей помощи!"

dialogue_1_12="END"

title_2_0="TRAMETHEUS"
dialogue_2_0="Ударь по моим пальцам, и я протяну их для тебя. Пути, давно закрытые, могут вновь расцвести под твоими ногами."

dialogue_2_1="BACK"

[gippa_1]

title_1_0="GIPPA"
dialogue_1_0="Извините, но вы мне мешаете. Я занят очень важным исследованием."

title_1_1="GIPPA"
dialogue_1_1="Пожалуйста, уйдите."

dialogue_1_2="BACK"

title_2_0="GIPPA"
dialogue_2_0="Вы мне мешаете..."
title_2_1="GREENCAP"
dialogue_2_1="Я нашёл кое-что, похожее на то, что у вас набросано."
title_2_2="GIPPA"
dialogue_2_2="Моей ножкой! Это... это действительно похоже на то, что я нарисовал!"
title_2_3="GIPPA"
dialogue_2_3="Где вы это нашли?"
title_2_4="GREENCAP"
dialogue_2_4="Я нашёл это в руинах Храма Призмы."
title_2_5="GIPPA"
dialogue_2_5="Конечно... это имеет смысл. Видите ли, я историк. Я посвятил свои исследования реликвиям и забытому оружию."
title_2_6="GIPPA"
dialogue_2_6="То, что у вас, может быть не простой безделушкой, это наконечник оружия, известного как, Зверобой!"
title_2_7="GIPPA"
dialogue_2_7="Легендарный хлыст, которым когда-то владел древний герой, известный только как Гронсвамп. Его имя стерлось, но его оружие продолжает жить в шепоте."
title_2_8="GIPPA"
dialogue_2_8="Во-первых, вам понадобится бронзовая цепь, чтобы прикрепить эту безделушку, так же, как это делал сам герой."
title_2_9="GIPPA"
dialogue_2_9="Я не знаю, кто её продаёт, у Мершрума в городе её точно нет. Возможно, вы найдёте того, кто несёт то, что нам нужно, в своих путешествиях."
title_2_10="GIPPA"
dialogue_2_10="Возвращайтесь, когда найдёте бронзовую цепь, и мы сможем начать восстанавливать оружие."
dialogue_2_11="END"

title_3_0="GIPPA"
dialogue_3_0="Если вы действительно хотите восстановить Зверобой, то принесите бронзовую цепь, чтобы прикрепить эту безделушку."
dialogue_3_1="BACK"

title_4_0="GREENCAP"
dialogue_4_0="Я достал бронзовую цепь!"
title_4_1="GIPPA"
dialogue_4_1="Идеально. Немного грубовато, но сойдёт."
title_4_2="GIPPA"
dialogue_4_2="Мы можем прикрепить безделушку к этой цепи. Само по себе это будет неплохим оружием..."
title_4_3="GIPPA"
dialogue_4_3="Но истинная сила безделушки дремлет. Чтобы по-настоящему пробудить её, нужен ещё один ингредиент."
title_4_4="GIPPA"
dialogue_4_4="Его нужно покрыть алхимическим веществом, известным как Лазурная Пыль."
title_4_5="GIPPA"
dialogue_4_5="Один торговец, которого я знаю, продаёт её, хотя он... неприятный. Не Мершрум, а подозрительный тип с сомнительным товаром."
title_4_6="GIPPA"
dialogue_4_6="Его лавка находится в месте под названием Лагерь Бродячих Шляпок. К югу отсюда, возможно, вы уже проходили мимо."
title_4_7="GIPPA"
dialogue_4_7="Принесите мне Лазурную Пыль, и тогда мы сможем сделать следующий шаг."
dialogue_4_8="END"

title_5_0="GIPPA"
dialogue_5_0="Принесите мне Лазурную Пыль. Вы найдёте её у торговца в Лагере Бродячих Шляпок."
title_5_1="GIPPA"
dialogue_5_1="Сделайте это, и я скажу вам, как оружие может быть по-настоящему возрождено."
dialogue_5_2="BACK"

title_6_0="GREENCAP"
dialogue_6_0="Я достал Лазурную Пыль!"
title_6_1="GIPPA"
dialogue_6_1="Я не хочу знать, что вам пришлось сделать, чтобы её достать."
title_6_2="GIPPA"
dialogue_6_2="Безделушку нужно будет прикрепить к цепи и покрыть Лазурной Пылью."
title_6_3="GIPPA"
dialogue_6_3="Но есть кое-что ещё. Оружие не может пробудиться без ритуала."
title_6_4="GIPPA"
dialogue_6_4="Слушайте внимательно, ибо легенда гласит следующее..."
title_6_5="GIPPA"
dialogue_6_5="Давным-давно грибной род был на грани вымирания. Причина... потеряна во времени."
title_6_6="GIPPA"
dialogue_6_6="Но один выступил против конца, Гронсвамп. Он сражался с бесчисленными зверями, проходил руину за руиной, собирая немногочисленные выжившие споры."
title_6_7="GIPPA"
dialogue_6_7="Он нёс эти споры, последнюю надежду своего рода, до самой вершины мира."
title_6_8="GIPPA"
dialogue_6_8="Там, с последними силами, он прыгнул в воздух и разорвал себя на части, развеяв свои споры и их споры по ветру."
title_6_9="GIPPA"
dialogue_6_9="Так Отец-Ветер разнёс их, и из этой жертвы грибной род возродился."
title_6_10="GIPPA"
dialogue_6_10="Но поскольку никто до него не выжил, его деяния канули в безвестность, его имя запомнилось только шепотом."
title_6_11="GIPPA"
dialogue_6_11="Итак, теперь ты должен пройти его путём. Заберись как можно выше, на вершину мира."
title_6_12="GIPPA"
dialogue_6_12="Там соедини безделушку, цепь и Пыль. Только тогда Зверобой пробудится снова."
dialogue_6_13="END"

title_7_0="GIPPA"
dialogue_7_0="Заберись как можно выше, на вершину мира..."
title_7_1="GIPPA"
dialogue_7_1="Там соедини безделушку, цепь и Пыль. Только тогда Зверобой пробудится снова."
dialogue_7_2="BACK"

title_8_0="GIPPA"
dialogue_8_0="Вот оно... оружие, возрождённое из легенды. Помочь в его возрождении — высшая честь для моей работы."
dialogue_8_1="BACK"

[wandercamp_shop]

title_1_0="GROG"
dialogue_1_0="Взгляни на мой товар, он немного отличается от того, что продают эти Мершрумы!"
dialogue_1_1="SHOP"

title_2_0="GREENCAP"
dialogue_2_0="Эй! Ты же продаёшь Лазурную Пыль, да?"
title_2_1="GROG"
dialogue_2_1="Острый глаз, друг! Ты не найдёшь этого больше нигде в мире!"
title_2_2="GREENCAP"
dialogue_2_2="Сколько ты хочешь за неё?"
title_2_3="GROG"
dialogue_2_3="Один миллион золотых монет."
title_2_4="GROG"
dialogue_2_4="...Но раз у тебя очаровательная шляпка, я пойду на сделку. 999 999 золота."
title_2_5="GREENCAP"
dialogue_2_5="Это... всё ещё очень дорого."
title_2_6="GROG"
dialogue_2_6="Хех, нельзя винить гриба за попытку. Но слушай... есть другой способ."
title_2_7="GROG"
dialogue_2_7="Когда я был маленьким, мой старик показал мне самую красивую вещь, которую я когда-либо видел."
title_2_8="GROG"
dialogue_2_8="Идеально круглую, мерцающую на свету... кремово-белый камень из далёких морей."
title_2_9="GROG"
dialogue_2_9="Он называл её Жемчужиной. Говорил, что она хранит в себе память океана."
title_2_10="GROG"
dialogue_2_10="Но когда он ушёл, Жемчужина тоже пропала. Я бы отдал всё, чтобы снова увидеть её."
title_2_11="GROG"
dialogue_2_11="Найди мне что-то вроде той Жемчужины, и Лазурная Пыль твоя!"
title_2_12="GROG"
dialogue_2_12="А пока... почему бы тебе не посмотреть, что у меня есть на продажу!"
dialogue_2_13="END"

title_3_0="GROG"
dialogue_3_0="Принеси мне Жемчужину, и я отдам Лазурную Пыль."
title_3_1="GROG"
dialogue_3_1="А пока посмотри, что ещё у меня есть на продажу!"
dialogue_3_2="SHOP"

title_4_0="GREENCAP"
dialogue_4_0="Я нашёл Жемчужину."
title_4_1="GROG"
dialogue_4_1="Милостью Матери-Мицелия и дыханием Отца-Ветра..."
title_4_2="GROG"
dialogue_4_2="Этот блеск, это сияние, да! Она точно такая же, как та, что показывал мне отец!"
title_4_3="GROG"
dialogue_4_3="Ты сделал больше, чем просто обмен, маленькая шляпка... ты вернул память, которую я считал потерянной навсегда."
title_4_4="GROG"
dialogue_4_4="Забери Лазурную Пыль. Пусть она послужит тебе лучше, чем когда-либо смогло бы золото."
dialogue_4_5="END"

[peak]
