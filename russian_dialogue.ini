[village_elder]

title_1_0="GREENCAP"
dialogue_1_0="Старейшина Гэпу! Все ли в порядке? Я почувствовал, как мой дом сотрясали ужасные толчки!"

title_1_1="ELDER GEPU"
dialogue_1_1="Ах, Гринкэп... деревня в безопасности. Твоя забота о нашем роде согревает моё старое сердце."

title_1_2="ELDER GEPU"
dialogue_1_2="Но есть кое-что, что ты можешь сделать, и это связано с этими толчками."

title_1_3="ELDER GEPU"
dialogue_1_3="Возможно, это зов... Я полагаю, что Оракул Храма Призмы пробудился."

title_1_4="GREENCAP"
dialogue_1_4="Кто это?!"

title_1_5="ELDER GEPU"
dialogue_1_5="Древняя статуя, старше любого из нас. Построенная древними грибами с помощью магии, которая открывает пути к судьбе."

title_1_6="ELDER GEPU"
dialogue_1_6="Если мы когда-нибудь победим Духа-Зверя, это древнее существо будет знать как."

title_1_7="GREENCAP"
dialogue_1_7="Но, старейшина... Дух-Зверь неуязвим! Никому ещё не удавалось его победить."

title_1_8="ELDER GEPU"
dialogue_1_8="Возможно... но я не могу допустить, чтобы то, что случилось с деревней Топпо много лет назад, повторилось с Вудби."

title_1_9="ELDER GEPU"
dialogue_1_9="Оракул — наша единственная надежда."

title_1_10="ELDER GEPU"
dialogue_1_10="Зверь охотился на нас достаточно долго. Если есть хоть малейший шанс... мы должны его использовать!"

title_1_11="DWERP"
dialogue_1_11="Мы подслушали! Не парься, Банда Фунг всё уладит!"

title_1_12="ELDER GEPU"
dialogue_1_12="Абсолютно нет! Теперь ты ещё и подслушиваешь?"

title_1_13="DWERP"
dialogue_1_13="Эй, то, что ты старейшина этой деревни, не значит, что ты можешь нами командовать!"

title_1_14="DWERP"
dialogue_1_14="Банда Фунг разобьёт это пророчество! Правда, ребята?"

title_1_15="PUTCH"
dialogue_1_15="Я разнесу всё, что встанет на нашем пути!"

title_1_16="MORKER"
dialogue_1_16="..."

title_1_17="RÖDHATT"
dialogue_1_17="Эм... да, наверное!"

title_1_18="DWERP"
dialogue_1_18="Пошли, банда! Нас ждут победа и сокровища!"

title_1_19="ELDER GEPU"
dialogue_1_19="У них есть воля, но их сердца не на месте..."

title_1_20="ELDER GEPU"
dialogue_1_20="Если они доберутся до Оракула, они неверно истолкуют пророчество."

title_1_21="GREENCAP"
dialogue_1_21="Тогда пойду я! Я доберусь до Храма Призмы раньше них!"

title_1_22="ELDER GEPU"
dialogue_1_22="Я знал, что ты выступишь вперёд, малыш... Храм находится далеко на западе."

title_1_23="ELDER GEPU"
dialogue_1_23="Это древний город, погребённый глубоко под землёй, полный опасностей и тайн."

title_1_24="ELDER GEPU"
dialogue_1_24="Путь туда тоже опасен. Возьми немного монет, возможно, ты сможешь найти полезные вещи в лавке."

title_1_25="GREENCAP"
dialogue_1_25="Я не подведу вас. Спасибо, старейшина!"

title_1_26="ELDER GEPU"
dialogue_1_26="И, Гринкэп... ты вчера забыл здесь свой хлыст, держи его крепко. Да присмотрит за тобой Мицелий."

dialogue_1_27="END"


title_2_0="ELDER GEPU"
dialogue_2_0="Я буду ждать твоего возвращения..."

dialogue_2_1="BACK"


title_3_0="GREENCAP"
dialogue_3_0="Старейшина Гэпу! Я вернулся и узнал правду, стоящую за пророчеством!"

title_3_1="ELDER GEPU"
dialogue_3_1="Говори, Гринкэп. Что тебе открылось?"

title_3_2="GREENCAP"
dialogue_3_2="Дух-Зверь... мы не должны сражаться с ним. Пророчество гласит, что его нужно приручить!"

title_3_3="GREENCAP"
dialogue_3_3="*Гринкэп подробно пересказывает старейшине Гэпу пророчество*"

title_3_4="ELDER GEPU"
dialogue_3_4="Великим Мицелием... Всё это время мы сражались с тенью самих себя."

title_3_5="ELDER GEPU"
dialogue_3_5="Хм... Итак, это начинается. Я давно чувствую, как споры перемен цепляются за тебя, Гринкэп."

title_3_6="ELDER GEPU"
dialogue_3_6="Пророчество говорит о Хиртане. О герое, о возрождающем. Кто-то из нас должен быть тем, кого оно предвещает."

title_3_7="GREENCAP"
dialogue_3_7="Что такое Хиртан? И почему вы думаете, что это я?"

title_3_8="ELDER GEPU"
dialogue_3_8="Хиртан — избранный, тот, у кого чистое сердце. Если это ты, Гринкэп, ты должен доказать это, пройдя первое испытание."

title_3_9="ELDER GEPU"
dialogue_3_9="Ты должен отправиться на юг, в руины некогда процветающего Королевства Фунгалия."

title_3_10="ELDER GEPU"
dialogue_3_10="Но будь осторожен, Фунгалия — место обитания Духа-Зверя. Ты встретишься с ним там и должен будешь выжить."

title_3_11="ELDER GEPU"
dialogue_3_11="Если ты действительно Хиртан, Дух-Зверь не сможет тебя одолеть."

title_3_12="GREENCAP"
dialogue_3_12="Я понимаю. Я пройду это испытание."

title_3_13="ELDER GEPU"
dialogue_3_13="Также поищи древний ключ, спрятанный глубоко в Фунгалии. Он открывает ворота в земли за пределами..."

title_3_14="ELDER GEPU"
dialogue_3_14="Возможно, ты уже натыкался на эти большие ворота?"

title_3_15="ELDER GEPU"
dialogue_3_15="Когда вернёшься с ключом, я помогу тебе открыть ворота и укажу дальнейший путь."

title_3_16="ELDER GEPU"
dialogue_3_16="Выживи против Духа-Зверя. Найди ключ. Пусть пророчество раскроется через твоё мужество."

title_3_17="GREENCAP"
dialogue_3_17="Я сделаю это. Я вас не подведу."

title_3_18="ELDER GEPU"
dialogue_3_18="Возьми это, прикрепи к своему хлысту. С этим ты сможешь притягивать к себе некоторые блоки."

title_3_19="ELDER GEPU"
dialogue_3_19="Попробуй на блоке внутри моего дома. Используй с умом, этот инструмент будет жизненно важен, если хочешь добраться до Фунгалии."

dialogue_3_20="END"


title_4_0="ELDER GEPU"
dialogue_4_0="Отправляйся на юг, в Фунгалию, там ты найдёшь ключ..."

title_4_1="ELDER GEPU"
dialogue_4_1="Встреться с Духом-Зверем и донеси пророчество до племени. Только тогда Хиртан сможет исполнить свою судьбу."

title_4_2="GREENCAP"
dialogue_4_2="Я сделаю это. Я вас не подведу."

dialogue_4_3="BACK"


title_5_0="GREENCAP"
dialogue_5_0="Я встретился со зверем..."

title_5_1="ELDER GEPU"
dialogue_5_1="Тогда ты заслужил звание Хиртана! Нашёл ли ты ключ, который, как говорят, покоится в глубинах Фунгалии?"

title_5_2="GREENCAP"
dialogue_5_2="Пока нет... но я вернусь в Фунгалию и заберу его!"

dialogue_5_3="BACK"


title_6_0="GREENCAP"
dialogue_6_0="Я встретился со зверем и нашёл ключ!"

title_6_1="ELDER GEPU"
dialogue_6_1="Тогда звание Хиртана действительно твоё! Встретимся у древних ворот на западе, и мы откроем их вместе."

title_6_2="ELDER GEPU"
dialogue_6_2="Там я направлю тебя в твоих следующих шагах."

title_6_2="GREENCAP"
dialogue_6_2="Я не подведу вас, старейшина Гэпу!"

dialogue_6_3="BACK"

[door_elder]

title_1_0="ELDER GEPU"
dialogue_1_0="Я был здесь в тот день, когда эти ворота запечатали... и никогда не думал, что увижу их открытыми снова."

title_1_1="ELDER GEPU"
dialogue_1_1="За ними лежит сеть забытых пещер. Давным-давно я сослал туда одного из наших."

title_1_2="ELDER GEPU"
dialogue_1_2="Его зовут Брегадор. Могучий гриб, и когда-то дорогой друг."

title_1_3="ELDER GEPU"
dialogue_1_3="Он верил, что Зверя можно приручить... даже призвать."

title_1_4="ELDER GEPU"
dialogue_1_4="Помнишь тот страшный день, когда на деревню Топпо напали?"

title_1_5="GREENCAP"
dialogue_1_5="Я никогда не забуду тот день..."

title_1_6="ELDER GEPU"
dialogue_1_6="Эта трагедия была ценой запретных экспериментов Брегадора..."

title_1_7="ELDER GEPU"
dialogue_1_7="Хотя нас связывала дружба, у меня не было выбора, кроме как изгнать его... я скучаю по нему до сих пор."

title_1_8="ELDER GEPU"
dialogue_1_8="Многие последовали за ним в изгнание. Думаю, он всё ещё возглавляет их, где-то в глубине."

title_1_9="ELDER GEPU"
dialogue_1_9="Его род спор богат древней магией. Если кто и знает, как приручить Зверя, так это Брегадор."

title_1_10="ELDER GEPU"
dialogue_1_10="Теперь я понимаю, что, возможно, слишком сурово осудил его... приняв видение за опасность."

title_1_11="ELDER GEPU"
dialogue_1_11="Найди его, Гринкэп. Поговори с ним. Если в нём ещё теплится надежда, возможно, он вернётся на поверхность... и простит меня."

title_1_12="GREENCAP"
dialogue_1_12="Вы сделали то, что считали правильным, старейшина. Вудби выжил благодаря вам."

title_1_13="ELDER GEPU"
dialogue_1_13="Ходят слухи о скрытом поселении внизу. Возможно, именно там начнётся твой путь."

title_1_14="ELDER GEPU"
dialogue_1_14="Иди. Да направит тебя Мать-Мицелий."

dialogue_1_15="END"

title_2_0="ELDER GEPU"
dialogue_2_0="Найди Брегадора и убеди его помочь нам в нашем стремлении приручить Зверя."

dialogue_2_1="BACK"

[guard_1]

title_1_0="GUARD"
dialogue_1_0="Я охраняю мост!"

dialogue_1_1="BACK"

[guard_2]

title_1_0="GUARD"
dialogue_1_0="Я охраняю старейшину!"

dialogue_1_1="BACK"

[villager_1]

title_1_0="SVEG"
dialogue_1_0="Раньше я жил в деревне Топпо, но нас изгнал Дух-Зверь."

title_1_1="SVEG"
dialogue_1_1="Иногда я скучаю по жизни на деревьях, но в Вудби тоже есть свой покой."

dialogue_1_2="BACK"

[bopp_1]

title_1_0="BOPP"
dialogue_1_0="Однажды я стану старейшиной деревни!"

dialogue_1_1="BACK"

[pipa_1]

title_1_0="PIPA"
dialogue_1_0="Ты почувствовал сегодняшние толчки?"
title_1_1="PIPA"
dialogue_1_1="Что происходит? Возможно, тебе стоит спросить об этом старейшину."
dialogue_1_2="BACK"

title_2_0="PIPA"
dialogue_2_0="Вудби — мирное место... если бы не этот Дух-Зверь, жизнь здесь была бы чистым блаженством."
dialogue_2_1="BACK"

[poppo_1]

title_1_0="POPPO"
dialogue_1_0="Нет способа защититься от Духа-Зверя..."

title_1_1="POPPO"
dialogue_1_1="Я слышал, он питается магией, но физически его невозможно повредить."

title_1_2="POPPO"
dialogue_1_2="Как можно сражаться с таким врагом?"

dialogue_1_3="BACK"

[gro_1]

title_1_0="GRO"
dialogue_1_0="Все боятся, что Дух-Зверь нападёт на нас..."

title_1_1="GRO"
dialogue_1_1="Я помню, как напали на деревню Топпо, потому что они занимались запретной магией!"

title_1_2="GRO"
dialogue_1_2="Мы здесь этим не занимаемся, так что мы в безопасности."

dialogue_1_3="BACK"

[daba_1]

title_1_0="DABA"
dialogue_1_0="Эй, Гринкэп, чем занимаешься?"

title_1_1="GREENCAP"
dialogue_1_1="Старейшина отправил меня в квест: идти к Оракулу Храма Призмы!"

title_1_2="DABA"
dialogue_1_2="Звучит очень важно! У меня есть инструмент, который может тебе пригодиться, можешь взять его на время!"

title_1_3="GREENCAP"
dialogue_1_3="Что это?"

title_1_4="DABA"
dialogue_1_4="Это Окунь Памяти, он позволит тебе вспоминать места, которые ты посетил, с кристальной ясностью!"

title_1_5="DABA"
dialogue_1_5="Вот, например, этот сломанный мост, возможно, ты захочешь вернуться сюда позже..."

title_1_6="DABA"
dialogue_1_6="Это позволит тебе записывать места, представляющие интерес, а потом просматривать их на карте!"

title_1_7="DABA"
dialogue_1_7="Попробуй!"

title_1_8="GREENCAP"
dialogue_1_8="Обязательно, спасибо!"

dialogue_1_9="END"

title_2_0="DABA"
dialogue_2_0="Надеюсь, ты используешь Окунь Памяти, чтобы записывать интересные места!"

dialogue_2_1="BACK"

[baba_myca]

title_1_0="BABA MYCA"
dialogue_1_0="Привет из теней и неведомого..."
title_1_1="BABA MYCA"
dialogue_1_1="А ты знал, что скрытые реальности существуют между тканью времени и пространства?"
title_1_2="BABA MYCA"
dialogue_1_2="Отпей нектара, и если пройдёшь испытание, увидишь невидимое."
title_1_3="GREENCAP"
dialogue_1_3="Звучит страшно!"
title_1_4="BABA MYCA"
dialogue_1_4="Тебе и должно быть страшно. В любом случае..."
title_1_5="BABA MYCA"
dialogue_1_5="Я обменяю тебе некоторые из моих магических артефактов на твои монеты!"
dialogue_1_6="SHOP_END"

title_2_0="BABA MYCA"
dialogue_2_0="Взгляни на мои магические артефакты, я обмениваю их на монеты!"
dialogue_2_1="SHOP"

title_3_0="GREENCAP"
dialogue_3_0="Эй! Я закрыл все те врата, которые мне показал твой нектар."
title_3_1="BABA MYCA"
dialogue_3_1="Что, прости...? Нектар заставил тебя видеть то, чего нет?"
title_3_2="BABA MYCA"
dialogue_3_2="Хм... а может, те скрытые реальности действительно существуют..."
title_3_3="BABA MYCA"
dialogue_3_3="Мои споры! Бедная шляпка... На, выпей вот это, уж это точно не повредит твоему разуму!"
dialogue_3_4="END"

[barry_growing]

title_1_0="GREENCAP"
dialogue_1_0="Эта ягода почти похожа на ту, у которой есть глаза и рот..."

title_1_1="GREENCAP"
dialogue_1_1="Она ещё недостаточно созрела, чтобы её сорвать."

dialogue_1_2="BACK"

title_2_0="GREENCAP"
dialogue_2_0="Я использую удобрение, которое получил, на этом ягодном дереве."

dialogue_2_1="END"

title_3_0="GREENCAP"
dialogue_3_0="Вау!"

title_3_1="BARRY"
dialogue_3_1="Привет, я Барри! Ты моя мама?"

title_3_2="GREENCAP"
dialogue_3_2="Эм, не совсем..."

title_3_3="BARRY"
dialogue_3_3="Можешь помочь мне найти мою маму?"

title_3_4="GREENCAP"
dialogue_3_4="Да, думаю, смогу!"

title_3_5="BARRY"
dialogue_3_5="Круто, тогда я пойду с тобой!"

dialogue_3_6="BACK"

[bip_1]

title_1_0="BIP"
dialogue_1_0="Видишь это святилище?"

title_1_1="BIP"
dialogue_1_1="Такие святилища — это сооружения, связанные со священной мицелиальной сетью, святой живой паутиной, связывающей всё сущее!"

title_1_2="BIP"
dialogue_1_2="Активируй одно подношением, и *шрум!* ты сможешь телепортироваться к нему откуда угодно!"

title_1_3="BIP"
dialogue_1_3="Тебе повезло, это святилище в городе можно активировать бесплатно. Давай, попробуй!"

dialogue_1_4="BACK"

title_2_0="BIP"
dialogue_2_0="Отлично! Ты активировал святилище. Запомни, ты можешь телепортироваться сюда в любой момент."

title_2_1="BIP"
dialogue_2_1="И самое лучшее: тебе не нужно находиться у другого святилища, чтобы вернуться к уже активированному!"

dialogue_2_2="BACK"

[farmer_1]

title_1_0="FARMER GRED"
dialogue_1_0="Мой брат вечно возится со своей ямой, хочет посадить что-нибудь захватывающее..."

title_1_1="FARMER GRED"
dialogue_1_1="А я говорю, надо придерживаться старой доброй пшеницы. Она кормила нашу семью поколениями, и никакой ерунды."

dialogue_1_2="BACK"

title_2_0="FARMER GRED"
dialogue_2_0="Видишь, что я имею в виду? Он погнался за новыми идеями, и теперь огромная лиана уничтожает наши поля!"

dialogue_2_1="BACK"

[farmer_2]

title_1_0="FARMER FREG"
dialogue_1_0="Видишь эту прекрасную яму, которую я вырыл? Идеальная глубина, идеальная форма..."

title_1_1="FARMER FREG"
dialogue_1_1="Проблема в том... что я понятия не имею, что в неё посадить."

title_1_2="FARMER FREG"
dialogue_1_2="У тебя есть какие-нибудь идеи, росток?"

title_1_3="GREENCAP"
dialogue_1_3="Не особенно... но я дам тебе знать, если что-нибудь найду."

title_1_4="FARMER FREG"
dialogue_1_4="Хех, справедливо. Наверное, буду просто смотреть на яму, пока не нагрянет вдохновение."

dialogue_1_5="END"

title_2_0="FARMER FREG"
dialogue_2_0="Всё ещё есть эта пустая яма... Такое чувство, что она надо мной издевается."

dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Эй, я нашёл странное на вид семя. Может, попробуешь посадить его?"

title_3_1="FARMER FREG"
dialogue_3_1="Ну надо же... это не обычное семя!"

title_3_2="FARMER FREG"
dialogue_3_2="Давай, бросай его в яму. Посмотрим, что вырастет!"

dialogue_3_3="END"

title_4_0="FARMER FREG"
dialogue_4_0="СВЯТЫЕ СПОРЫ! Что во имя Матери-мицелия ЭТО такое?!"

title_4_1="FARMER FREG"
dialogue_4_1="Ты проклял весь мой участок! Посмотри на этот беспорядок!"

title_4_2="GREENCAP"
dialogue_4_2="Эм, извини?"

title_4_3="FARMER FREG"
dialogue_4_3="Брысь, проказник! Не приноси мне больше проклятых семян!"

dialogue_4_4="END"

title_5_0="FARMER FREG"
dialogue_5_0="Не могу поверить, что эта гигантская лиана растёт прямо у моего дома..."

title_5_1="FARMER FREG"
dialogue_5_1="...Хотя она даёт неплохую тень. Хмф."

dialogue_5_2="BACK"

[gobb]

title_1_0="GOBB"
dialogue_1_0="Добро пожаловать в Гильдию паркурщиков!"
title_1_1="GOBB"
dialogue_1_1="Мы — искатели скорости, скалолазы, прыгуны с уступов... и коллекционеры неуловимых божьих коровок!"
title_1_2="GREENCAP"
dialogue_1_2="Что такое божья коровка?"
title_1_3="GOBB"
dialogue_1_3="Ах, вот в чём загадка! Крошечные, мерцающие реликвии, которые, как говорят, являются осколками самой древней удачи!"
title_1_4="GOBB"
dialogue_1_4="Никто не знает, почему они остаются в забытых местах, но их поимка проверяет и скорость, и смекалку!"
title_1_5="GOBB"
dialogue_1_5="Мы верим, что когда наберётся достаточно, откроется скрытое благословение... хотя никому ещё это не удавалось."
title_1_6="GOBB"
dialogue_1_6="Так скажи мне, маленький гриб... присоединишься ли ты к нам в наших смелых прыжках и охоте на божьих коровок?"
title_1_7="GREENCAP"
dialogue_1_7="Конечно! Звучит весело!"
title_1_8="GOBB"
dialogue_1_8="Ха! Вот это дух! Тогда прыгай, мчись и карабкайся так, будто само небо — твоя игровая площадка."
title_1_9="GOBB"
dialogue_1_9="Вернись сюда, когда найдёшь пять из них!"
dialogue_1_10="END"


title_2_0="GOBB"
dialogue_2_0="Как продвигается сбор божьих коровок?"
title_2_1="GREENCAP"
dialogue_2_1="Я работаю над этим!"
title_2_2="GOBB"
dialogue_2_2="Вернись сюда, когда найдёшь пять из них!"
dialogue_2_3="BACK"


title_3_0="GREENCAP"
dialogue_3_0="Я принёс тебе пять божьих коровок!"
title_3_1="GOBB"
dialogue_3_1="О! Давай их сюда, дай посмотреть!"
title_3_2="GREENCAP"
dialogue_3_2="Держи..."
title_3_3="GOBB"
dialogue_3_3="Ооо, посмотри на эту! Блестит, как полированный янтарь!"
title_3_4="GOBB"
dialogue_3_4="А эта! Её красный панцирь мог бы пристыдить рубин..."
title_3_5="GOBB"
dialogue_3_5="Подожди... эта... шевелится?!"
title_3_6="LALA"
dialogue_3_6="Эй! Верни меня тому, кто меня нашёл!"
title_3_7="GOBB"
dialogue_3_7="ЙИИК! Она говорит! Говорящий жук!"
title_3_8="GREENCAP"
dialogue_3_8="Я не знал, что ты живая!"
title_3_9="LALA"
dialogue_3_9="Это потому что я дремала, глупая шляпка!"
title_3_10="LALA"
dialogue_3_10="Меня зовут Лала. Я дама, и я жук!"
title_3_11="GOBB"
dialogue_3_11="Подожди... так другие тоже живые??"
title_3_12="LALA"
dialogue_3_12="Неа! Только я. Остальные — просто блестящие безделушки. Красивые, но скучные!"
title_3_13="GOBB"
dialogue_3_13="Тогда... что же такое эти божьи коровки?"
title_3_14="LALA"
dialogue_3_14="Не знаю! Но я знаю одно: я остаюсь с тем, кто меня нашёл. Таково правило!"
title_3_15="GOBB"
dialogue_3_15="Хмф... любопытно. Что ж, да будет так."
title_3_16="GOBB"
dialogue_3_16="Похоже, Лала — твоя награда за пять найденных жуков!"
title_3_17="LALA"
dialogue_3_17="Не какая-то там безделушка, как другие, нет, сэр! Я и награда, и друг!"
title_3_18="GOBB"
dialogue_3_18="Вернись, когда найдёшь ещё пять. Тогда я дам тебе кое-что стоящее..."
title_3_19="GOBB"
dialogue_3_19="А пока... похоже, ты обрёл нового спутника."
title_3_20="LALA"
dialogue_3_20="Лучшего спутника, чем я, у него никогда не будет!"
dialogue_3_21="END"

title_4_0="GOBB"
dialogue_4_0="Принеси мне ещё пять божьих коровок, и я дам тебе достойную награду!"
dialogue_4_1="BACK"

title_5_0="GREENCAP"
dialogue_5_0="Я принёс тебе ещё пять божьих коровок!"
title_5_1="GREENCAP"
dialogue_5_1="Честно говоря, я думаю, это все, что я когда-либо найду."
title_5_2="GOBB"
dialogue_5_2="Дыханием Отца-Ветра! Я даже не знал, что там есть ещё пять!"
title_5_3="GOBB"
dialogue_5_3="То есть... отличная работа!"
title_5_4="GOBB"
dialogue_5_4="Так какая же тебе награда... хмм. Ты действительно нашёл их все."
title_5_5="GOBB"
dialogue_5_5="А больше никто в гильдии не нашёл ни одной..."
title_5_6="GREENCAP"
dialogue_5_6="Может, мне теперь стать главой гильдии?"
title_5_7="GOBB"
dialogue_5_7="..."
title_5_8="GOBB"
dialogue_5_8="... Не-а."
title_5_9="GOBB"
dialogue_5_9="Но на, возьми этот корень, который я выкопал на заднем дворе здания гильдии."
title_5_10="GOBB"
dialogue_5_10="Выглядит очень... значительным. Отличная работа!"
dialogue_5_11="END"

title_6_0="GREENCAP"
dialogue_6_0="Так что ты сделаешь со всеми божьими коровками?"
title_6_1="GOBB"
dialogue_6_1="Я не знаю... может, построю какой-нибудь алтарь."
title_6_2="GOBB"
dialogue_6_2="Или что-то, что можно повесить на стену, чтобы показать работу гильдии."
dialogue_6_3="BACK"

[dweppa]

title_1_0="DWEPPA"
dialogue_1_0="Мой брат и его дурацкая Банда Фунг часто здесь тусуются..."
title_1_1="DWEPPA"
dialogue_1_1="Я считаю их кучкой придурков!"
dialogue_1_2="BACK"

title_2_0="DWEPPA"
dialogue_2_0="Эй, это ты побил моего брата и его банду придурков!"
title_2_1="DWEPPA"
dialogue_2_1="Я должна бы тебя сейчас отлупить! Никто не бьёт моего брата... кроме меня!"
title_2_2="DWEPPA"
dialogue_2_2="Но, наверное, ему был нужен хороший урок. Тот квест был для него слишком опасен..."
title_2_3="DWEPPA"
dialogue_2_3="Я рада, что это ты заставил его вернуться домой... даже если сделал это грубо."
dialogue_2_4="BACK"

[dabib]

title_1_0="DABIB"
dialogue_1_0="Привет! Мой дом наверху, но моя лестница сломалась... Теперь я застрял здесь внизу."

title_1_1="DABIB"
dialogue_1_1="Если бы ты смог её починить, внутри тебя ждёт награда..."

title_1_2="DABIB"
