[fred]

title_1_0="FRED"
dialogue_1_0="О! Привет. Меня вежливо попросили охранять эту палатку для её владельца."
title_1_1="FRED"
dialogue_1_1="Она отправилась в приключения, она состоит в какой-то банде или что-то вроде..."
title_1_2="FRED"
dialogue_1_2="Она хороший гриб. Честно говоря, я думаю, она заслуживает лучшей компании."
