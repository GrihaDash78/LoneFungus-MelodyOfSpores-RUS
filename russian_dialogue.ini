title_4_1="GROG"
dialogue_4_1="Клянусь милостью Матери-Мицелия и дыханием Отца-Ветра..."
title_4_2="GROG"
dialogue_4_2="Этот блеск, это сияние, да! Она точно такая же, как та, что показывал мне отец!"
title_4_3="GROG"
dialogue_4_3="Ты сделал больше, чем просто обмен, маленькая шляпка... ты вернул память, которую я считал потерянной навсегда."
title_4_4="GROG"
dialogue_4_4="Забери Лазурную Пыль. Пусть она послужит тебе лучше, чем когда-либо смогло бы золото."
dialogue_4_5="END"

