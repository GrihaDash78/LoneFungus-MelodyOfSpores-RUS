[spirit_beast_ending]

title_1_0="THE SPIRIT BEAST"
dialogue_1_0="Жертва была принесена..."

title_1_1="THE SPIRIT BEAST"
dialogue_1_1="Боль прошлого затихает, но цена всё ещё даёт о себе знать."

title_1_2="THE SPIRIT BEAST"
dialogue_1_2="Настоящее угасает... и то, что остаётся, не может быть названо."

dialogue_1_3="END"

[old_cap]

title_1_0="OL CAP"
dialogue_1_0="Ну-ну, что за молодняк в этих краях делает?"

title_1_1="OL CAP"
dialogue_1_1="Я живу здесь дольше, чем кто-либо может помнить. Народец здесь нечасто проходит."

title_1_2="OL CAP"
dialogue_1_2="Видишь вон те старые ворота? Они стоят столько же, сколько и я. Старше самой земли, если ты спросишь меня."

title_1_3="OL CAP"
dialogue_1_3="Некоторые грибы, что поотважнее, давненько ушли за те ворота. Поговаривают, они осели где-то там..."

title_1_4="OL CAP"
dialogue_1_4="Но отворить эти ворота? Хех... эту тайну я ещё не разгадал."

dialogue_1_5="BACK"

title_2_0="OL CAP"
dialogue_2_0="Потяните меня за ножку! Эти огромные ворота и правда отворились!"

title_2_1="OL CAP"
dialogue_2_1="Хмф, теперь, похоже, всякие туристы будут топать сюда в любой день."

title_2_2="OL CAP"
dialogue_2_2="Раньше тут было спокойно, лишь я да ветер..."

title_2_3="OL CAP"
dialogue_2_3="Видимо, тишина в этих землях долго не стоит."

dialogue_2_4="BACK"

[screw_prince]

title_1_0="PRINCE VOLTABOLT"
dialogue_1_0="Ах! Наконец-то гриб осмелился подойти!"

title_1_1="PRINCE VOLTABOLT"
dialogue_1_1="Знаешь, как долго я ожидал? Кем мне здесь править? Где мои верные подданные?!"

title_1_2="PRINCE VOLTABOLT"
dialogue_1_2="Целую вечность... был заперт здесь, без цели. Где мой трон?! Где моё королевство?!"

title_1_3="GREENCAP"
dialogue_1_3="Я... я без понятия... я просто забрёл сюда..."

title_1_4="PRINCE VOLTABOLT"
dialogue_1_4="Мне обещали корону... наследие... Сказали, что я стану королём!"

title_1_5="PRINCE VOLTABOLT"
dialogue_1_5="Нечего закреплять... нечего фиксировать... Нечего ЗАБИВАТЬ! Какой смысл в принце без королевства?!"

title_1_6="PRINCE VOLTABOLT"
dialogue_1_6="Если я не могу править... то я СОКРУШУ! И начну с ТЕБЯ!"

title_1_7="GREENCAP"
dialogue_1_7="Ой-ёй..."

dialogue_1_8="END"

