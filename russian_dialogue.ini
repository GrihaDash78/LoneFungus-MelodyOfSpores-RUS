dialogue_1_2="BACK"

[librarian_statue]

title_1_0="PRISM ORACLE"
dialogue_1_0="Когда-то эти залы пульсировали цветом и гармонией... Теперь остались лишь отголоски."

title_1_1="PRISM ORACLE"
dialogue_1_1="И всё же сквозь тишину возвращается истина. Цикл поворачивается снова, а вместе с ним — и ты."

title_1_1="PRISM ORACLE"
dialogue_1_1="Давным-давно грибы были едины, связаны доверием и переплетением магии."

title_1_1="PRISM ORACLE"
dialogue_1_1="Но единство было утрачено. Каждый стремился использовать магию в своих целях, и в своей гордости они потеряли контроль."

title_1_1="PRISM ORACLE"
dialogue_1_1="Из этого хаоса родился Дух-Зверь, буря неоформленной магии, рождённая из страха, воли и забытых уз."

title_1_2="PRISM ORACLE"
dialogue_1_2="Теперь пришло время восстановления. Пророчество Хиртана должно исполниться, и оно гласит следующее..."

title_1_3="PRISM ORACLE"
dialogue_1_3="Тот, кого не тронут искра и клык, восстановит путь разбитых времен."

title_1_4="PRISM ORACLE"
dialogue_1_4="Когда сердца едины и голоса поют, Зверь склонится перед более мягкими вещами."

title_1_5="PRISM ORACLE"
dialogue_1_5="Песней дух его будет укрощен, и имя Хиртана будет восстановлено."

title_1_6="PRISM ORACLE"
dialogue_1_6="Из сломанных корней и разрозненной родни вновь восстанет сильное королевство."

title_1_7="GREENCAP"
dialogue_1_7="Я не уверен, что понимаю..."

title_1_8="PRISM ORACLE"
dialogue_1_8="Дух-Зверь — не проклятие, а зеркало. Он отражает то, что мы потеряли, и то, что должны вернуть."

title_1_9="PRISM ORACLE"
dialogue_1_9="Дух-Зверь — не враг, это ты, неоформленный. Боль твоего народа, сила и потенциал, воплощённые в реальность."

title_1_10="PRISM ORACLE"
dialogue_1_10="Только через гармонию, а не силу, магия нашего рода может снова стать целостной."

title_1_11="PRISM ORACLE"
dialogue_1_11="Путь вперёд лежит не в завоевании, а в единстве..."

title_1_12="PRISM ORACLE"
dialogue_1_12="Приручи Зверя, и магия снова потечёт."

title_1_13="GREENCAP"
dialogue_1_13="Я должен вернуться к старейшине Гэпу... он должен узнать правду."

dialogue_1_14="END"

