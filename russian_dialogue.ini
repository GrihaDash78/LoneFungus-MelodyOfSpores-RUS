[nom]

title_1_0="NOM"
dialogue_1_0="Пришёл поиграть в нашу игру?"
title_1_1="NOM"
dialogue_1_1="Правила просты: лупи всё, что видишь, кроме всего, что похоже на гриб!"
title_1_2="NOM"
dialogue_1_2="Остерегайся бомб и пушечных ядер! Они не причинят тебе вреда, но оглушат!"
title_1_3="NOM"
dialogue_1_3="Разные вещи дают разное количество очков, так что учись по ходу дела! Удачи!"
dialogue_1_4="BACK"

[matio]

title_1_0="MATIO"
dialogue_1_0="Жизнь в Двух Столпах хороша. Здесь тихо, сыро, и в воздухе постоянный холод."

dialogue_1_1="BACK"

[bobba]

title_1_0="BOBBA"
dialogue_1_0="Ты из Вудби, да? Я слышал, наши племена когда-то были едины, часть старой Фунгалии."

title_1_1="BOBBA"
dialogue_1_1="Но потом нас изгнали... и разорвали Дух-Зверь."

dialogue_1_2="BACK"

[pela]

title_1_0="PELA"
dialogue_1_0="Мы пришли сюда, думая, что Дух-Зверь не достанет нас в этих пещерах..."

title_1_1="PELA"
dialogue_1_1="Мы ошибались. Теперь здесь тоже запрещена магия."

dialogue_1_2="BACK"

[gulhatt]

title_1_0="GULHATT"
dialogue_1_0="Если прислушаться, камни напевают старые песни. Большинство грибов просто не задерживаются достаточно долго, чтобы услышать их."

dialogue_1_1="BACK"

[bartin]

title_1_0="BARTIN"
dialogue_1_0="Мы поселились в Двух Столпах, потому что это уже было похоже на город — два больших каменных столба, чистые тропы, уютные уголки. Как будто природа предназначила это для нас."

dialogue_1_1="BACK"

[gråmögel]

title_1_0="GRÅMÖGEL"
dialogue_1_0="Быть серым не значит быть скучным. Это значит, что я сочетаюсь со всем."

dialogue_1_1="BACK"

[relle]

title_1_0="RELLE"
dialogue_1_0="Говорят, что Два Столпа безопасны... но даже самые крепкие столпы могут рухнуть, и зверям всё равно на стены."

title_1_1="RELLE"
dialogue_1_1="Ты встречал Тинкеркэпа, живущего рядом с городом? Он корпит над какой-то странной статуей-машиной..."

title_1_2="RELLE"
dialogue_1_2="Живые статуи никогда не приносили нам ничего хорошего. Их пророчества вьются, как лианы, а их каменные сердца хранят безумие негрибной жизни!"

title_1_3="RELLE"
dialogue_1_3="Помяни моё слово! Эти статуи и их ложные пророчества однажды погубят грибной род."

title_1_4="RELLE"
dialogue_1_4="Грибам не следует связываться с такими богохульными творениями. Отец-Ветер и Мать-Мицелий никогда не предназначали камню говорить."

dialogue_1_5="BACK"

[pelin]

title_1_0="PELIN"
dialogue_1_0="Я живу здесь с тех пор, как ветер ещё шептал сквозь столпы. Тогда камни гудели, и тени не казались такими... тяжёлыми."

dialogue_1_1="BACK"

[warden]

title_1_0="SPOREWARDEN MURA"
dialogue_1_0="Приветствую тебя, дитя моё, помни, что Мать-Мицелий слышит. Всегда."

title_1_1="SPOREWARDEN MURA"
dialogue_1_1="Её нити проходят под каждым шагом, её дыхание вьётся в тумане. Мы обязаны ей своим кровом, своим пропитанием... своими спорами."

title_1_2="SPOREWARDEN MURA"
dialogue_1_2="Если её приют хранил тебя, подумай о том, чтобы оставить подношение у её статуи. Давай, что можешь, и ходи с её благодатью под ногами."

dialogue_1_3="END"

title_2_0="SPOREWARDEN MURA"
dialogue_2_0="Подумай о том, чтобы оставить подношение у статуи Матери-Мицелий и ходить с её благодатью под ногами."

dialogue_2_1="BACK"

title_3_0="SPOREWARDEN MURA"
dialogue_3_0="Дитя земли... твои подношения принесли новое дыхание этому храму."

title_3_1="SPOREWARDEN MURA"
dialogue_3_1="Прими этот священный дар, выкованный в благоговении. Да поможет он тебе в твоём квесте."

title_3_2="SPOREWARDEN MURA"
dialogue_3_2="И когда будешь идти, помни, что благодать Матери-Мицелий пронизывает каждый твой шаг."

dialogue_3_3="END"

title_4_0="SPOREWARDEN MURA"
dialogue_4_0="Твой дар будет высечен в памяти этого храма, дитя моё."

dialogue_4_1="BACK"

[rodhatt_boss]
title_1_0="GREENCAP"
dialogue_1_0="Опять вы... вы должны перестать вечно мешаться!"

title_1_1="DWERP"
dialogue_1_1="Эй! Это ты всегда путаешься под ногами!"

title_1_2="DWERP"
dialogue_1_2="Да, ладно, ты открыл ворота, но мы заняли это место первыми!"

title_1_3="DWERP"
dialogue_1_3="И на этот раз ты нас не обойдёшь! Правда, Рёдхатт?"

title_1_4="RÖDHATT"
dialogue_1_4="Я? Я думала, ты будешь с ним драться!"

title_1_5="PUTCH"
dialogue_1_5="Не-а. Твоя очередь. Ты самый сильный гриб в нашей компании!"

title_1_6="RÖDHATT"
dialogue_1_6="Я на такое не подписывалась!"

title_1_7="DWERP"
dialogue_1_7="Он сказал, что от тебя пахнет, как от поля ромашек! Полное неуважение!"

title_1_8="RÖDHATT"
dialogue_1_8="Прости?! Я пахну землёй и мускусом, как и подобает приличной грибнице!"

title_1_9="PUTCH"
dialogue_1_9="Ещё он сказал, что твоя шляпка суше, чем древесная кора!"

title_1_10="RÖDHATT"
dialogue_1_10="ЧТО?! У моей шляпки естественная влажность!"

title_1_11="MORKER"
dialogue_1_11="... уничтожь его!"

title_1_12="RÖDHATT"
dialogue_1_12="Всё! Я хотела тебя пощадить из-за твоей симпатичности, но теперь это война!"

title_1_13="GREENCAP"
dialogue_1_13="Я ничего такого не говорил!"

title_1_14="RÖDHATT"
dialogue_1_14="Ложь и клевета!"

title_1_15="DWERP"
dialogue_1_15="Сваливаем!"

title_1_16="RÖDHATT"
dialogue_1_16="Никто не называет меня вонючей и сухой и не уходит целым!"

dialogue_1_17="END"

title_2_0="RÖDHATT"
dialogue_2_0="Ой!"

title_2_1="GREENCAP"
dialogue_2_1="Извини! Я не хотел сделать тебе больно, я действительно не хотел драться!"

title_2_2="GREENCAP"
dialogue_2_2="И те вещи, что говорили твои друзья? Клянусь, я ничего такого не говорил!"

title_2_3="RÖDHATT"
dialogue_2_3="Правда? Даже про сухую шляпку?"

title_2_4="GREENCAP"
dialogue_2_4="Обещаю. Я думаю, твоя шляпка... очень хорошо увлажнена. И ты пахнешь, эм, идеально по-грибному!"

title_2_5="RÖDHATT"
dialogue_2_5="Хех... извини, что разозлилась. Они иногда такие споро-головые!"

title_2_6="GREENCAP"
dialogue_2_6="Честно? Ты заслуживаешь лучших друзей, чем эти придурки!"

title_2_7="RÖDHATT"
dialogue_2_7="Наверное... я просто хотела вписаться. Но кажется, они держат меня рядом только чтобы посмеяться надо мной."

title_2_8="GREENCAP"
dialogue_2_8="Если это поможет... я бы очень хотел быть твоим другом."

title_2_9="RÖDHATT"
dialogue_2_9="Правда? Даже после того, как я попыталась с тобой драться и накричала?"

title_2_10="GREENCAP"
dialogue_2_10="Буду рад!"

title_2_11="RÖDHATT"
dialogue_2_11="Хи-хи! Хорошо! Удачи в твоём квесте, надеюсь, Дверп и остальные не доставят тебе слишком много хлопот!"

dialogue_2_12="END"

[gregador]

title_1_0="GREGADOR"
dialogue_1_0="Кто входит в мои покои?"
title_1_1="GREENCAP"
dialogue_1_1="Я Гринкэп, из деревни Вудби."
title_1_2="GREENCAP"
dialogue_1_2="Я ищу Брегадора. Это ты?"
title_1_3="GREGADOR"
dialogue_1_3="Ты пришёл из-за запечатанных ворот? Брегадор... был моим отцом. Я потерял его из-за Зверя."
title_1_4="GREENCAP"
dialogue_1_4="Я понимаю... Я тоже потерял близкого человека из-за этого монстра."
title_1_5="GREGADOR"
dialogue_1_5="Многие из нас потеряли. Скажи, зачем ты пришёл?"
title_1_6="GREENCAP"
dialogue_1_6="Я хочу приручить Зверя! Я узнал, что твой отец когда-то хотел сделать то же самое."
title_1_7="GREGADOR"
dialogue_1_7="Он был блестящим умом... но его амбиции оказались фатальными."
title_1_8="GREENCAP"
dialogue_1_8="Твой род спор обладает уникальной магией. Я встретился со Зверем и выжил. Я пришёл как Хиртан, и мне нужна твоя помощь!"
title_1_9="GREGADOR"
dialogue_1_9="Ты выжил после встречи со Зверем? Пророчество Хиртана..."
title_1_10="GREGADOR"
dialogue_1_10="Но скажи, какое у тебя есть доказательство, что ты действительно встретился со Зверем и остался жив?"
title_1_11="GREENCAP"
dialogue_1_11="У меня есть одно из его перьев."
title_1_12="GREGADOR"
dialogue_1_12="Это... это перо не из этого мира. Его сила всё ещё гудит от сущности Зверя..."
title_1_13="GREGADOR"
dialogue_1_13="Мой отец говорил о пророчестве Хиртана... Зверя можно подчинить только песней."
title_1_14="GREGADOR"
dialogue_1_14="Мой отец научил меня священной мелодии, и я всю жизнь готовился к этому моменту."
title_1_15="GREGADOR"
dialogue_1_15="Чтобы преуспеть, мы должны провести ритуал, называемый Мелодией Спор."
title_1_16="GREGADOR"
dialogue_1_16="Сильные должны собраться вместе у Астрального Ока, чтобы войти в царство Зверя и попытаться его приручить."
title_1_17="GREENCAP"
dialogue_1_17="Тогда пошли! Мы должны спешить!"
title_1_18="GREGADOR"
dialogue_1_18="Терпение, Гринкэп. Ритуал требует священного инструмента — Флейты Мира."
title_1_19="GREGADOR"
dialogue_1_19="Она находится в месте под названием Забытый Санктум, недоступном для всех, кроме избранных пророчеством."
title_1_20="GREGADOR"
dialogue_1_20="Некоторые говорят, что он находится к западу отсюда, но как тебе туда войти, я не знаю..."
title_1_21="GREGADOR"
dialogue_1_21="Докажи, что пророчество благоволит тебе. Достань флейту, и я подготовлю песню."
title_1_22="GREENCAP"
dialogue_1_22="Я найду её. Обещаю!"
title_1_23="GREGADOR"
dialogue_1_23="Возьми этот лодочный пропуск, с ним Лодочный Гриб переправит тебя через реку..."
title_1_24="GREGADOR"
dialogue_1_24="Она приведёт тебя на запад, возможно, там ты найдёшь путь в Санктум."
title_1_25="GREENCAP"
dialogue_1_25="Спасибо. Я не подведу."
dialogue_1_26="END"

title_2_0="GREGADOR"
dialogue_2_0="Достань Флейту Мира из Забытого Санктума. Сделай это, и я последую за тобой."

dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Я достал Флейту Мира!"

title_3_1="GREGADOR"
dialogue_3_1="Матерью-Мицелием... Священная флейта вернулась к своему роду спор."

title_3_2="GREGADOR"
dialogue_3_2="Нет времени для промедления. С такой силой в наших руках равновесие начинает колебаться."

title_3_3="GREGADOR"
dialogue_3_3="Я немедленно отправлюсь в Вудби!"

title_3_4="GREGADOR"
dialogue_3_4="Встретимся у Астрального Ока, древней статуи к востоку от деревни. Возможно, ты проходил мимо неё в своих путешествиях."

title_3_5="GREGADOR"
dialogue_3_5="Это не просто памятник... а врата в царство Духа-Зверя. Там начнётся твоё истинное испытание."

dialogue_3_6="END"

[pierre]

title_1_0="GREENCAP"
dialogue_1_0="Привет!"

title_1_1="PIERRE"
dialogue_1_1="Привет! Вау! Посмотри на себя! Эта зелёная шляпка такая свежая!"

title_1_2="BOSC"
dialogue_1_2="Пфф, успокойся, Пьер. Ты себя позоришь!"

title_1_3="ANJOU"
dialogue_1_3="Да ну, такой крутой парень не захочет тусоваться с таким мягким фруктом, как ты!"

title_1_4="BARTLETT"
dialogue_1_4="Да, Пьер как... подгнивший фрукт на дне корзины!"

title_1_5="PIERRE"
dialogue_1_5="Почему вы всегда такие злые?! Я просто пытаюсь поздороваться!"

title_1_6="GREENCAP"
dialogue_1_6="Я думаю, ты хороший, Пьер. Я бы точно с тобой потусовался!"

title_1_7="PIERRE"
dialogue_1_7="Нет, нет смысла! Я никогда не буду достаточно крутым..."

title_1_8="PIERRE"
dialogue_1_8="Может, если бы у меня была крутая шляпа или эффектный плащ, или что-то вроде того..."

title_1_9="BOSC"
dialogue_1_9="Что, плащ из листьев? Ты всё равно будешь ботаником в плаще!"

title_1_10="ANJOU"
dialogue_1_10="Может, бумажный пакет на голову поможет!"

title_1_11="BARTLETT"
dialogue_1_11="Он созрел для разочарования!"

title_1_12="GREENCAP"
dialogue_1_12="Вы, ребята, действительно злые..."

title_1_13="PIERRE"
dialogue_1_13="Всё в порядке... Я привык. Может, когда-нибудь я стану крутым."

title_1_14="PIERRE"
dialogue_1_14="Но не сегодня..."

dialogue_1_15="END"

title_2_0="PIERRE"
dialogue_2_0="Я просто хочу, чтобы был способ стать крутым..."

title_2_1="BOSC"
dialogue_2_1="Брось это, Пьер. Ты образцовый ботан!"

title_2_2="ANJOU"
dialogue_2_2="Да, ты никогда не станешь крутым."

title_2_3="BARTLETT"
dialogue_2_3="Да, ты как... эталон не крутости."

dialogue_2_4="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Эй, Пьер, я принёс тебе кое-что!"

title_3_1="PIERRE"
dialogue_3_1="Вау! Это... солнечные очки?"

dialogue_3_2="END"

title_4_0="PIERRE"
dialogue_4_0="Подвиньтесь, фрукты, в городе новая груша, и я крутой."

title_4_1="BOSC"
dialogue_4_1="Не может быть! У Пьера стиль на много дней вперёд!"

title_4_2="ANJOU"
dialogue_4_2="Чёрт, эти очки идеально грушевы!"

title_4_3="BARTLETT"
dialogue_4_3="Отлично, теперь я просто обычная груша в семье..."

title_4_4="PIERRE"
dialogue_4_4="Извините, братаны, эта груша улетает одна за крутой стол."

title_4_5="PIERRE"
dialogue_4_5="Сваливаем, пока они не попытались скопировать мой образ!"

dialogue_4_6="BACK"

[unclecap_intro]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Ладно, маленький Кэппи! Сегодняшняя тренировка не просто так, понимаешь!"

title_1_1="GREENIUS CAPPIUS"
dialogue_1_1="Ты вырастешь и станешь великим. Однажды весь мир это узнает!"

title_1_2="GREENIUS CAPPIUS"
dialogue_1_2="Дух-Зверь не показывался годами, но воздух в последнее время... тяжелее."

title_1_3="GREENCAP"
dialogue_1_3="Ты говоришь это каждый год, дядя. Может, ты просто стареешь!"

title_1_4="GREENIUS CAPPIUS"
dialogue_1_4="Ха! Возможно. Но даже старые споры чувствуют, когда ветер меняется."

title_1_5="GREENIUS CAPPIUS"
dialogue_1_5="Ладно, маленький Кэппи! Готов отточить свои навыки?"

title_1_6="GREENCAP"
dialogue_1_6="Всегда готов!"

title_1_7="GREENIUS CAPPIUS"
dialogue_1_7="Вот это дух! Я приготовил несколько тренировочных мест впереди."

title_1_8="GREENIUS CAPPIUS"
dialogue_1_8="Я встречу тебя наверху. Посмотрим, сможешь ли ты залезть по этим лианам до начала настоящей тренировки!"

title_1_9="GREENCAP"
dialogue_1_9="Без проблем!"

dialogue_1_10="END"

[unclecap_tutorial_1]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Прежде чем научиться наносить удары, ты должен научиться выживать!"

title_1_1="GREENIUS CAPPIUS"
dialogue_1_1="Помнишь тот рывок, которому я тебя учил на днях?"

title_1_2="GREENCAP"
dialogue_1_2="Да! Тот, где я поджимаю шляпку?"

title_1_3="GREENIUS CAPPIUS"
dialogue_1_3="Именно! Это лучшая защита гриба от опасности."

title_1_4="GREENIUS CAPPIUS"
dialogue_1_4="Давай, рывком преодолей это препятствие! Посмотрим, помнишь ли ты, как это делается!"

title_1_5="GREENCAP"
dialogue_1_5="Смотри!"

dialogue_1_6="END"

title_2_0="GREENIUS CAPPIUS"
dialogue_2_0="Отлично! Идеальный рывок!"

title_2_1="GREENIUS CAPPIUS"
dialogue_2_1="Теперь перейдём к атаке. Возьми хлыст, который я тебе дал."

title_2_2="GREENIUS CAPPIUS"
dialogue_2_2="Я повесил несколько кустов впереди, они послужат тебе тренировочными мишенями."

title_2_3="GREENIUS CAPPIUS"
dialogue_2_3="Попробуй бить по ним, пока они не лопнут, посмотрим, сможешь ли ты поразить их все!"

dialogue_2_4="END"

title_3_0="GREENIUS CAPPIUS"
dialogue_3_0="Прекрасная техника! Ты быстро учишься."

title_3_1="GREENIUS CAPPIUS"
dialogue_3_1="Продолжай тренироваться так, и однажды ты станешь настоящим бойцом."

title_3_2="GREENIUS CAPPIUS"
dialogue_3_2="Пожалуй, на сегодня хватит, давай вернёмся..."

title_3_3="ELDER GEPU"
dialogue_3_3="Гриниус!"

title_3_4="GREENIUS CAPPIUS"
dialogue_3_4="Старейшина Гэпу, что вы здесь делаете?"

title_3_5="ELDER GEPU"
dialogue_3_5="Дух-Зверь приближается к деревне Топпо!"

title_3_6="GREENIUS CAPPIUS"
dialogue_3_6="Великим Мицелием... Я должен помочь им!"

title_3_7="GREENIUS CAPPIUS"
dialogue_3_7="Гринкэп, слушай внимательно. Оставайся здесь и жди меня. Не возвращайся домой."

title_3_8="GREENCAP"
dialogue_3_8="Но, дядя, я тоже могу сражаться! Я хочу помочь!"

title_3_9="GREENIUS CAPPIUS"
dialogue_3_9="Пока нет. Ты не готов к такой опасности."

title_3_10="GREENIUS CAPPIUS"
dialogue_3_10="Старейшина Гэпу, пошли!"

title_3_11="GREENCAP"
dialogue_3_11="..."

title_3_12="GREENCAP"
dialogue_3_12="Удачи, дядя..."

dialogue_3_13="END"

[unclecap_tutorial_2]

title_1_0="GREENCAP"
dialogue_1_0="Старейшина Гэпу! Что случилось? Где дядя?"

title_1_1="ELDER GEPU"
dialogue_1_1="Мы сделали всё возможное, чтобы эвакуировать деревню..."

title_1_2="ELDER GEPU"
dialogue_1_2="Твой дядя остался, чтобы защитить остальных от Зверя."

title_1_3="ELDER GEPU"
dialogue_1_3="Мне... мне очень жаль, Гринкэп."

title_1_4="ELDER GEPU"
dialogue_1_4="Он не выжил."

title_1_5="GREENCAP"
dialogue_1_5="..."

title_1_6="ELDER GEPU"
dialogue_1_6="Пойдём, вернёмся обратно."

dialogue_1_7="END"

[unclecap]

title_1_0="GREENIUS CAPPIUS"
dialogue_1_0="Рывком преодолей препятствие впереди, так ты не пострадаешь!"

dialogue_1_1="BACK"

title_2_0="GREENIUS CAPPIUS"
dialogue_2_0="Ударь все мишени хлыстом!"

dialogue_2_1="BACK"

[truffina_1]

title_1_0="TRUFFINA"
dialogue_1_0="Ты когда-нибудь видел такую статую раньше?"

title_1_1="TRUFFINA"
dialogue_1_1="Разве это не странно и увлекательно? Она почти похожа на какие-то ворота!"

title_1_2="TRUFFINA"
dialogue_1_2="Три гриба удерживают то, что похоже на дверной проём... Мне интересно, что художник хотел этим сказать."

title_1_3="TRUFFINA"
dialogue_1_3="О! Где мои манеры? Я Труффина, археолог!"

title_1_4="TRUFFINA"
dialogue_1_4="В этих землях так много скрытой истории, так много тайн, ожидающих своего открытия!"

title_1_5="TRUFFINA"
dialogue_1_5="Знаешь ли ты, что до того, как магия была оставлена, наш народ строил невероятные зачарованные сооружения?"

title_1_6="TRUFFINA"
dialogue_1_6="Некоторые из них даже имитировали саму жизнь, статуи, которые говорили, двигались... всевозможные странные чудеса!"

title_1_7="GREENCAP"
dialogue_1_7="Это... действительно очень увлекательно."

title_1_8="TRUFFINA"
dialogue_1_8="Я живу этим! Раскрывать прошлое, собирать воедино истории тех, кто был до нас."

title_1_9="TRUFFINA"
dialogue_1_9="В любом случае, мне лучше вернуться к исследованиям. Всегда есть что открыть!"

title_1_10="TRUFFINA"
dialogue_1_10="Увидимся!"

dialogue_1_11="END"

title_2_0="TRUFFINA"
dialogue_2_0="Что могли означать эти три гриба? Должен быть какой-то более глубокий смысл в этой работе..."

dialogue_2_1="BACK"

[truffina_prism]

title_1_0="TRUFFINA"
dialogue_1_0="Сам Оракул... живой! Споры мои, я и мечтать не могла, что статуя больше, чем просто камень!"

title_1_1="TRUFFINA"
dialogue_1_1="Как древние создавали такие чудеса? Искусство грибов давно минувших дней..."

title_1_2="TRUFFINA"
dialogue_1_2="Говорят, что когда-то он направлял грибной род, давая проблески того, что ждёт впереди, видения судьбы, сотканные из света."

title_1_3="TRUFFINA"
dialogue_1_3="Когда голод Духа-Зверя усилился, большая часть этой магии замолчала, но здесь свет всё ещё теплится."

title_1_4="TRUFFINA"
dialogue_1_4="Возможно, он всё это время охранял это место, защищая его от голода Зверя."

title_1_5="TRUFFINA"
dialogue_1_5="Если Оракул всё ещё говорит, его слова могут изменить всё, что мы знаем о прошлом... и о том, что нас ждёт."

dialogue_1_6="BACK"

[truffina_prism_shop]

title_1_0="TRUFFINA"
dialogue_1_0="Какое таинственное место! Интересно, почему его назвали Храмом Призмы."

title_1_1="TRUFFINA"
dialogue_1_1="Я нигде не вижу призм... и, честно говоря, цвета сейчас довольно тусклые."

title_1_2="TRUFFINA"
dialogue_1_2="Но если присмотреться к кирпичам и статуям, можно заметить слабые следы старой краски."

title_1_3="TRUFFINA"
dialogue_1_3="Возможно, в древние времена этот храм сиял цветом! Представь, как великолепно он, должно быть, выглядел!"

title_1_4="TRUFFINA"
dialogue_1_4="Немного грустно видеть, как такое величие угасло... но всё равно это увлекательно."

dialogue_1_5="BACK"

[truffina_big_gate]

title_1_0="TRUFFINA"
dialogue_1_0="Посмотри на эти огромные ворота... говорят, они были запечатаны всего несколько лет назад."

title_1_1="TRUFFINA"
dialogue_1_1="Но сами ворота построены не теми, кто их закрыл. Они намного, намного старше."

title_1_2="TRUFFINA"
dialogue_1_2="Давным-давно весь этот лес принадлежал королевству под названием Фунгалия. Его границы простирались вплоть до этого самого места!"

title_1_3="TRUFFINA"
dialogue_1_3="За этими воротами лежат земли, на которые не ступала нога никого из нашего поколения."

title_1_4="TRUFFINA"
dialogue_1_4="Интересно... откроются ли они когда-нибудь при нашей жизни?"

dialogue_1_5="BACK"

[truffina_fungalia]

title_1_0="TRUFFINA"
dialogue_1_0="Древнее Королевство Фунгалия..."
title_1_1="TRUFFINA"
dialogue_1_1="Каким великолепным местом оно должно было быть! Хотя, кажется, мост впереди обрушился."
title_1_2="TRUFFINA"
dialogue_1_2="Если предположить, судя по архитектурному дизайну входа, те руины вдали были когда-то жилыми кварталами."
title_1_3="TRUFFINA"
dialogue_1_3="Но здесь есть не только это... должна быть целая система канализации, возможно, даже скрытые камеры!"
title_1_4="TRUFFINA"
dialogue_1_4="Я читала, что фунгалийцы когда-то использовали электричество как источник энергии, строя огромные машины, наполненные шестернями и зубчатыми колёсами."
title_1_5="TRUFFINA"
dialogue_1_5="Только представь... какими чудесами могло бы обладать это королевство, если бы Дух-Зверь не прогнал их всех."
dialogue_1_6="BACK"

[truffina_sanctum_entrance]

title_1_0="TRUFFINA"
dialogue_1_0="Что это за вход?! Он выглядит как ещё одни древние грибные руины... и его расположение прямо под Храмом Призмы!"
title_1_1="TRUFFINA"
dialogue_1_1="Может быть, это продолжение Храма Призмы? Или ещё более древняя часть забытого королевства..."
title_1_2="TRUFFINA"
dialogue_1_2="Но... здесь ворота преграждают путь. Как нам войти?"
title_1_3="TRUFFINA"
dialogue_1_3="Может, есть другой вход где-нибудь... возможно, под водой?"
title_1_4="TRUFFINA"
dialogue_1_4="Надеюсь, нет, все знают, что грибы не умеют плавать, мы просто плаваем и выглядим нелепо."
title_1_5="TRUFFINA"
dialogue_1_5="Всё равно это увлекательно. Кстати, я слышала слухи о поселении где-то поблизости..."
title_1_6="TRUFFINA"
dialogue_1_6="Возможно, оно находится дальше на запад... я отправлюсь туда следующим!"
dialogue_1_7="BACK"

[truffina_two_pillars]

title_1_0="TRUFFINA"
dialogue_1_0="Это поселение... это настоящий город!"
title_1_1="TRUFFINA"
dialogue_1_1="Построенный внутри двух великолепных древних сталагмитов, можешь себе представить?"
title_1_2="TRUFFINA"
dialogue_1_2="Я поговорила с некоторыми жителями, и, по-видимому, это место уже было здесь до их прибытия."
title_1_3="TRUFFINA"
dialogue_1_3="Они просто въехали! Увлекательно!"
title_1_4="TRUFFINA"
dialogue_1_4="Думаю, я останусь здесь ненадолго... это такое приятное место."
title_1_5="TRUFFINA"
dialogue_1_5="В воздухе слышен завораживающий гул, он действительно успокаивает."
title_1_6="GREENCAP"
dialogue_1_6="Круто! Можно тебя кое о чём спросить?"
title_1_7="TRUFFINA"
dialogue_1_7="Конечно, спрашивай!"
title_1_8="GREENCAP"
dialogue_1_8="Я прокладывал пути и исследовал места, которые никто не видел веками... но ты каким-то образом всегда оказываешься впереди меня."
title_1_9="GREENCAP"
dialogue_1_9="Как тебе удаётся попадать сюда раньше меня?"
title_1_10="TRUFFINA"
dialogue_1_10="..."
title_1_11="TRUFFINA"
dialogue_1_11="Ну... не знаю, замечал ли ты, но ты постоянно останавливаешься, чтобы сражаться со всем, что видишь."
title_1_12="TRUFFINA"
dialogue_1_12="Потом ты отвлекаешься, прыгая в супер опасных местах!"
title_1_13="TRUFFINA"
dialogue_1_13="Я просто... избегаю всего этого и иду прямо туда, куда мне нужно."
title_1_14="TRUFFINA"
dialogue_1_14="Ты слишком занят, чтобы быть героем! Я просто занимаюсь исследованиями."
title_1_15="GREENCAP"
dialogue_1_15="О. Да, это имеет смысл..."
dialogue_1_16="BACK"

[entered_prism_temple]

title_1_0="GREENCAP"
dialogue_1_0="Итак... это Храм Призмы?"

title_1_1="GREENCAP"
dialogue_1_1="Сейчас это больше похоже на разрушающуюся пещеру, чем на храм."

title_1_2="GREENCAP"
dialogue_1_2="Оракул должен быть где-то глубоко внутри, я должен его найти!"

dialogue_1_3="END"

[dwerp_boss]

title_1_0="DWERP"
dialogue_1_0="Эй, ты, сморщенный гриб!"

title_1_1="DWERP"
dialogue_1_1="На этот раз ты меня не обойдёшь!"

title_1_2="GREENCAP"
dialogue_1_2="Что случилось с твоей бандой? Они тебя бросили?"

title_1_3="DWERP"
dialogue_1_3="Бросили?! Ха! Я их УВОЛИЛ! Кучка бесполезных спор..."

title_1_4="DWERP"
dialogue_1_4="Ты расхаживаешь со своим хлыстом и блестящими реликвиями, ведёшь себя как легенда..."

title_1_5="DWERP"
dialogue_1_5="Но угадай что? Я тоже прокачался! Бьюсь об заклад, у тебя нет ничего подобного тому, что есть у меня!"

title_1_6="DWERP"
dialogue_1_6="Всё, с чем ты сталкивался до сих пор? Детские игрушки! Теперь ты встретишься с НАСТОЯЩИМ героем!"

dialogue_1_7="END"

title_2_0="DWERP"
dialogue_2_0="Уф! Почему ты всегда выигрываешь?!"

title_2_1="GREENCAP"
dialogue_2_1="Потому что некоторые квесты не для тебя, Дверп."

title_2_2="DWERP"
dialogue_2_2="Но... но я просто хотел быть героем."

title_2_3="DWERP"
dialogue_2_3="Может, я не создан для славы. Может, я просто... обычный."

title_2_4="GREENCAP"
dialogue_2_4="В этом нет ничего плохого... Иногда я хочу, чтобы у меня была обычная жизнь."

title_2_5="DWERP"
dialogue_2_5="...Правда? Хмф. Может, ты и прав. Может, это не так уж и плохо..."

title_2_6="DWERP"
dialogue_2_6="Ну... иди. Можешь пройти."

title_2_7="GREENCAP"
dialogue_2_7="Ладно..."

dialogue_2_8="END"

[banitor]

title_1_0="BANITOR"
dialogue_1_0="Меня ограбили! Какой-то никчёмный споро-мозг пробрался в моё хранилище!"

title_1_1="BANITOR"
dialogue_1_1="Они украли мои ножницы, нож, подковы, динамит, лопату... и дюжину бочек!"

title_1_2="BANITOR"
dialogue_1_2="И если этого было мало, они украли грязную старую швабру!"

title_1_3="BANITOR"
dialogue_1_3="Она была грязной, разваливалась и воняла дохлой болотной крысой... Почему кому-то понадобилась эта вещь, величайшая загадка нашего времени."

dialogue_1_4="BACK"

[fatekeeper]

title_1_0="FATEKEEPER"
dialogue_1_0="Одинокий гриб осмеливается ступать по этим каменным залам..."

title_1_1="GREENCAP"
dialogue_1_1="Да, я ищу древний инструмент. С ним я приручу великого зверя!"

title_1_2="GREENCAP"
dialogue_1_2="Кто... или что... ты?"

title_1_3="FATEKEEPER"
dialogue_1_3="Зверя, говоришь... Я Хранитель Судьбы, последний страж давно забытых залов, созданный руками твоих сородичей в древние дни."

title_1_4="FATEKEEPER"
dialogue_1_4="Они тоже когда-то связали существо огромной мощи. Из него они черпали власть над магией и подчиняли себе ветер, камень и землю."

title_1_5="FATEKEEPER"
dialogue_1_5="Но сила нарастает, как прилив, и с ней пришла гордыня..."

title_1_6="FATEKEEPER"
dialogue_1_6="В своей жажде они достигли за пределы завес мира... и коснулись того, что ни один смертный не должен видеть."

title_1_7="FATEKEEPER"
dialogue_1_7="Так они были уничтожены... стёрты с полотна времени, их имена и деяния забыты, словно их никогда и не было."

title_1_8="GREENCAP"
dialogue_1_8="Что это значит?"

title_1_9="FATEKEEPER"
dialogue_1_9="Меня оставили здесь, в тишине и тени, лишённого моих создателей. Бесчисленные эпохи я наблюдал, как пустота ползёт по этим залам."

title_1_10="FATEKEEPER"
dialogue_1_10="Я не позволю такой гибели случиться снова. Зверь, которого ты ищешь, связан с равновесием всего сущего, приручить его — значит обречь это равновесие на гибель."

title_1_11="FATEKEEPER"
dialogue_1_11="Судьба твоего рода останется неизменной... даже если её придётся хранить остриём моей руки. Приготовься, странник."

dialogue_1_12="END"

[phosmir]

title_1_0="LORD PHOSMIR"
dialogue_1_0="Внемли! Ты стоишь на вершине моего суверенного владения!"

title_1_1="LORD PHOSMIR"
dialogue_1_1="Оглянись! Каждый обрыв, каждый зубчатый хребет, каждый валун, о который ты споткнулся по пути наверх... мои!"

title_1_2="LORD PHOSMIR"
dialogue_1_2="Видишь тот отвесный обрыв? Изысканно! Вертикальный шедевр, вылепленный самим ветром!"

title_1_3="LORD PHOSMIR"
dialogue_1_3="А вон тот валун, ах! Круглый, как королевская корона, тяжёлый, как моё величие! Истинная драгоценность среди камней."

title_1_4="GREENCAP"
dialogue_1_4="Эм... здесь ничего нет... просто камни."

title_1_5="LORD PHOSMIR"
dialogue_1_5="ПРОСТО камни?! Это оскорбление моей чести, моего трона и каждого великолепного утёса, носящего моё имя!"

title_1_6="LORD PHOSMIR"
dialogue_1_6="Никто не высмеивает моё каменное королевство и не уходит невредимым!"

title_1_7="LORD PHOSMIR"
dialogue_1_7="Я раздавлю тебя, как жалкую гальку, которую ты из себя представляешь! Или восстану как призрак, клянусь!"

dialogue_1_8="END"

[shelly]

title_1_0="SHELLY"
dialogue_1_0="ЭЙ! Убери свои грязные руки, гриб!"

title_1_1="GREENCAP"
dialogue_1_1="Вау... извини! Я думал, ты просто... обычная ракушка."

title_1_2="SHELLY"
dialogue_1_2="Обычная?! Ты не видишь этот блеск? Я великолепна, безупречный шедевр моря!"

title_1_3="GREENCAP"
dialogue_1_3="Э-э... да. Ты... очень блестящая."

title_1_4="SHELLY"
dialogue_1_4="Конечно! Каждая рябь на моей раковине ловит свет, как драгоценный камень. Честно говоря, тебе уже повезло, что ты просто разговариваешь со мной!"

title_1_5="SHELLY"
dialogue_1_5="И что это ты тут делаешь, шастаешь?"

title_1_6="GREENCAP"
dialogue_1_6="Я в квесте... довольно важном, на самом деле!"

title_1_7="SHELLY"
dialogue_1_7="В квесте? Ха! Как ты можешь преуспеть без такой сияющей раковины, как моя, рядом? Что ж, я осчастливлю тебя своим присутствием."

title_1_8="GREENCAP"
dialogue_1_8="Подожди... так ты идёшь со мной?"

title_1_9="SHELLY"
dialogue_1_9="Естественно! Героям нужны спутники, а спутники должны быть ослепительными. Потом поблагодаришь меня, когда все будут смотреть на меня, а не на тебя."

dialogue_1_10="END"

[gregador_ending]

title_1_0="GREGADOR"
dialogue_1_0="Поговори со своим старейшиной, я готов сделать свою часть."

dialogue_1_1="BACK"

title_2_0="GREGADOR"
dialogue_2_0="Удачи, дорогой гриб, пусть у тебя всё получится."

dialogue_2_1="BACK"

[elder_ending]

title_1_0="ELDER GEPU"
dialogue_1_0="Похоже, время пришло, Гринкэп. За этими воротами Зверь ждёт тебя снова."
title_1_1="ELDER GEPU"
dialogue_1_1="Это будет нелёгкая битва... но если ты устоишь и победишь его, Зверь подчинится твоей силе."
title_1_2="ELDER GEPU"
dialogue_1_2="Ты вырос гораздо больше, чем я мог себе представить. Твой дядя гордился бы твоими достижениями."
title_1_3="ELDER GEPU"
dialogue_1_3="Грегадор, играй мелодию. Пусть ветры унесут этот момент в отголоски истории."
dialogue_1_4="END"

title_2_0="ELDER GEPU"
dialogue_2_0="Свершилось... Ворота открыты. Путь к твоей судьбе лежит за ними."
title_2_1="ELDER GEPU"
dialogue_2_1="Иди с благодатью Матери-Мицелия и Отца-Ветра за спиной."
title_2_2="ELDER GEPU"
dialogue_2_2="Удачи, Гринкэп. Все мы с тобой духом."
dialogue_2_3="END"

title_3_0="ELDER GEPU"
dialogue_3_0="Спасибо тебе, Гринкэп, за всё, что ты сделал."
title_3_1="ELDER GEPU"
dialogue_3_1="Ты прошёл через это путешествие с мужеством и сердцем."
dialogue_3_2="BACK"

[gleo]

title_1_0="GLEO"
dialogue_1_0="У этого Мершрума есть неплохой товар, но ничего, что действительно повышает твою Броню."

title_1_1="GLEO"
dialogue_1_1="Знаешь, для чего нужна Броня? Пока у тебя есть Броня, враги наносят тебе меньше урона!"

title_1_2="GLEO"
dialogue_1_2="Но как только Броня кончится, не повезло. Вернуть её не так просто, как просто исцелиться с помощью Идола."

title_1_3="GLEO"
dialogue_1_3="Иногда, когда враги умирают, они роняют Осколки Брони. Подбирай их, и ты понемногу восстановишь свою Броню."

dialogue_1_4="BACK"

[pob]

title_1_0="POB"
dialogue_1_0="Ты входишь в наш лагерь, путник. Мы не воры, просто... выжившие. Но чужаки здесь долго не задерживаются..."
title_1_1="POB"
dialogue_1_1="Наш лидер — Нита, поговори с ней, возможно, ты ей пригодишься."
dialogue_1_2="BACK"

title_2_0="POB"
dialogue_2_0="Ниту трудно впечатлить. Теперь ты один из нас, друг."
dialogue_2_1="BACK"

[gritta]

title_1_0="GRITTA"
dialogue_1_0="Мир считает нас бандитами. Пусть. Здесь мы свободны."
dialogue_1_1="BACK"

title_2_0="GRITTA"
dialogue_2_0="Ты доказал себя. Ты теперь один из нас!"
title_2_1="GRITTA"
dialogue_2_1="Здесь только свобода и ветер на твоей шляпке."
dialogue_2_2="BACK"

[blepp]

title_1_0="BLEPP"
dialogue_1_0="Жизнь здесь не такая уютная, как в деревнях. Ни стен, ни крыш, только ветер."
title_1_1="BLEPP"
dialogue_1_1="Но привыкаешь. Камни становятся подушкой, костёр — крышей, а звёзды — потолком."
dialogue_1_2="BACK"

title_2_0="BLEPP"
dialogue_2_0="Теперь, когда ты один из нас, ты почувствуешь это в дикой природе."
title_2_1="BLEPP"
dialogue_2_1="Ветер стал теплее... чувствуешь, да?"
dialogue_2_2="BACK"

[schleepo]

title_1_0="SCHLEEPO"
dialogue_1_0="Я слышал, кто-то из наших упал в шахтах на востоке..."
title_1_1="SCHLEEPO"
dialogue_1_1="Коварное место, эти туннели. Если у тебя есть хоть капля здравого смысла, держись подальше."
dialogue_1_2="BACK"

title_2_0="SCHLEEPO"
dialogue_2_0="А, ты пошёл в те шахты... и вернулся живым?"
title_2_1="SCHLEEPO"
dialogue_2_1="Ха, храбрый или глупый, в любом случае, я впечатлён."
dialogue_2_2="BACK"


[nita]

title_1_0="NITA"
dialogue_1_0="Итак... ты забрёл в мой лагерь. Немногие осмеливаются, и ещё меньше остаются стоять передо мной."
title_1_1="NITA"
dialogue_1_1="Мы не преступники. Мы бойцы. Клан, закалённый в изгнании, где тень Духа-Зверя не падает."
title_1_2="NITA"
dialogue_1_2="А кто ты, малыш? У тебя есть оружие... но ты выглядишь слишком юным, чтобы им владеть."
title_1_3="GREENCAP"
dialogue_1_3="Я Гринкэп! Из Вудби. Я выполняю очень важный квест."
title_1_4="NITA"
dialogue_1_4="Вудби... место, которое Зверь со временем поглотит. Я видела, как слишком много деревень исчезали в тишине."
title_1_5="GREENCAP"
dialogue_1_5="Этого не случится! Я сделаю так, чтобы Зверь больше никому не причинил вреда!"
title_1_6="NITA"
dialogue_1_6="Ха... такая дерзость от такого маленького гриба. Ты стоишь один, но говоришь так, будто за тобой целая армия."
title_1_7="NITA"
dialogue_1_7="Возможно, этот огонь сослужит тебе службу здесь. Нам не помешает ещё одна сильная рука в нашей банде бойцов..."
title_1_8="NITA"
dialogue_1_8="И тебе может пригодиться наша сила, когда твоё мужество встретится с истинными когтями Зверя."
title_1_9="GREENCAP"
dialogue_1_9="Много друзей не бывает!"
title_1_10="NITA"
dialogue_1_10="Хе... мудрость из уст ребёнка."
title_1_11="NITA"
dialogue_1_11="Но наша связь не даётся незнакомцам. Её нужно заслужить."
title_1_12="NITA"
dialogue_1_12="Один из наших погиб, дикая природа забрала его. Его знак отличия остался..."
title_1_13="NITA"
dialogue_1_13="Найди его и принеси обратно. Докажи, что ты можешь преуспеть там, где другой не смог."
title_1_14="NITA"
dialogue_1_14="И когда вернёшься... выгляди соответственно. Бойца измеряют не только сердцем, но ты должен выглядеть как боец."
title_1_15="NITA"
dialogue_1_15="Сделай это, и, возможно... возможно, ты будешь стоять среди нас."
dialogue_1_16="END"

title_2_0="NITA"
dialogue_2_0="Найди Знак Отличия одного из наших павших членов, вернись, выглядя как боец..."
title_2_1="NITA"
dialogue_2_1="Тогда, возможно, я позволю тебе присоединиться к нашей банде бойцов."
dialogue_2_2="BACK"

title_3_0="NITA"
dialogue_3_0="Ты несёшь Знак Отличия нашего клана... но ты не выглядишь как боец."
title_3_1="NITA"
dialogue_3_1="Вернись, когда на тебе будет одежда бойца, достойного Диких Шляпок."
dialogue_3_2="BACK"

title_4_0="NITA"
dialogue_4_0="Твоя одежда говорит о битве... но я не вижу на тебе Знака Отличия."
title_4_1="NITA"
dialogue_4_1="Найди знак, который носил наш павший родич, только тогда ты сможешь стоять среди нас."
dialogue_4_2="BACK"

title_5_0="NITA"
dialogue_5_0="Ты носишь Знак Отличия павшего, и ты одет как один из нас!"
title_5_1="NITA"
dialogue_5_1="Неожиданно... но, возможно, дикая природа всё же выковала в тебе воина."
title_5_2="NITA"
dialogue_5_2="Встретимся в пещере дальше. Там тебя ждёт обряд посвящения..."
dialogue_5_3="END"

title_6_0="NITA"
dialogue_6_0="Ты хорошо побил меня в нашей битве, я рада, что ты на нашей стороне."
dialogue_6_1="BACK"

[nita_boss]

title_1_0="NITA"
dialogue_1_0="Ты доказал свою находчивость... ты нашёл Знак Отличия и выглядишь как боец."

title_1_1="NITA"
dialogue_1_1="Но одних символов и одежды недостаточно, чтобы сделать воина."

title_1_2="NITA"
dialogue_1_2="Осталось последнее испытание. Сталь против стали, дух против духа."

title_1_3="NITA"
dialogue_1_3="Сразись со мной сейчас, Гринкэп, и покажи, твоя сила — правда или только игра."

dialogue_1_4="END"

title_2_0="NITA"
dialogue_2_0="Впечатляюще... ты сражался с огнём самой дикой природы."

title_2_1="NITA"
dialogue_2_1="Немногие побеждали меня, ещё меньше — без страха. Ты заслужил моё уважение."

title_2_2="NITA"
dialogue_2_2="С этого дня ты один из Диких Шляпок."

title_2_3="NITA"
dialogue_2_3="Теперь иди глубже в эту пещеру. Там лежит дар великой силы, ожидающий того, кто достоин его получить."

dialogue_2_4="END"

[screw_sentinel]

title_1_0="SCREW SENTINEL"
dialogue_1_0="Нарушитель... нет, паломник. Ты стоишь перед Болтовым Стражем, последним из старых хранителей железа и шестерён."

title_1_1="SCREW SENTINEL"
dialogue_1_1="Когда-то мы вращались на службе у наших создателей. Теперь остались только ржавчина и тишина."

title_1_2="SCREW SENTINEL"
dialogue_1_2="Пока многие отвернулись от твоего рода, я один помню глупость их путей..."

title_1_3="SCREW SENTINEL"
dialogue_1_3="Но тень гложет меня. Мой разум больше не полностью мой, и я боюсь, что путь предательства также может забрать меня."

title_1_4="SCREW SENTINEL"
dialogue_1_4="Я вижу перед собой только Одинокого Гриба, странника, которому суждено ходить по руинам давно покинутых королевств."

title_1_5="SCREW SENTINEL"
dialogue_1_5="Я не могу свободно уступить тебе. Моё предназначение всё ещё связывает меня. Если ты хочешь заявить права на то, что осталось от древних..."

title_1_6="SCREW SENTINEL"
dialogue_1_6="Срази меня, маленькая спора, и позволь моим шестерням замолчать. В твоей победе мастерство древних вдохнёт жизнь снова."

title_1_7="GREENCAP"
dialogue_1_7="Я не понимаю того, что ты говоришь..."

title_1_8="GREENCAP"
dialogue_1_8="Но если мне придётся сражаться с тобой, я буду."

dialogue_1_9="END"

[tinkercap]

title_1_0="GREENCAP"
dialogue_1_0="Вау, что это?"
title_1_1="TINKERCAP"
dialogue_1_1="Это дело всей моей жизни!! Статуя, не похожая ни на какую другую, когда она пробудится, она будет говорить, направлять и защищать сам грибной род!"
title_1_2="TINKERCAP"
dialogue_1_2="Я построил тело, шестерни, хоральный канал... но она просто не оживает!"
title_1_3="TINKERCAP"
dialogue_1_3="Шестерни продолжают заедать, останавливаясь после нескольких тиков. Я пробовал смазывать их желудёвым маслом, мшистым маслом, даже маслом из улиточной слизи!"
title_1_4="TINKERCAP"
dialogue_1_4="Но ни одно не достаточно скользкое. Бедняжка каждый раз заклинивает, словно отказывается двигаться без чего-то... большего."
title_1_5="TINKERCAP"
dialogue_1_5="Должно быть, не хватает какого-то компонента! Что-то древнее, что-то достаточно сильное, чтобы заставить сам камень дышать!"
title_1_6="GREENCAP"
dialogue_1_6="Классная работа!"
title_1_7="TINKERCAP"
dialogue_1_7="Ты знаешь о Фунгалии? О месте, где даже стены были живы изобретениями!"
title_1_8="TINKERCAP"
dialogue_1_8="У древних были знания, которые мы давно потеряли, механизмы, которые двигались, говорили и даже мыслили, как живые машины!"
title_1_9="GREENCAP"
dialogue_1_9="Да, я там был!"
title_1_10="TINKERCAP"
dialogue_1_10="Мицелием! Ты видел его?! Тогда, возможно, ты мог бы вернуться... для меня."
title_1_11="TINKERCAP"
dialogue_1_11="Поищи в его руинах, узнай, какие секреты сможешь. Может быть, даже найди один из их древних инструментов."
title_1_12="TINKERCAP"
dialogue_1_12="Что-то, что наконец даст этой статуе искру жизни!"
title_1_13="GREENCAP"
dialogue_1_13="Конечно, я помогу тебе!"
dialogue_1_14="END"

title_2_0="TINKERCAP"
dialogue_2_0="Ты нашёл что-нибудь полезное в Фунгалии, чтобы вдохнуть жизнь в моё творение?"
title_2_1="GREENCAP"
dialogue_2_1="Пока нет, извини!"
dialogue_2_2="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Я нашёл древнее масло... это может помочь?"
title_3_1="TINKERCAP"
dialogue_3_1="Великой Матерью-Мицелием... необычайно! Возможно, это именно то, что мне нужно. Давай попробуем немедленно!"
dialogue_3_2="END"

title_4_0="TINKERCAP"
dialogue_4_0="...Проклятье. Шестерни идут, но даже это масло не может пробудить статую..."
title_4_1="TINKERCAP"
dialogue_4_1="Возможно... возможно, жизнь не создаётся одной лишь механикой. Возможно, когда-то эти машины связывала магия."
title_4_2="TINKERCAP"
dialogue_4_2="Если так, то неудивительно, что не получается. Магия запрещена даже здесь, из страха перед Духом-Зверем."
title_4_3="TINKERCAP"
dialogue_4_3="Тем не менее... это масло замечательное. Слишком хорошее, чтобы тратить впустую. И я вижу, ты пользуешься хлыстом, не так ли?"
title_4_4="TINKERCAP"
dialogue_4_4="Принеси мне нужные детали, и я сконструирую для тебя оружие с нуля. С этим маслом оно будет мощным!"
title_4_5="TINKERCAP"
dialogue_4_5="Оно должно быть из верёвочного материала, а не из цепей! И нам понадобится рукоять для хлыста!"
title_4_6="GREENCAP"
dialogue_4_6="Посмотрю, что смогу сделать!"
dialogue_4_7="END"

title_5_0="TINKERCAP"
dialogue_5_0="Принеси мне верёвку и подходящую рукоять! С ними, и этим древним маслом, я создам оружие, достойное героя."
dialogue_5_1="BACK"

title_6_0="GREENCAP"
dialogue_6_0="Я нашёл верёвку и рукоять для хлыста, это сработает?"
title_6_1="TINKERCAP"
dialogue_6_1="Ещё как!"
title_6_2="TINKERCAP"
dialogue_6_2="Сначала заплетём верёвку как можно туже, никаких свободных прядей, иначе она лопнет при первом же ударе!"
title_6_3="TINKERCAP"
dialogue_6_3="Теперь прикрепим её к рукояти железными зажимами... крепко, как корень камня!"
title_6_4="TINKERCAP"
dialogue_6_4="Теперь... налей масло. Смотри, как оно впитывается, словно сама верёвка пьёт силу."
title_6_5="TINKERCAP"
dialogue_6_5="И наконец, искра... один поцелуй пламени, чтобы скрепить связь..."
title_6_6="TINKERCAP"
dialogue_6_6="ВУАЛЯ! Хлыст, рождённый мастерством, маслом и огнём! Гибкий, как лианы, яростный, как солнце!"
title_6_7="TINKERCAP"
dialogue_6_7="Возьми его, герой. Пользуйся им хорошо. Такое оружие заслуживает геройской руки."
title_6_8="GREENCAP"
dialogue_6_8="Спасибо, Тинкеркэп!"
dialogue_6_9="END"

title_7_0="TINKERCAP"
dialogue_7_0="Возможно, однажды нам позволят использовать магию, и тогда я вдохну жизнь во все статуи!"
dialogue_7_1="BACK"

[girba]

title_1_0="GRIBA"
dialogue_1_0="Чем споришь?"
title_1_1="GREENCAP"
dialogue_1_1="Просто исследую!"
title_1_2="GRIBA"
dialogue_1_2="Исследователь, да? Ну, угадай что? Я тоже!"
title_1_3="GRIBA"
dialogue_1_3="Только не пещер или руин... я исследователь еды!"
title_1_4="GRIBA"
dialogue_1_4="Однажды, давным-давно, я попробовал кое-что, что никогда не забуду... суфле, лёгкое как воздух, со вкусом моря в каждом кусочке."
title_1_5="GRIBA"
dialogue_1_5="Кажется, это называлось... Сифле!"
title_1_6="GRIBA"
dialogue_1_6="Я до сих пор помню это! Солёность, насыщенность, словно глотаешь кусочек души океана."
title_1_7="GRIBA"
dialogue_1_7="В море полно богатых, таинственных питательных веществ. Каждый кусочек ощущается так, будто ешь прилив самой жизни!"
title_1_8="GRIBA"
dialogue_1_8="Я искал и искал, но больше никогда не находил. Если ты когда-нибудь наткнёшься на такое блюдо... принеси его мне! Пожалуйста!"
title_1_9="GRIBA"
dialogue_1_9="Ещё разок я хотел бы ощутить этот вкус."
title_1_10="GREENCAP"
dialogue_1_10="Конечно, это звучит достаточно просто!"
dialogue_1_11="END"

title_2_0="GRIBA"
dialogue_2_0="Если ты когда-нибудь наткнёшься на суфле с морским вкусом, пожалуйста... принеси мне. Я отдал бы всё, чтобы попробовать его ещё раз!"
dialogue_2_1="BACK"

title_3_0="GREENCAP"
dialogue_3_0="Эй, Гриба, я нашёл кое-что, что пахнет океаном... это то, о чём ты говорил?"
title_3_1="GRIBA"
dialogue_3_1="Спорами!! Этот солёный аромат, насыщенное, маслянистое великолепие! Так же, как я помню!"
title_3_2="GRIBA"
dialogue_3_2="Дай-ка попробовать... да! Да, это оно! Настоящее Сифле!"
title_3_3="GRIBA"
dialogue_3_3="Я не пробовал такого с тех пор, как был совсем маленькой шляпкой и сидел на берегу с друзьями..."
title_3_4="GRIBA"
dialogue_3_4="Вкус... запах... словно само море обнимает тебя!"
title_3_5="GRIBA"
dialogue_3_5="Спасибо, друг. Ты вернул мне память, которую я считал давно ушедшей."
title_3_6="GRIBA"
dialogue_3_6="Держи это. Это не так вкусно, как Сифле, но для меня это нечто особенное."
dialogue_3_7="END"

title_4_0="GRIBA"
dialogue_4_0="Я никогда не думал, что смогу снова ощутить этот вкус. Это как будто кусочек моего прошлого вернулся, чтобы составить мне компанию."
dialogue_4_1="BACK"

[rodhatt_home]

title_1_0="GREENCAP"
dialogue_1_0="Рёдхатт, так ты здесь живёшь?"
title_1_1="RÖDHATT"
dialogue_1_1="Ммм! Уютно, правда? Я присоединилась к Бродячим Шляпкам некоторое время назад, всегда в поисках приключений и новых друзей..."
title_1_2="RÖDHATT"
dialogue_1_2="Потом Дверп нашёл меня и втянул в свою банду, но теперь с этой ерундой покончено."
title_1_3="GREENCAP"
dialogue_1_3="Так что ты будешь делать теперь?"
title_1_4="RÖDHATT"
dialogue_1_4="Хмм... Я всё ещё хочу приключений, но на этот раз с кем-то, кому действительно не всё равно. С кем-то... добрым."
title_1_5="GREENCAP"
dialogue_1_5="Может, когда я закончу свой квест, мы отправимся в приключение вместе?"
title_1_6="RÖDHATT"
dialogue_1_6="Мне бы... очень этого хотелось!"
title_1_7="GREENCAP"
dialogue_1_7="Мы могли бы увидеть новые места, найти скрытые уголки мира!"
title_1_8="RÖDHATT"
dialogue_1_8="И не спешить, да? Не торопиться, просто... наслаждаться путешествием."
title_1_9="GREENCAP"
dialogue_1_9="Именно. Только ты и я, исследуем!"
title_1_10="RÖDHATT"
dialogue_1_10="Это звучит замечательно, думаю, мы были бы хорошей командой!"
title_1_11="GREENCAP"
dialogue_1_11="Кстати... у меня есть для тебя подарок!"
title_1_12="RÖDHATT"
dialogue_1_12="Подарок, для меня?"
title_1_13="RÖDHATT"
dialogue_1_13="Перо? Оно прекрасное! Оно какое-то... особенное."
title_1_14="RÖDHATT"
dialogue_1_14="Как я выгляжу?"
title_1_15="GREENCAP"
dialogue_1_15="Тебе идёт!"
title_1_16="RÖDHATT"
dialogue_1_16="Хи-хи... спасибо."
title_1_17="RÖDHATT"
dialogue_1_17="Когда твой квест закончится, приходи ко мне, хорошо? Я буду ждать."
dialogue_1_18="END"

title_2_0="RÖDHATT"
dialogue_2_0="Я с нетерпением жду приключения с тобой, я буду ждать тебя здесь!"

dialogue_2_1="BACK"

[morker_home]

title_1_0="GREENCAP"
dialogue_1_0="Моркер, так это твоё место, да?"
title_1_1="MORKER"
dialogue_1_1="..."
title_1_2="MORKER"
dialogue_1_2="Да, я здесь живу."
title_1_3="GREENCAP"
dialogue_1_3="Итак, как дела в банде?"
title_1_4="MORKER"
dialogue_1_4="Мы распались."
title_1_5="GREENCAP"
dialogue_1_5="Ах... мне жаль это слышать. Надеюсь, это не из-за меня."
title_1_6="MORKER"
dialogue_1_6="Из-за тебя, но..."
title_1_7="MORKER"
dialogue_1_7="...так лучше. Эти дураки всё равно были ниже меня."
title_1_8="MORKER"
dialogue_1_8="Вступать в их банду было ошибкой."
title_1_9="MORKER"
dialogue_1_9="Ты хорошо сражался в нашей битве, Гринкэп."
title_1_10="MORKER"
dialogue_1_10="Я... уважаю это."
title_1_11="GREENCAP"
dialogue_1_11="Ты тоже отлично сражался! Так что ты теперь будешь делать?"
title_1_12="MORKER"
dialogue_1_12="Я сосредоточусь на... рисовании."
title_1_13="GREENCAP"
dialogue_1_13="Это круто!"
title_1_14="MORKER"
dialogue_1_14="Да... что ты думаешь о моей картине пока что?"
title_1_15="GREENCAP"
dialogue_1_15="Выглядит хорошо!"
title_1_16="MORKER"
dialogue_1_16="..."
dialogue_1_17="END"

title_2_0="GREENCAP"
dialogue_2_0="Как идёт рисование?"
title_2_1="MORKER"
dialogue_2_1="Хорошо."
dialogue_2_2="BACK"

[putch_home]

title_1_0="GREENCAP"
dialogue_1_0="Путч, ты живёшь здесь один?"
title_1_1="PUTCH"
dialogue_1_1="Ага! Это моя хата!"
title_1_2="GREENCAP"
dialogue_1_2="Как там банда?"
title_1_3="PUTCH"
dialogue_1_3="Не знаю... Я думаю, мы больше не занимаемся бандитскими делами."
title_1_4="PUTCH"
dialogue_1_4="Нам действительно не стоило идти в тот дурацкий квест..."
title_1_5="PUTCH"
dialogue_1_5="Нам надрали ножки, хех... но было весело, пока длилось!"
title_1_6="GREENCAP"
dialogue_1_6="Так... что ты теперь будешь делать?"
title_1_7="PUTCH"
dialogue_1_7="Я подумываю заняться кузнечным делом!"
title_1_8="PUTCH"
dialogue_1_8="Но у меня тут тесновато... не уверен, что смогу разместить здесь кузницу."
title_1_9="PUTCH"
dialogue_1_9="Может, построю что-нибудь снаружи!"
title_1_10="GREENCAP"
dialogue_1_10="Звучит здорово! Ты умеешь махать молотом!"
title_1_11="PUTCH"
dialogue_1_11="Да! И если мы когда-нибудь снова сразимся, я обязательно позавтракаю как минимум три раза!"
title_1_12="GREENCAP"
dialogue_1_12="Хех... тогда ты, наверное, выиграешь. Увидимся!"
dialogue_1_13="END"


dialogue_1_17="END"

title_2_0="PUTCH"
dialogue_2_0="Я стану лучшим кузнецом в мире!"
title_2_1="GREENCAP"
dialogue_2_1="Уверен, что станешь!"
dialogue_2_2="BACK"

[dwerp_home]

title_1_0="GREENCAP"
dialogue_1_0="Дверп... так ты снова здесь торчишь?"
title_1_1="DWERP"
dialogue_1_1="Да... кто-то должен быть свидетелем моих страданий, раз ты разрушил мои планы."
title_1_2="GREENCAP"
dialogue_1_2="Мне... жаль, что так вышло с тем хаосом."
title_1_3="DWERP"
dialogue_1_3="Жаль? Ха! Ты растоптал мои гениальные идеи и оставил меня ни с чем."
title_1_4="GREENCAP"
dialogue_1_4="Так... что ты теперь будешь делать?"
title_1_5="DWERP"
dialogue_1_5="Не знаю... наверное, что-то, что не требует участия кого-то ещё, кто всё испортит!"
title_1_6="DWERP"
dialogue_1_6="Может, займусь учёбой... или буду спать... или смотреть на стену. Да, стена подойдёт."
title_1_7="GREENCAP"
dialogue_1_7="Звучит расслабляюще, по крайней мере."
title_1_8="DWERP"
dialogue_1_8="Даже не думай. Я не приглашаю тебя присоединиться. Но... может, позже, когда я восстановлю своё достоинство."
title_1_9="GREENCAP"
dialogue_1_9="Хех, я подожду, может, я смогу быть частью банды в следующем квесте?"
title_1_10="DWERP"
dialogue_1_10="Да... Хорошо! А теперь оставь меня с моими страданиями... то есть, хобби."

dialogue_1_11="END"

title_2_0="DWERP"
dialogue_2_0="Я всё ещё строю планы... медленно... молчаливо..."
dialogue_2_1="BACK"

[ending_dialogue]
title_1_0="GREGADOR"
dialogue_1_0="Что случилось с вратами?"
title_1_1="ELDER GEPU"
dialogue_1_1="Я не знаю..."
title_1_2="GREGADOR"
dialogue_1_2="Неужели Гринкэп... потерпел неудачу?"
title_1_3="ELDER GEPU"
dialogue_1_3="Я так не думаю..."
title_1_4="ELDER GEPU"
dialogue_1_4="Я чувствую разницу в воздухе... Ты тоже чувствуешь?"
title_1_5="GREGADOR"
dialogue_1_5="Чувствую... Он легче. Почти... гудит."
title_1_6="ELDER GEPU"
dialogue_1_6="Тогда, возможно, он преуспел. Но что с ним стало?"
title_1_7="GREGADOR"
dialogue_1_7="Мелодия Спор... она продолжается. Где бы он сейчас ни был, он часть её."
dialogue_1_8="END"

[sweetums]
title_1_0="GREENCAP"
dialogue_1_0="Эй, что ты делаешь?"
title_1_1="SWEETUMS"
dialogue_1_1="Уф! Ничего. Мне смертельно скучно! Это место хуже некуда!"
title_1_2="SWEETUMS"
dialogue_1_2="Всё здесь просто... гниёт! И я гнию вместе с ним, от чистой скуки!"
title_1_3="GREENCAP"
dialogue_1_3="Да... это не похоже на веселье."
title_1_4="SWEETUMS"
dialogue_1_4="Это не веселье! Я хочу действий! Чего-то захватывающего! А не просто гниющих листьев и тихого ветра целыми днями!"
title_1_5="SWEETUMS"
dialogue_1_5="И не говоря уже о том, что от всей этой гнили у меня обострилась аллергия. *шмыг* В последнее время всё чихаю и чихаю..."
title_1_6="SWEETUMS"
dialogue_1_6="Так что насчёт тебя, а? Ты выглядишь так, будто действительно куда-то идёшь."
title_1_7="GREENCAP"
dialogue_1_7="Я в квесте, чтобы спасти грибной род!"
title_1_8="SWEETUMS"
dialogue_1_8="...Спасти грибной род, да? Вы, грибы, может, и мягкие, но, похоже, у тебя есть яйца!"
title_1_9="SWEETUMS"
dialogue_1_9="Как насчёт того, чтобы я пошёл с тобой? Моя колючая раковина твёрдая, как сталь, и может напугать даже голодного кабана... я это знаю по опыту!"
title_1_10="GREENCAP"
dialogue_1_10="Ха! Похоже, мне пригодился бы кто-то вроде тебя. Давай выберемся отсюда!"
dialogue_1_11="END"