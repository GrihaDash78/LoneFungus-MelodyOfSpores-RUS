[mon]

title_1_0="MON"
dialogue_1_0="Эй! Хочешь попробовать игру, которую мы с братом придумали?"
title_1_1="MON"
dialogue_1_1="Всё дело в точности, скорости и... ну, в капле удачи!"
title_1_2="MON"
dialogue_1_2="Побей рекорд, и я приготовил для тебя кое-какие классные призы!"
title_1_3="MON"
dialogue_1_3="Третий приз — осколок звезды! Второй приз — йо-йо! Бьюсь об заклад, ты даже не знаешь, что это!"
title_1_4="MON"
dialogue_1_4="А первый приз... совершенно не проклятая, то есть благословенная, Корона! Она сделает тебя сильнее. В основном. Возможно."
title_1_5="GREENCAP"
dialogue_1_5="Это звучит довольно весело..."
title_1_6="MON"
dialogue_1_6="Тогда давай! Мой брат в соседней комнате, он расскажет тебе, как это работает!"
dialogue_1_7="BACK"

title_2_0="MON"
dialogue_2_0="Вау! Ты действительно прошёл нашу игру и выиграл все призы?!"
title_2_1="MON"
dialogue_2_1="Честно говоря, я думал, это было подстроено! Никто никогда не должен был выигрывать!"
title_2_2="MON"
dialogue_2_2="Ну что ж... видимо, ты заслужил. Наслаждайся призами, чемпион!"
