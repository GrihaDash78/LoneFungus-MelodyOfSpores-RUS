[intro]
1="Давным-давно грибной род процветал в мире, связанный гармонией и единством"
2="Эта связь пробудила в них мистическую силу, даровав грибам магические способности"
3="Но глубоко в тенях существо, известное как Дух-Зверь, жаждало их магии"
4="Его прибытие разрушило их мир: он охотился на всех, кого коснулась искра магии"
5="Ходят слухи о пророчестве, о герое, которому суждено встретиться со Зверем"
6="Но без героя пророчество останется неисполненным..."
after_intro="Несколько лет спустя..."
survive1="Твоя история не заканчивается здесь"
survive2="Очнись..."

[outro]
1="Грибной род процветал в мире, связанный гармонией и единством"
2="Эта связь укрепила в них мистическую силу, даровав грибам магические способности"
3="Грибной род использовал свой дар над природой, формируя и оберегая своё королевство"
4="И со временем начало подниматься королевство, не похожее ни на одно из прежних"
5="Но слухи молвят, что всё движется по кругу и старые песни могут зазвучать вновь"
6="Судьба одинокого героя, некогда ходившего среди них, была забыта, развеяна, словно споры на ветру"