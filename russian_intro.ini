[intro]
1="Long ago, the Mushkind flourished in peace, bound together by harmony and unity"
2="This bond awakened a mystical power within them, granting magical abilities to the mushrooms"
3="But deep in the shadows, a being known as the Spirit Beast hungered for their magic"
4="Its arrival shattered their peace, hunting down those touched by magic's spark" 
5="There are those who whisper of a prophecy, of a hero destined to face the Beast"
6="But without a hero, the prophecy would remain unfulfilled..."
after_intro="Some years later..."
survive1="Your story does not end here"
survive2="Wake up..."

[outro]
1="The Mushkind flourished in peace, bound together by harmony and unity"
2="This bond strengthened a mystical power within them, granting magical abilities to the mushrooms"
3="The Mushkind wielded their gift over nature, shaping and guarding their realm."
4="And in time, a kingdom unlike any before began to rise."
5="Yet whispers tell that all things turn in circles, that old songs may sound again."
6="The lone hero who once walked among them, his fate was forgotten, scattered like spores upon the wind."
