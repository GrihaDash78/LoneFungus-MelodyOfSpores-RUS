boss1="Путч"
boss2="Бивень"
boss3="Дух Фейри"
boss4="Матриарх летучих мышей"
boss5="Моркер"
boss6="Дух-Зверь"
boss7="Принц Вольтаболт"
boss8="Рёдхатт"
boss9="Лорд Хопсалот"
boss10="Глиммерзев"
boss11="Дверп"
boss12="Хранитель Судьбы"
boss13="Лорд Фосмир"
boss14="Нита"
boss15="Болтовой Страж"

[1]
name="Жёлтый жук"
description="Медлительная крошка с заострённым панцирем. Никого не трогает, если только не налететь на неё."

[2]
name="Оранжевый жук"
description="Похож на ворчливого кузена жёлтого. Панцирь покрепче. Не стоит его пинать."

[3]
name="Стрекоза"
description="Нежные крылья, вспыльчивый нрав. Подойдёшь близко — и она метнётся в тебя."

[4]
name="Шипастик"
description="Жутковатый панцирь, полный шипов. Когда я подхожу к нему, он их вытягивает."

[5]
name="Большой шипастик"
description="Более крупная и злая версия. Не сидит на месте — бросается вперёд, если подойти слишком близко."

[6]
name="Газоорех"
description="Подойдёшь ближе — наполнит воздух мерзким газом. Пришлось научиться задерживать дыхание."

[7]
name="Здоровый газоорех"
description="Словно старший брат Газоореха. Смердит!"

[8]
name="Саранча"
description="Эти прыгучие жуки любят стены и скачут из стороны в сторону, будто хвастаются."

[9]
name="Стальная саранча"
description="Такая же, как обычная, но с бронированными пластинами и куда более нахальная."

[10]
name="Муха"
description="Крошечная и надоедливая. Летает по шаткой траектории, и прихлопнуть её сложнее, чем кажется."

[11]
name="Кузнечик"
description="Прыткое мелкое создание. Если подойти слишком близко, тут же скакнёт за мной."

[12]
name="Огненный кузнечик"
description="Как обычный, только дышит огнём. Ну конечно же."

[13]
name="Цистоход"
description="Мерзость. Тело покрыто лопающимися кистами, и в гневе он швыряет их в меня."

[14]
name="Колючелист"
description="Живой сорняк с дурным характером. Хлещет колючими листьями, стоит мне только взглянуть на него."

[15]
name="Плевало-цвет"
description="Маленький цветок, который стреляет снарядами. Хрупкий, но надоедливый."

[16]
name="Потолочный плевун"
description="Крупный цветок на потолке. Плюётся тремя маленькими неприятностями, если подойти."

[17]
name="Стоячий плевун"
description="Высокий цветок, любитель плеваться. Не попадайся ему на глаза."

[18]
name="Огненный плевун"
description="Дышит огнём, словно перегрелся на солнце. Лучше держись подальше!"

[19]
name="Шипоплюй"
description="Стреляет в тебя огромным шипом. Эта штука отвратительна!"

[20]
name="Жук-олень"
description="Жук с кусачими челюстями. Не из вежливых."

[21]
name="Цистожук"
description="Покрыт мерзкими кистами. Когда злится, швыряется ими. Как гадко."

[22]
name="Личинка"
description="Крохотный извивающийся червячок, подпрыгивает, когда пугается. На удивление прыткий."

[23]
name="Охотничья тварь"
description="Цепляется за потолок. Вид у неё такой, будто она хочет свалиться тебе на голову. Осторожнее."

[24]
name="Летучая мышь"
description="Летит прямо на тебя без всяких манер. Берегись!"

[25]
name="Старая лет. мышь"
description="Крупная летучая мышь. И, кажется, ещё и осуждающая."

[26]
name="Краб"
description="Не особо дерётся, больше занят своими клешнями. Ещё малыш."

[27]
name="Паук"
description="Свисающая угроза. Движется непредсказуемо. Вызывает мурашки."

[28]
name="Паучиха-матриарх"
description="Большой паук. Стреляет паутиной и одновременно презрением."

[29]
name="Огнерыба"
description="Чешуя жжётся, как мелкие угольки. Плыви быстрее!"

[30]
name="Большая огнерыба"
description="Больше, злее и горячее. Впереди всплеск опасности!"

[31]
name="Пиранья"
description="Выпрыгивает из воды, будто здесь главная. И зубы при ней."

[32]
name="Полевая птица"
description="Агрессивная маленькая птичка. Воображает себя больше, чем есть."

[33]
name="Экзотическая птица"
description="Быстрее, красивее, злее. Точно воображает себя больше, чем есть."

[34]
name="Ореховый червь"
description="Живёт в орехе. Если разозлить, кидается шипами. Классика."

[35]
name="Железная стрекоза"
description="Стрекоза с твёрдым панцирем. Просто так не раздавишь."

[36]
name="Круп. жёлтый жук"
description="Больше, острее и злее своих мелких родственников."

[37]
name="Майский жук"
description="Скачет вокруг, будто ему всё равно."

[38]
name="Круп. майский жук"
description="Ещё больше, чем майский жук. Скачет с чувством собственного достоинства."

[39]
name="Потолочный ползун"
description="Ползает по потолку, плюётся огнём. Надоедливый и вспыльчивый."

[40]
name="Свечко-конёк"
description="Скульптура морского конька с пламенем. Эффектно, но смертельно."

[41]
name="Носатый жук"
description="Летает волнами, с длинным носом. Чует неприятности."

[42]
name="Пружинный гриб"
description="Механический гриб, который много прыгает. Не даёт расслабиться."

[43]
name="Страж"
description="Приклеен к потолку, осыпает снарядами. Очень невежливо."

[44]
name="Паук-робот"
description="Механический паук, ползает по рельсам. Надоедливые лапки."

[45]
name="Голем"
description="Большой автоматон, почти похож на живого гриба. Бьёт сильно."

[46]
name="Голем с копьём"
description="Голем с копьём. Может закрываться щитом. Умный и колючий."

[47]
name="Черепомышь"
description="Летающий череп, который воображает себя летучей мышью. Жуткий и нахальный."

[48]
name="Живой ящик"
description="Разбрасывает инструменты, словно затаил обиду. Раздражает."

[49]
name="Электростраж"
description="Привязан к потолку и бьёт током. Очень яркий, очень грубый."

[50]
name="Шипастик-электрик"
description="Электрическое существо внутри колючего шара. Непонятно, в чём его проблема."

[51]
name="Блок-монстр"
description="Живой блок, который выплёвывает снаряды. Просто и эффективно."

[52]
name="Золотая медуза"
description="Мчится на меня, будто очень спешит. Эффектная, сверкающая, опасная."

[53]
name="Тунец"
description="Агрессивно плавает из стороны в сторону. Не дружелюбный."

[54]
name="Ящерица"
description="В страхе распускает воротник. Выглядит больше, чем есть."

[55]
name="Кристал. ящерица"
description="Стреляет кристаллами из шеи. Сверкает и грубит."

[56]
name="Цветок-бум"
description="Самонаводящиеся взрывающиеся снаряды. Очень настойчивый."

[57]
name="Бабочка"
description="Стреляет крупными снарядами. Красивая и смертоносная."

[58]
name="Кристал. бабочка"
description="Стреляет множеством снарядов. Сверкающий хаос."

[59]
name="Пещерный дьявол"
description="Повсюду огненные ловушки. Определённо не дружелюбный проводник."

[60]
name="Медузея"
description="Волнистое морское существо. Много смотрит. Очень угрожающе."

[61]
name="Плотоцвет"
description="Хищный цветок. Любит есть грибы."

[62]
name="Розовая медуза"
description="При смерти взрывается снарядами. Настоящая королева драмы."

[63]
name="Сбиватель"
description="Пушистые шарики, что бродят по поверхности платформ, скукотища."

[64]
name="Осколкокрыл"
description="Выскакивает из земли, пытаясь испортить мне день."

[65]
name="Призменное ядро"
description="Живой кристалл, стреляющий лазерами. Красивый и смертоносный."

[66]
name="Геонова"
description="Каменное существо с энергетическими выстрелами. Тяжёлое, грубое, несгибаемое."

[67]
name="Лягушка"
description="Принимает меня за муху. Голодная и настойчивая."

[68]
name="Малая креветка"
description="Крошечная пловчиха, которая скачет вокруг."

[69]
name="Креветка"
description="Крупнее, прыгучее. Определённо более живучая."

[70]
name="Пчела"
description="Летает неуклюже, но всё равно умудряется ужалить."

[71]
name="Комар"
description="Мелкое жаждующее существо. Хочет моего грибного сока."

[72]
name="Ужасная тварь"
description="Цепляется, прыгает, пугает. Просто ужасная."

[73]
name="Ледяной шипастик"
description="Выпускает ледяные шипы, когда я подхожу близко. Холодный приём."

[74]
name="Кислотный глаз"
description="Приклеенное к потолку око, что плачет кислотой. Больно и гадко!"

[75]
name="Кислотный демон"
description="Большой глаз, стреляющий кислотой. Кошмарное создание."

[76]
name="Кислот. ползун"
description="Ползает возле кислоты. Скользкий и грубый."

[77]
name="Коричн. ползун"
description="Бродит по ветреным платформам. Выглядит скучно, но всегда на пути."

[78]
name="Дурной глаз"
description="Тревожное создание, пытающееся меня съесть!"

[79]
name="Ординатор"
description="Живая статуя, метающая снаряды. Профессионален и непоколебим."

[80]
name="Слизень"
description="Прыгает на меня. Липкий, простой, эффективный."

[81]
name="Гигант-слизень"
description="Большой, прыгучий, угрожающий слизень. Не заметить невозможно."

[82]
name="Лед. элементаль"
description="Снежинка, стреляющая льдом. Хладнокровный противник."

[83]
name="Пингвин"
description="Обожает скользить по льду. Быстрый, скользкий, озорной."

[84]
name="Бронир. пингвин"
description="Более бронированный, более опасный, всё так же любит скользить."

[85]
name="Ледяная медузея"
description="Ледяное создание, летающее волнообразно. Надоедает."

[86]
name="Ледяной паук"
description="Ползает по поверхностям. Не терпит моего присутствия. Я его понимаю."

[87]
name="Бород. лет. мышь"
description="Древняя летучая мышь. Сильная, мудрая, слегка осуждающая."

[88]
name="Кислотный слизень"
description="Кислотный прыгающий монстр. Липкий и едкий."

[89]
name="Морской ёж"
description="Колючая мелкая неприятность."

[90]
name="Тухлая личинка"
description="Хорошо живётся в слизи. Прыгает повсюду. Мерзкая и настойчивая."

[91]
name="Круп. красный жук"
description="Большой красный панцирь. Когда злится, двигается быстрее. Осторожно!"

[92]
name="Тыква-вертун"
description="Тыква с миссией. Крутится как бешеная."

[93]
name="Тыква-взрывун"
description="Тыква, которая взрывается. Не обнимайте."

[94]
name="Кровавый комар"
description="Более злой комар. Жаждет моего грибного сока сильнее прежнего."

[95]
name="Винтовой житель"
description="Крохотный живой винтик. Надоедливо подпрыгивает."

[96]
name="Винтовой часовой"
description="Покрупнее, позлее. Подпрыгивает невежливо."

[97]
name="Копирователь"
description="В страхе копирует сам себя. Размножающаяся проблема."

[98]
name="Золотой плевун"
description="Плюётся энергией. Эффектный, яркий, грубый."

[99]
name="Ворона"
description="Агрессивная птица. Любит нападать лично на меня."

[100]
name="Искрокуст"
description="Куст, стреляющий энергией. Не пытайтесь в нём спрятаться."

[101]
name="Скалолаз"
description="Жутковатый скалолаз. Поднимается и опускается без предупреждения."

[102]
name="Броненосец"
description="Катится. Милый, но опасный, если наступить."

[103]
name="Броняносец"
description="Бронированная катящаяся угроза. Остановить трудно."

[104]
name="Насекомый рыцарь"
description="Метает бумеранги. Эффектный, пунктуальный, агрессивный."